<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">What Rainforest Alliance and sustainably sourced claims mean on freeze-dried fruit labels</title>
  <desc id="desc">Side-by-side comparison of a certified seal backed by a published standard, independent audit, content threshold and approved mark use, against an uncertified marketing phrase with no defined criteria or verification.</desc>
  <rect width="1200" height="680" fill="#f6f4ee"/>
  <rect x="70" y="60" width="1060" height="560" rx="34" fill="#fffdf8" stroke="#d8d2c3" stroke-width="2"/>

  <text x="110" y="116" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="33" font-weight="700">A seal you can check, a phrase you cannot</text>
  <text x="110" y="150" fill="#68736c" font-family="Inter, Arial, sans-serif" font-size="17">Both appear on the same pouch. Only one has a procedure behind it.</text>

  <!-- certified column -->
  <g transform="translate(110 186)">
    <rect width="470" height="398" rx="24" fill="#eef2e6" stroke="#5a7d56" stroke-width="2"/>
    <circle cx="60" cy="58" r="26" fill="#5a7d56"/>
    <path d="M48 58 l9 10 l16 -19" fill="none" stroke="#fffdf8" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="104" y="52" fill="#3f5c3b" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="700">Third-party certification</text>
    <text x="104" y="76" fill="#5a7d56" font-family="Inter, Arial, sans-serif" font-size="14">e.g. the Rainforest Alliance seal</text>

    <g font-family="Inter, Arial, sans-serif">
      <g transform="translate(36 116)">
        <rect width="398" height="58" rx="12" fill="#fffdf8" stroke="#b9cbb2"/>
        <text x="18" y="26" fill="#3f5c3b" font-size="15" font-weight="700">Published standard</text>
        <text x="18" y="46" fill="#5f6a63" font-size="13">environmental and social criteria, in writing</text>
      </g>
      <g transform="translate(36 184)">
        <rect width="398" height="58" rx="12" fill="#fffdf8" stroke="#b9cbb2"/>
        <text x="18" y="26" fill="#3f5c3b" font-size="15" font-weight="700">Independent audit</text>
        <text x="18" y="46" fill="#5f6a63" font-size="13">auditors visit periodically to verify compliance</text>
      </g>
      <g transform="translate(36 252)">
        <rect width="398" height="58" rx="12" fill="#fffdf8" stroke="#b9cbb2"/>
        <text x="18" y="26" fill="#3f5c3b" font-size="15" font-weight="700">Content threshold</text>
        <text x="18" y="46" fill="#5f6a63" font-size="13">single-ingredient packs: ≥90% certified content</text>
      </g>
      <g transform="translate(36 320)">
        <rect width="398" height="58" rx="12" fill="#fffdf8" stroke="#b9cbb2"/>
        <text x="18" y="26" fill="#3f5c3b" font-size="15" font-weight="700">Approved mark use</text>
        <text x="18" y="46" fill="#5f6a63" font-size="13">artwork submitted and reviewed before it ships</text>
      </g>
    </g>
  </g>

  <!-- uncertified column -->
  <g transform="translate(620 186)">
    <rect width="470" height="398" rx="24" fill="#f4f0e5" stroke="#c9b98f" stroke-width="2" stroke-dasharray="9 6"/>
    <circle cx="60" cy="58" r="26" fill="none" stroke="#b8862f" stroke-width="3"/>
    <text x="60" y="68" text-anchor="middle" fill="#b8862f" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">?</text>
    <text x="104" y="52" fill="#7a5f22" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="700">Uncertified claim</text>
    <text x="104" y="76" fill="#8a7d5e" font-family="Inter, Arial, sans-serif" font-size="14">“sustainably sourced”, “responsibly grown”</text>

    <g font-family="Inter, Arial, sans-serif">
      <g transform="translate(36 116)">
        <rect width="398" height="58" rx="12" fill="#fffdf8" stroke="#ddd2b4"/>
        <text x="18" y="26" fill="#7a5f22" font-size="15" font-weight="700">No fixed definition</text>
        <text x="18" y="46" fill="#8a8478" font-size="13">the phrase sets no criteria on its own</text>
      </g>
      <g transform="translate(36 184)">
        <rect width="398" height="58" rx="12" fill="#fffdf8" stroke="#ddd2b4"/>
        <text x="18" y="26" fill="#7a5f22" font-size="15" font-weight="700">No required audit</text>
        <text x="18" y="46" fill="#8a8478" font-size="13">verification, if any, is chosen by the brand</text>
      </g>
      <g transform="translate(36 252)">
        <rect width="398" height="58" rx="12" fill="#fffdf8" stroke="#ddd2b4"/>
        <text x="18" y="26" fill="#7a5f22" font-size="15" font-weight="700">No stated coverage</text>
        <text x="18" y="46" fill="#8a8478" font-size="13">unclear which fruit or what share of volume</text>
      </g>
      <g transform="translate(36 320)">
        <rect width="398" height="58" rx="12" fill="#fffdf8" stroke="#ddd2b4"/>
        <text x="18" y="26" fill="#7a5f22" font-size="15" font-weight="700">Ask for documents</text>
        <text x="18" y="46" fill="#8a8478" font-size="13">criteria, verifier, frequency, volume covered</text>
      </g>
    </g>
  </g>

  <text x="110" y="612" fill="#8a8478" font-family="Inter, Arial, sans-serif" font-size="13">Neither claim describes product quality — moisture, water activity, colour and breakage live on the spec sheet, not the front panel.</text>
</svg>
