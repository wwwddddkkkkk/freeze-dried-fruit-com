<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">Water activity versus moisture content in freeze-dried fruit</title>
  <desc id="desc">A technical editorial diagram comparing total water content with available water activity.</desc>
  <rect width="1200" height="680" fill="#f6f4ee"/>
  <rect x="74" y="72" width="1052" height="536" rx="34" fill="#fffdf8" stroke="#d8d2c3" stroke-width="2"/>
  <text x="112" y="128" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="700">Moisture content is amount. Water activity is availability.</text>
  <text x="112" y="166" fill="#65736c" font-family="Inter, Arial, sans-serif" font-size="17">Two quality measurements explain different risks in freeze-dried fruit.</text>

  <g transform="translate(116 222)">
    <rect width="430" height="276" rx="24" fill="#edf6f1" stroke="#c6d8ce"/>
    <text x="30" y="48" fill="#244237" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Moisture content</text>
    <text x="30" y="78" fill="#62736b" font-family="Inter, Arial, sans-serif" font-size="14">How much water remains by weight</text>
    <g transform="translate(46 118)">
      <rect x="0" y="0" width="80" height="116" rx="12" fill="#fffdf8" stroke="#c6d8ce"/>
      <rect x="0" y="78" width="80" height="38" rx="0" fill="#9ac7b3"/>
      <circle cx="182" cy="28" r="16" fill="#9ac7b3"/>
      <circle cx="226" cy="68" r="10" fill="#9ac7b3"/>
      <circle cx="160" cy="94" r="8" fill="#9ac7b3"/>
      <circle cx="262" cy="112" r="13" fill="#9ac7b3"/>
      <path d="M128 57h194" stroke="#7e9e90" stroke-width="2" stroke-dasharray="6 8"/>
      <text x="0" y="154" fill="#3b5149" font-family="Inter, Arial, sans-serif" font-size="15">Reported as a percentage</text>
    </g>
  </g>

  <g transform="translate(654 222)">
    <rect width="430" height="276" rx="24" fill="#f3efe6" stroke="#d8d2c3"/>
    <text x="30" y="48" fill="#244237" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Water activity</text>
    <text x="30" y="78" fill="#62736b" font-family="Inter, Arial, sans-serif" font-size="14">How available that water is</text>
    <g transform="translate(44 116)">
      <line x1="0" y1="118" x2="332" y2="118" stroke="#b9ad99" stroke-width="2"/>
      <line x1="0" y1="118" x2="0" y2="8" stroke="#b9ad99" stroke-width="2"/>
      <path d="M12 98 C70 96, 106 88, 154 61 S250 28, 320 22" fill="none" stroke="#b98b5b" stroke-width="5" stroke-linecap="round"/>
      <circle cx="154" cy="61" r="8" fill="#1f332d"/>
      <text x="170" y="66" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="13">more available water</text>
      <text x="-4" y="146" fill="#65736c" font-family="Inter, Arial, sans-serif" font-size="14">low aw</text>
      <text x="278" y="146" fill="#65736c" font-family="Inter, Arial, sans-serif" font-size="14">higher aw</text>
    </g>
  </g>

  <g transform="translate(116 538)">
    <rect width="968" height="34" rx="17" fill="#1f332d"/>
    <text x="28" y="23" fill="#fffdf8" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">Buyer note: ask suppliers for both specs, plus testing method and packaging validation.</text>
  </g>
</svg>
