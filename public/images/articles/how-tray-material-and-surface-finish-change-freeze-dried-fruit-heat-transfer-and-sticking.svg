<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">How tray material and surface finish change freeze-dried fruit heat transfer and sticking</title>
  <desc id="desc">Cross-section comparison of a flat tray in full contact with a heated shelf and a warped tray with an insulating vacuum gap, plus a panel on tray surface release and breakage.</desc>
  <rect width="1200" height="680" fill="#f6f4ee"/>
  <rect x="70" y="70" width="1060" height="540" rx="34" fill="#fffdf8" stroke="#d8d2c3" stroke-width="2"/>

  <text x="110" y="126" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="33" font-weight="700">The tray is the road heat has to travel</text>
  <text x="110" y="162" fill="#68736c" font-family="Inter, Arial, sans-serif" font-size="17">Under vacuum there is almost no air to bridge a gap, so contact quality becomes a process variable.</text>

  <!-- Panel A: flat tray -->
  <text x="110" y="222" fill="#2f6b53" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">A · Flat tray, full shelf contact</text>

  <!-- fruit pieces -->
  <g fill="#e8b04b" stroke="#c9913a" stroke-width="1.5">
    <circle cx="150" cy="266" r="12"/><circle cx="182" cy="262" r="13"/><circle cx="216" cy="267" r="11"/>
    <circle cx="248" cy="263" r="13"/><circle cx="282" cy="266" r="12"/><circle cx="314" cy="262" r="12"/>
    <circle cx="346" cy="267" r="13"/><circle cx="380" cy="264" r="11"/><circle cx="412" cy="266" r="12"/>
  </g>
  <!-- tray -->
  <path d="M126 282 h316 v18 h-316 z" fill="#c8cdd2" stroke="#8d959c" stroke-width="2"/>
  <text x="452" y="296" fill="#68736c" font-family="Inter, Arial, sans-serif" font-size="14">tray wall</text>
  <!-- shelf -->
  <rect x="118" y="312" width="332" height="26" rx="6" fill="#b7503f" opacity="0.85"/>
  <text x="118" y="362" fill="#68736c" font-family="Inter, Arial, sans-serif" font-size="14">heated shelf</text>

  <!-- heat arrows up -->
  <g stroke="#b7503f" stroke-width="3" fill="none">
    <path d="M160 310 v-24"/><path d="M215 310 v-24"/><path d="M270 310 v-24"/><path d="M325 310 v-24"/><path d="M380 310 v-24"/>
  </g>
  <g fill="#b7503f">
    <path d="M160 280 l-6 12 h12 z"/><path d="M215 280 l-6 12 h12 z"/><path d="M270 280 l-6 12 h12 z"/>
    <path d="M325 280 l-6 12 h12 z"/><path d="M380 280 l-6 12 h12 z"/>
  </g>
  <text x="126" y="398" fill="#2f6b53" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="600">Even heat in → even drying out</text>
  <text x="126" y="422" fill="#68736c" font-family="Inter, Arial, sans-serif" font-size="14">Aluminum conducts well; thin, flat walls keep the path short.</text>

  <!-- Panel B: warped tray -->
  <text x="640" y="222" fill="#b7503f" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">B · Warped tray, vacuum gap beneath</text>

  <g fill="#e8b04b" stroke="#c9913a" stroke-width="1.5">
    <circle cx="680" cy="258" r="12"/><circle cx="712" cy="254" r="13"/><circle cx="746" cy="259" r="11"/>
    <circle cx="778" cy="256" r="13"/><circle cx="812" cy="260" r="12"/><circle cx="844" cy="258" r="12"/>
    <circle cx="876" cy="262" r="13"/><circle cx="910" cy="260" r="11"/><circle cx="942" cy="263" r="12"/>
  </g>
  <path d="M656 276 q160 22 316 6 v18 q-156 16 -316 -6 z" fill="#c8cdd2" stroke="#8d959c" stroke-width="2"/>
  <rect x="648" y="312" width="332" height="26" rx="6" fill="#b7503f" opacity="0.85"/>
  <text x="648" y="362" fill="#68736c" font-family="Inter, Arial, sans-serif" font-size="14">heated shelf</text>

  <!-- gap hatch -->
  <path d="M660 300 q150 20 300 4 v8 q-150 16 -300 -4 z" fill="#dfe3e6"/>
  <text x="700" y="330" fill="#8d959c" font-family="Inter, Arial, sans-serif" font-size="13">vacuum gap ≈ insulator</text>

  <g stroke="#b7503f" stroke-width="3" fill="none">
    <path d="M700 310 v-16" stroke-dasharray="4 5"/><path d="M780 310 v-16" stroke-dasharray="4 5"/><path d="M860 310 v-16" stroke-dasharray="4 5"/>
  </g>
  <path d="M950 310 v-26" stroke="#b7503f" stroke-width="3" fill="none"/>
  <path d="M950 278 l-6 12 h12 z" fill="#b7503f"/>

  <!-- cold spot marker -->
  <circle cx="746" cy="230" r="16" fill="none" stroke="#b7503f" stroke-width="2" stroke-dasharray="4 4"/>
  <text x="768" y="228" fill="#b7503f" font-family="Inter, Arial, sans-serif" font-size="13">lags the batch</text>

  <text x="656" y="398" fill="#b7503f" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="600">Uneven heat in → soft centers, crisp edges</text>
  <text x="656" y="422" fill="#68736c" font-family="Inter, Arial, sans-serif" font-size="14">The shelf probe still reads normal. The cycle log looks fine.</text>

  <!-- bottom strip: surface / release -->
  <rect x="110" y="452" width="980" height="122" rx="18" fill="#f1efe6" stroke="#e0dbcd" stroke-width="1.5"/>
  <text x="136" y="484" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700">Surface finish decides what survives unloading</text>

  <text x="136" y="518" fill="#68736c" font-family="Inter, Arial, sans-serif" font-size="14">Bare metal + high-sugar fruit</text>
  <text x="136" y="544" fill="#b7503f" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600">sticks → tears → breakage + fines</text>

  <text x="470" y="518" fill="#68736c" font-family="Inter, Arial, sans-serif" font-size="14">Liner or coated surface</text>
  <text x="470" y="544" fill="#2f6b53" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600">clean release → whole pieces hold</text>

  <text x="800" y="518" fill="#68736c" font-family="Inter, Arial, sans-serif" font-size="14">But a liner is another layer</text>
  <text x="800" y="544" fill="#68736c" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600">re-verify the cycle if you add one</text>
</svg>
