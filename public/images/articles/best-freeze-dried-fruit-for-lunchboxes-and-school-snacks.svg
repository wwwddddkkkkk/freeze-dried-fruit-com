<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">Best freeze-dried fruit for lunchboxes and school snacks</title>
  <desc id="desc">An illustrated lunchbox tray comparing freeze-dried fruit choices by sweetness, mess, and travel friendliness.</desc>
  <rect width="1200" height="680" fill="#f6f4ee"/>
  <rect x="74" y="72" width="1052" height="536" rx="34" fill="#fffdf8" stroke="#d8d2c3" stroke-width="2"/>
  <text x="112" y="128" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="700">Lunchbox fruit should survive travel before it shows off flavor</text>
  <text x="112" y="166" fill="#68736c" font-family="Inter, Arial, sans-serif" font-size="17">The best school-snack picks stay tidy, recognizable, and easy to eat after a morning in motion.</text>

  <g transform="translate(126 214)">
    <rect width="398" height="312" rx="28" fill="#f7f3ea" stroke="#d8d2c3"/>
    <rect x="24" y="24" width="350" height="264" rx="26" fill="#fffdf8" stroke="#d8d2c3"/>
    <line x1="24" y1="112" x2="374" y2="112" stroke="#d8d2c3"/>
    <line x1="194" y1="24" x2="194" y2="288" stroke="#d8d2c3"/>
    <text x="42" y="56" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Top picks</text>
    <circle cx="72" cy="82" r="13" fill="#d86158"/>
    <text x="96" y="87" fill="#4b5a54" font-family="Inter, Arial, sans-serif" font-size="15">strawberry</text>
    <circle cx="240" cy="82" r="11" fill="#4b6f95"/>
    <text x="262" y="87" fill="#4b5a54" font-family="Inter, Arial, sans-serif" font-size="15">blueberry</text>
    <rect x="52" y="150" width="28" height="18" rx="8" fill="#efd69b"/>
    <text x="96" y="165" fill="#4b5a54" font-family="Inter, Arial, sans-serif" font-size="15">apple</text>
    <rect x="224" y="148" width="30" height="20" rx="9" fill="#e9bf6a"/>
    <text x="268" y="165" fill="#4b5a54" font-family="Inter, Arial, sans-serif" font-size="15">banana</text>
    <rect x="52" y="214" width="34" height="22" rx="10" fill="#de7d56"/>
    <text x="96" y="230" fill="#4b5a54" font-family="Inter, Arial, sans-serif" font-size="15">mango</text>
    <text x="224" y="224" fill="#4b5a54" font-family="Inter, Arial, sans-serif" font-size="15">best mix of</text>
    <text x="224" y="246" fill="#4b5a54" font-family="Inter, Arial, sans-serif" font-size="15">tidy + familiar + travel friendly</text>
  </g>

  <g transform="translate(570 214)">
    <rect width="518" height="312" rx="28" fill="#fffdf8" stroke="#d8d2c3" stroke-width="2"/>
    <text x="28" y="42" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Quick lunchbox guide</text>
    <rect x="28" y="76" width="462" height="52" rx="18" fill="#dce7f3"/>
    <text x="48" y="98" fill="#34526a" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">Tidiest picks</text>
    <text x="48" y="118" fill="#34526a" font-family="Inter, Arial, sans-serif" font-size="14">blueberry, small apple pieces, well-cut strawberry</text>
    <rect x="28" y="146" width="462" height="52" rx="18" fill="#ead8b7"/>
    <text x="48" y="168" fill="#6e5a2f" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">Sweetest profile</text>
    <text x="48" y="188" fill="#6e5a2f" font-family="Inter, Arial, sans-serif" font-size="14">banana and mango when low tartness matters</text>
    <rect x="28" y="216" width="462" height="52" rx="18" fill="#e7c0b5"/>
    <text x="48" y="238" fill="#7a3f35" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">Watch out for</text>
    <text x="48" y="258" fill="#7a3f35" font-family="Inter, Arial, sans-serif" font-size="14">fragile berries, heavy powder, and oversized family bags</text>
  </g>

  <g transform="translate(112 538)">
    <rect width="976" height="34" rx="17" fill="#1f332d"/>
    <text x="28" y="23" fill="#fffdf8" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">No suitable unused local lunchbox photo was available, so this applications cover uses a custom editorial SVG.</text>
  </g>
</svg>
