<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Continuous belt freeze-drying versus batch tray drying for fruit</title>
  <desc id="desc">Editorial diagram contrasting a batch tray freeze dryer that loads and unloads one lot at a time with a continuous belt system where fruit moves through freezing, primary drying, and secondary drying zones simultaneously.</desc>
  <rect width="1600" height="900" fill="#f4efe6"/>
  <rect x="64" y="64" width="1472" height="772" rx="30" fill="#fcfaf5" stroke="#d4c7b1" stroke-width="2"/>
  <text x="112" y="138" fill="#24433d" font-family="'Source Sans 3', Arial, sans-serif" font-size="26" letter-spacing="5">TECHNOLOGY</text>
  <text x="112" y="196" fill="#172f2b" font-family="'DM Serif Display', Georgia, serif" font-size="48">Two Ways Through the Machine</text>
  <text x="112" y="238" fill="#5f716d" font-family="'Source Serif 4', Georgia, serif" font-size="23">Batch runs one lot at a time. Continuous keeps product flowing through fixed zones.</text>

  <!-- BATCH -->
  <text x="112" y="322" fill="#24433d" font-family="'Source Sans 3', Arial, sans-serif" font-size="24" letter-spacing="2">BATCH TRAY DRYER — one load, one cycle</text>
  <rect x="112" y="352" width="640" height="180" rx="16" fill="#eef3ee" stroke="#9db3a6" stroke-width="2"/>
  <!-- chamber door -->
  <rect x="128" y="368" width="24" height="148" rx="4" fill="#c7d6cb" stroke="#9db3a6"/>
  <!-- stacked trays -->
  <g stroke="#24433d" stroke-width="2" fill="#f7c873">
    <rect x="200" y="392" width="480" height="18" rx="4"/>
    <rect x="200" y="430" width="480" height="18" rx="4"/>
    <rect x="200" y="468" width="480" height="18" rx="4"/>
  </g>
  <g fill="#e07a4b">
    <circle cx="240" cy="401" r="5"/><circle cx="300" cy="401" r="5"/><circle cx="360" cy="401" r="5"/><circle cx="420" cy="401" r="5"/><circle cx="480" cy="401" r="5"/><circle cx="540" cy="401" r="5"/><circle cx="600" cy="401" r="5"/><circle cx="650" cy="401" r="5"/>
    <circle cx="240" cy="439" r="5"/><circle cx="300" cy="439" r="5"/><circle cx="360" cy="439" r="5"/><circle cx="420" cy="439" r="5"/><circle cx="480" cy="439" r="5"/><circle cx="540" cy="439" r="5"/><circle cx="600" cy="439" r="5"/><circle cx="650" cy="439" r="5"/>
  </g>
  <text x="200" y="560" fill="#5f716d" font-family="'Source Serif 4', Georgia, serif" font-size="20">Load → vacuum → dry → break vacuum → unload</text>
  <!-- timeline stop-start -->
  <text x="112" y="620" fill="#5f716d" font-family="'Source Sans 3', Arial, sans-serif" font-size="19">Machine idle between lots</text>
  <g stroke="#b98a3e" stroke-width="8" stroke-linecap="round">
    <line x1="112" y1="648" x2="230" y2="648"/>
    <line x1="270" y1="648" x2="388" y2="648"/>
    <line x1="428" y1="648" x2="546" y2="648"/>
  </g>
  <text x="620" y="654" fill="#b98a3e" font-family="'Source Sans 3', Arial, sans-serif" font-size="18">gaps = downtime</text>

  <!-- divider -->
  <line x1="820" y1="330" x2="820" y2="690" stroke="#d4c7b1" stroke-width="2"/>

  <!-- CONTINUOUS -->
  <text x="864" y="322" fill="#24433d" font-family="'Source Sans 3', Arial, sans-serif" font-size="24" letter-spacing="2">CONTINUOUS BELT — zones run at once</text>
  <rect x="864" y="352" width="600" height="200" rx="16" fill="#eef3ee" stroke="#9db3a6" stroke-width="2"/>
  <!-- belt -->
  <line x1="884" y1="500" x2="1444" y2="500" stroke="#8a9a8f" stroke-width="6"/>
  <!-- zones -->
  <rect x="892" y="376" width="170" height="104" rx="10" fill="#dbe7f0" stroke="#7f9bb0"/>
  <rect x="1078" y="376" width="170" height="104" rx="10" fill="#fbe6cf" stroke="#c99a5c"/>
  <rect x="1264" y="376" width="172" height="104" rx="10" fill="#e7ddef" stroke="#9d86b3"/>
  <text x="977" y="432" fill="#3d5568" font-family="'Source Sans 3', Arial, sans-serif" font-size="17" text-anchor="middle">FREEZE</text>
  <text x="1163" y="426" fill="#8a5a1f" font-family="'Source Sans 3', Arial, sans-serif" font-size="17" text-anchor="middle">PRIMARY</text>
  <text x="1163" y="448" fill="#8a5a1f" font-family="'Source Sans 3', Arial, sans-serif" font-size="17" text-anchor="middle">DRYING</text>
  <text x="1350" y="426" fill="#5c437a" font-family="'Source Sans 3', Arial, sans-serif" font-size="17" text-anchor="middle">SECONDARY</text>
  <text x="1350" y="448" fill="#5c437a" font-family="'Source Sans 3', Arial, sans-serif" font-size="17" text-anchor="middle">DRYING</text>
  <!-- moving fruit -->
  <g fill="#e07a4b">
    <circle cx="905" cy="500" r="6"/><circle cx="1000" cy="500" r="6"/><circle cx="1120" cy="500" r="6"/><circle cx="1240" cy="500" r="6"/><circle cx="1360" cy="500" r="6"/><circle cx="1430" cy="500" r="6"/>
  </g>
  <!-- flow arrows -->
  <g stroke="#24433d" stroke-width="3" fill="none">
    <path d="M884 530 L1444 530" marker-end="url(#arr)"/>
  </g>
  <defs>
    <marker id="arr" markerWidth="12" markerHeight="12" refX="9" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#24433d"/></marker>
  </defs>
  <text x="864" y="600" fill="#5f716d" font-family="'Source Serif 4', Georgia, serif" font-size="20">Fruit enters one end while finished fruit leaves the other</text>
  <text x="864" y="650" fill="#2f6b4f" font-family="'Source Sans 3', Arial, sans-serif" font-size="19">Steady output, less idle time</text>

  <text x="112" y="742" fill="#172f2b" font-family="'Source Serif 4', Georgia, serif" font-size="22" font-style="italic">Batch wins on flexibility and per-lot control. Continuous wins on steady, high-volume uniformity.</text>
  <text x="112" y="792" fill="#5f716d" font-family="'Source Sans 3', Arial, sans-serif" font-size="18">Freeze-Dried-Fruit.com — Technology field notes</text>
</svg>
