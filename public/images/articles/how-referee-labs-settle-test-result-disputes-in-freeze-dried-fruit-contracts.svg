<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">How referee labs settle test result disputes in freeze-dried fruit contracts</title>
  <desc id="desc">Flow diagram showing one lot split into buyer, supplier, and retained samples, a tolerance band decision that either splits the difference or escalates to a binding referee lab result.</desc>
  <rect width="1200" height="680" fill="#f6f4ee"/>
  <rect x="70" y="60" width="1060" height="560" rx="34" fill="#fffdf8" stroke="#d8d2c3" stroke-width="2"/>

  <text x="110" y="116" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="33" font-weight="700">One lot, three samples, one binding answer</text>
  <text x="110" y="150" fill="#68736c" font-family="Inter, Arial, sans-serif" font-size="17">The clause has to exist before anyone has a position to defend.</text>

  <!-- lot -->
  <g transform="translate(110 200)">
    <rect width="188" height="96" rx="18" fill="#e7dcc4" stroke="#c9b98f" stroke-width="2"/>
    <text x="94" y="44" text-anchor="middle" fill="#6f6240" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700">One lot</text>
    <text x="94" y="68" text-anchor="middle" fill="#8a7d5e" font-family="Inter, Arial, sans-serif" font-size="13">sampled once, by procedure</text>
  </g>

  <!-- split arrows -->
  <g stroke="#a9a294" stroke-width="2.5" fill="none">
    <path d="M298 232 C 340 232, 340 196, 382 196"/>
    <path d="M298 248 C 340 248, 340 284, 382 284"/>
    <path d="M298 256 C 340 256, 340 396, 382 396"/>
  </g>

  <!-- buyer lab -->
  <g transform="translate(382 164)">
    <rect width="252" height="66" rx="16" fill="#f4f0e5" stroke="#d8d2c3"/>
    <text x="20" y="30" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">Buyer's lab</text>
    <text x="20" y="52" fill="#5f6a63" font-family="Inter, Arial, sans-serif" font-size="13">result A</text>
  </g>
  <!-- supplier lab -->
  <g transform="translate(382 252)">
    <rect width="252" height="66" rx="16" fill="#f4f0e5" stroke="#d8d2c3"/>
    <text x="20" y="30" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">Supplier's lab</text>
    <text x="20" y="52" fill="#5f6a63" font-family="Inter, Arial, sans-serif" font-size="13">result B</text>
  </g>
  <!-- retained -->
  <g transform="translate(382 364)">
    <rect width="252" height="66" rx="16" fill="#f4f0e5" stroke="#c9b98f" stroke-dasharray="7 5" stroke-width="2"/>
    <text x="20" y="30" fill="#8a7d5e" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">Retained sample</text>
    <text x="20" y="52" fill="#8a7d5e" font-family="Inter, Arial, sans-serif" font-size="13">sealed · stored · held to term</text>
  </g>

  <!-- decision -->
  <g transform="translate(682 196)">
    <path d="M110 0 L220 78 L110 156 L0 78 Z" fill="#fffdf8" stroke="#b45f42" stroke-width="2.5"/>
    <text x="110" y="70" text-anchor="middle" fill="#b45f42" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">|A − B|</text>
    <text x="110" y="94" text-anchor="middle" fill="#b45f42" font-family="Inter, Arial, sans-serif" font-size="13">vs tolerance</text>
  </g>
  <line x1="634" y1="196" x2="682" y2="262" stroke="#a9a294" stroke-width="2.5"/>
  <line x1="634" y1="286" x2="682" y2="274" stroke="#a9a294" stroke-width="2.5"/>

  <!-- inside tolerance -->
  <g transform="translate(806 172)">
    <path d="M96 24 L96 -6 L206 -6" fill="none" stroke="#5a7d56" stroke-width="2.5"/>
  </g>
  <g transform="translate(902 128)">
    <rect width="196" height="80" rx="16" fill="#eef2e6" stroke="#5a7d56" stroke-width="2"/>
    <text x="18" y="32" fill="#3f5c3b" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">Within tolerance</text>
    <text x="18" y="56" fill="#5a7d56" font-family="Inter, Arial, sans-serif" font-size="13">split the difference;</text>
    <text x="18" y="72" fill="#5a7d56" font-family="Inter, Arial, sans-serif" font-size="13">mean is official</text>
  </g>

  <!-- outside tolerance -->
  <path d="M902 274 L960 274" fill="none" stroke="#b45f42" stroke-width="2.5"/>
  <g transform="translate(806 322)">
    <path d="M96 -48 L96 26 L96 26" fill="none" stroke="#b45f42" stroke-width="2.5"/>
  </g>
  <g transform="translate(902 316)">
    <rect width="196" height="100" rx="16" fill="#f7ece6" stroke="#b45f42" stroke-width="2"/>
    <text x="18" y="32" fill="#8f4630" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">Referee lab</text>
    <text x="18" y="56" fill="#b45f42" font-family="Inter, Arial, sans-serif" font-size="13">named in advance</text>
    <text x="18" y="74" fill="#b45f42" font-family="Inter, Arial, sans-serif" font-size="13">tests the retain</text>
    <text x="18" y="92" fill="#b45f42" font-family="Inter, Arial, sans-serif" font-size="13">result is binding</text>
  </g>
  <path d="M634 397 C 780 397, 800 380, 900 366" fill="none" stroke="#c9b98f" stroke-width="2.5" stroke-dasharray="7 5"/>

  <!-- footer bar -->
  <g transform="translate(110 470)">
    <rect width="980" height="114" rx="20" fill="#f4f0e5" stroke="#d8d2c3"/>
    <text x="26" y="36" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">Four things the clause must name</text>
    <g font-family="Inter, Arial, sans-serif" font-size="14" fill="#5f6a63">
      <text x="26" y="66">1 · the test method and its reference standard</text>
      <text x="26" y="92">2 · the sampling procedure and retention period</text>
      <text x="520" y="66">3 · the referee lab, or an agreed short list</text>
      <text x="520" y="92">4 · who pays — normally the party proved wrong</text>
    </g>
  </g>
</svg>
