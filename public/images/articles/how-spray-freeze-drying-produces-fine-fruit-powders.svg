<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">How Spray Freeze-Drying Produces Fine Fruit Powders</title>
  <desc id="desc">A four-stage path: fruit liquid, atomized into a spray of droplets, frozen in flight into ice beads, then freeze-dried into small porous powder particles.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7f2e8"/>
      <stop offset="100%" stop-color="#efe7d7"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d97a43"/>
      <stop offset="100%" stop-color="#cf5d3d"/>
    </linearGradient>
    <style>
      .panel{fill:#fffaf1;stroke:#17313b;stroke-width:2.5}
      .ink{fill:#17313b}
      .muted{fill:#58707a}
      .small{font:500 23px 'Source Sans 3',Arial,sans-serif}
      .label{font:600 28px 'Source Sans 3',Arial,sans-serif;letter-spacing:.08em;text-transform:uppercase}
      .stage{font:600 26px 'Source Sans 3',Arial,sans-serif}
      .title{font:700 52px 'Source Serif 4',Georgia,serif}
      .mono{font:600 22px 'JetBrains Mono',monospace}
      .line{stroke:#17313b;stroke-width:3;fill:none;stroke-linecap:round;stroke-linejoin:round}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect x="56" y="48" width="1488" height="804" rx="28" fill="none" stroke="#17313b" stroke-width="2.5"/>

  <text x="96" y="118" class="label ink">Technology</text>
  <text x="96" y="186" class="title ink">Freeze the mist, not the slice</text>
  <text x="96" y="228" class="small muted">Atomize, freeze in flight, sublimate. The particle is set before drying begins.</text>

  <rect x="96" y="288" width="320" height="430" rx="22" class="panel"/>
  <rect x="450" y="288" width="320" height="430" rx="22" class="panel"/>
  <rect x="804" y="288" width="320" height="430" rx="22" class="panel"/>
  <rect x="1158" y="288" width="346" height="430" rx="22" class="panel"/>

  <text x="120" y="338" class="stage ink">1 · Liquid</text>
  <text x="474" y="338" class="stage ink">2 · Atomize</text>
  <text x="828" y="338" class="stage ink">3 · Freeze in flight</text>
  <text x="1182" y="338" class="stage ink">4 · Porous powder</text>

  <!-- stage 1: liquid in a vessel -->
  <path d="M168 430h176l-22 150c-3 22 -28 38 -66 38s-63-16 -66-38z" fill="url(#accent)" stroke="#17313b" stroke-width="3"/>
  <ellipse cx="256" cy="430" rx="88" ry="18" fill="#ef8e54" stroke="#17313b" stroke-width="3"/>
  <text x="120" y="652" class="mono muted">juice / extract</text>
  <text x="120" y="684" class="small muted">low pulp, clean feed</text>

  <!-- stage 2: nozzle spraying droplets -->
  <path d="M500 452h120l-26 40h-68z" fill="#cfe0e6" stroke="#17313b" stroke-width="3"/>
  <path d="M526 492l-18 70M560 492l0 80M594 492l18 70" class="line"/>
  <circle cx="500" cy="582" r="7" fill="url(#accent)" stroke="#17313b" stroke-width="2"/>
  <circle cx="540" cy="600" r="6" fill="url(#accent)" stroke="#17313b" stroke-width="2"/>
  <circle cx="560" cy="586" r="8" fill="url(#accent)" stroke="#17313b" stroke-width="2"/>
  <circle cx="588" cy="604" r="6" fill="url(#accent)" stroke="#17313b" stroke-width="2"/>
  <circle cx="622" cy="588" r="7" fill="url(#accent)" stroke="#17313b" stroke-width="2"/>
  <text x="474" y="652" class="mono muted">fine droplets</text>
  <text x="474" y="684" class="small muted">size set here</text>

  <!-- stage 3: frozen beads in cold gas -->
  <circle cx="868" cy="486" r="16" fill="#cfe0e6" stroke="#17313b" stroke-width="3"/>
  <circle cx="924" cy="520" r="18" fill="#cfe0e6" stroke="#17313b" stroke-width="3"/>
  <circle cx="980" cy="490" r="14" fill="#cfe0e6" stroke="#17313b" stroke-width="3"/>
  <circle cx="1040" cy="524" r="17" fill="#cfe0e6" stroke="#17313b" stroke-width="3"/>
  <circle cx="900" cy="560" r="13" fill="#cfe0e6" stroke="#17313b" stroke-width="3"/>
  <circle cx="1000" cy="556" r="15" fill="#cfe0e6" stroke="#17313b" stroke-width="3"/>
  <path d="M868 480l0 12M862 486l12 0" class="line"/>
  <path d="M980 484l0 12M974 490l12 0" class="line"/>
  <text x="828" y="652" class="mono muted">cold gas · fast</text>
  <text x="828" y="684" class="small muted">tiny ice crystals lock in</text>

  <!-- stage 4: porous powder particles -->
  <circle cx="1230" cy="500" r="34" fill="#ef8e54" stroke="#17313b" stroke-width="3"/>
  <circle cx="1222" cy="492" r="6" fill="#fffaf1" stroke="#17313b" stroke-width="1.5"/>
  <circle cx="1242" cy="498" r="5" fill="#fffaf1" stroke="#17313b" stroke-width="1.5"/>
  <circle cx="1230" cy="512" r="6" fill="#fffaf1" stroke="#17313b" stroke-width="1.5"/>
  <circle cx="1318" cy="528" r="26" fill="#f1ba55" stroke="#17313b" stroke-width="3"/>
  <circle cx="1312" cy="522" r="5" fill="#fffaf1" stroke="#17313b" stroke-width="1.5"/>
  <circle cx="1326" cy="532" r="4" fill="#fffaf1" stroke="#17313b" stroke-width="1.5"/>
  <circle cx="1268" cy="560" r="20" fill="#ef8e54" stroke="#17313b" stroke-width="3"/>
  <circle cx="1264" cy="556" r="4" fill="#fffaf1" stroke="#17313b" stroke-width="1.5"/>
  <text x="1182" y="652" class="mono muted">rounded · porous</text>
  <text x="1182" y="684" class="small muted">flows + dissolves fast</text>

  <!-- arrows -->
  <path d="M420 503h26" class="line"/><path d="M438 495l10 8-10 8" class="line"/>
  <path d="M774 503h26" class="line"/><path d="M792 495l10 8-10 8" class="line"/>
  <path d="M1128 503h26" class="line"/><path d="M1146 495l10 8-10 8" class="line"/>

  <text x="96" y="790" class="small muted">The same open structure that speeds dissolution makes the powder thirsty for humidity.</text>
</svg>
