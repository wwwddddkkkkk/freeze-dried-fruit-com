<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">How bonded warehouses and duty deferral change freeze-dried fruit import cash flow</title>
  <desc id="desc">Diagram comparing a standard path where import duty is paid on arrival with a bonded warehouse path where freeze-dried fruit is stored duty-deferred and duty is paid only as stock is withdrawn for domestic sale.</desc>
  <rect width="1600" height="900" fill="#f4efe6"/>
  <rect x="64" y="64" width="1472" height="772" rx="30" fill="#fcfaf5" stroke="#d4c7b1" stroke-width="2"/>
  <text x="112" y="138" fill="#24433d" font-family="'Source Sans 3', Arial, sans-serif" font-size="26" letter-spacing="5">INDUSTRY INSIGHTS</text>
  <text x="112" y="196" fill="#172f2b" font-family="'DM Serif Display', Georgia, serif" font-size="48">Pay Duty on Arrival, or as You Sell</text>
  <text x="112" y="238" fill="#5f716d" font-family="'Source Serif 4', Georgia, serif" font-size="23">Bonded storage shifts when duty is due — and sometimes whether it applies at all.</text>

  <!-- STANDARD PATH -->
  <text x="112" y="320" fill="#b5473a" font-family="'Source Sans 3', Arial, sans-serif" font-size="24" letter-spacing="2">STANDARD IMPORT — duty due on arrival</text>
  <g>
    <rect x="112" y="348" width="150" height="96" rx="12" fill="#eef3ee" stroke="#9db3a6" stroke-width="2"/>
    <text x="187" y="402" text-anchor="middle" fill="#3d5347" font-family="'Source Sans 3', Arial, sans-serif" font-size="18">Arrives</text>
    <rect x="352" y="348" width="180" height="96" rx="12" fill="#f7dcd6" stroke="#c98a7e" stroke-width="2"/>
    <text x="442" y="392" text-anchor="middle" fill="#a03b2e" font-family="'Source Sans 3', Arial, sans-serif" font-size="18">Clear customs</text>
    <text x="442" y="418" text-anchor="middle" fill="#a03b2e" font-family="'Source Sans 3', Arial, sans-serif" font-size="16">pay ALL duty now</text>
    <rect x="622" y="348" width="180" height="96" rx="12" fill="#eef3ee" stroke="#9db3a6" stroke-width="2"/>
    <text x="712" y="392" text-anchor="middle" fill="#3d5347" font-family="'Source Sans 3', Arial, sans-serif" font-size="17">Warehouse</text>
    <text x="712" y="418" text-anchor="middle" fill="#3d5347" font-family="'Source Sans 3', Arial, sans-serif" font-size="16">(stock unsold)</text>
    <rect x="892" y="348" width="170" height="96" rx="12" fill="#eef3ee" stroke="#9db3a6" stroke-width="2"/>
    <text x="977" y="402" text-anchor="middle" fill="#3d5347" font-family="'Source Sans 3', Arial, sans-serif" font-size="18">Sells slowly</text>
  </g>
  <g stroke="#b5473a" stroke-width="3" fill="none" marker-end="url(#a2)">
    <line x1="262" y1="396" x2="346" y2="396"/><line x1="532" y1="396" x2="616" y2="396"/><line x1="802" y1="396" x2="886" y2="396"/>
  </g>
  <text x="352" y="478" fill="#a03b2e" font-family="'Source Serif 4', Georgia, serif" font-style="italic" font-size="19">Cash tied up in duty while product sits.</text>

  <!-- BONDED PATH -->
  <text x="112" y="560" fill="#2f6b4f" font-family="'Source Sans 3', Arial, sans-serif" font-size="24" letter-spacing="2">BONDED WAREHOUSE — duty deferred</text>
  <g>
    <rect x="112" y="588" width="150" height="96" rx="12" fill="#eef3ee" stroke="#9db3a6" stroke-width="2"/>
    <text x="187" y="642" text-anchor="middle" fill="#3d5347" font-family="'Source Sans 3', Arial, sans-serif" font-size="18">Arrives</text>
    <rect x="352" y="588" width="280" height="96" rx="12" fill="#dcefe2" stroke="#7bad8e" stroke-width="2"/>
    <text x="492" y="632" text-anchor="middle" fill="#2f6b4f" font-family="'Source Sans 3', Arial, sans-serif" font-size="18">Bonded storage</text>
    <text x="492" y="658" text-anchor="middle" fill="#2f6b4f" font-family="'Source Sans 3', Arial, sans-serif" font-size="16">no duty yet · held duty-free</text>
    <rect x="722" y="588" width="200" height="96" rx="12" fill="#fbe6cf" stroke="#c99a5c" stroke-width="2"/>
    <text x="822" y="632" text-anchor="middle" fill="#8a5a1f" font-family="'Source Sans 3', Arial, sans-serif" font-size="17">Withdraw to sell</text>
    <text x="822" y="658" text-anchor="middle" fill="#8a5a1f" font-family="'Source Sans 3', Arial, sans-serif" font-size="16">pay duty per lot</text>
    <rect x="1012" y="588" width="220" height="96" rx="12" fill="#dbe7f0" stroke="#7f9bb0" stroke-width="2"/>
    <text x="1122" y="632" text-anchor="middle" fill="#3d5568" font-family="'Source Sans 3', Arial, sans-serif" font-size="17">Or re-export</text>
    <text x="1122" y="658" text-anchor="middle" fill="#3d5568" font-family="'Source Sans 3', Arial, sans-serif" font-size="16">domestic duty may never apply</text>
  </g>
  <g stroke="#2f6b4f" stroke-width="3" fill="none" marker-end="url(#a3)">
    <line x1="262" y1="636" x2="346" y2="636"/><line x1="632" y1="636" x2="716" y2="636"/>
    <path d="M632 660 L1006 660"/>
  </g>
  <defs>
    <marker id="a2" markerWidth="12" markerHeight="12" refX="9" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#b5473a"/></marker>
    <marker id="a3" markerWidth="12" markerHeight="12" refX="9" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#2f6b4f"/></marker>
  </defs>

  <text x="112" y="748" fill="#172f2b" font-family="'Source Serif 4', Georgia, serif" font-size="22" font-style="italic">The rate is the same. The timing — and freed working capital — is the win.</text>
  <text x="112" y="792" fill="#5f716d" font-family="'Source Sans 3', Arial, sans-serif" font-size="18">Freeze-Dried-Fruit.com — Industry field notes</text>
</svg>
