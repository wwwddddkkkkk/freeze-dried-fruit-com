<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">Best freeze-dried fruit for cereal and granola</title>
  <desc id="desc">An illustrated comparison of cereal and granola bowls showing how strawberry, blueberry, apple, banana, and raspberry perform as freeze-dried toppings.</desc>
  <rect width="1200" height="680" fill="#f6f4ee"/>
  <rect x="74" y="72" width="1052" height="536" rx="34" fill="#fffdf8" stroke="#d8d2c3" stroke-width="2"/>
  <text x="112" y="128" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="700">Match the fruit to the bowl, not just the flavor</text>
  <text x="112" y="166" fill="#68736c" font-family="Inter, Arial, sans-serif" font-size="17">Cereal favors spoon-friendly pieces; granola can handle larger visible fruit and more controlled crumble.</text>

  <g transform="translate(126 220)">
    <text x="130" y="0" text-anchor="middle" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">Cereal bowl</text>
    <circle cx="130" cy="144" r="114" fill="#f7f3ea" stroke="#d8d2c3" stroke-width="2"/>
    <circle cx="130" cy="144" r="86" fill="#fffdf8"/>
    <circle cx="92" cy="128" r="14" fill="#d86158"/>
    <circle cx="156" cy="118" r="12" fill="#4b6f95"/>
    <rect x="104" y="168" width="28" height="18" rx="8" fill="#e9bf6a"/>
    <rect x="148" y="164" width="24" height="16" rx="8" fill="#efd69b"/>
    <circle cx="184" cy="156" r="10" fill="#b34a65"/>
    <text x="18" y="260" fill="#4b5a54" font-family="Inter, Arial, sans-serif" font-size="15">Best fit: strawberry, blueberry, apple</text>
    <text x="18" y="286" fill="#4b5a54" font-family="Inter, Arial, sans-serif" font-size="15">Goal: smaller pieces and quick flavor release</text>
  </g>

  <g transform="translate(626 220)">
    <text x="130" y="0" text-anchor="middle" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">Granola bowl</text>
    <circle cx="130" cy="144" r="114" fill="#f7f3ea" stroke="#d8d2c3" stroke-width="2"/>
    <circle cx="130" cy="144" r="86" fill="#fffdf8"/>
    <rect x="76" y="106" width="38" height="24" rx="10" fill="#de7d56"/>
    <circle cx="164" cy="114" r="13" fill="#4b6f95"/>
    <rect x="104" y="166" width="32" height="20" rx="9" fill="#efd69b"/>
    <circle cx="178" cy="170" r="11" fill="#b34a65"/>
    <circle cx="84" cy="176" r="8" fill="#c85671"/>
    <text x="6" y="260" fill="#4b5a54" font-family="Inter, Arial, sans-serif" font-size="15">Best fit: blueberry, strawberry, banana, raspberry</text>
    <text x="6" y="286" fill="#4b5a54" font-family="Inter, Arial, sans-serif" font-size="15">Goal: visible fruit that can sit beside dense clusters</text>
  </g>

  <g transform="translate(434 236)">
    <rect width="312" height="252" rx="26" fill="#fffdf8" stroke="#d8d2c3"/>
    <text x="24" y="38" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Quick selection guide</text>
    <text x="24" y="78" fill="#27453c" font-family="Inter, Arial, sans-serif" font-size="15">Strawberry</text>
    <text x="128" y="78" fill="#4b5a54" font-family="Inter, Arial, sans-serif" font-size="15">best all-around color + familiarity</text>
    <text x="24" y="114" fill="#34526a" font-family="Inter, Arial, sans-serif" font-size="15">Blueberry</text>
    <text x="128" y="114" fill="#4b5a54" font-family="Inter, Arial, sans-serif" font-size="15">compact pieces, tidy spoonfuls</text>
    <text x="24" y="150" fill="#6e5a2f" font-family="Inter, Arial, sans-serif" font-size="15">Apple / banana</text>
    <text x="128" y="150" fill="#4b5a54" font-family="Inter, Arial, sans-serif" font-size="15">sweeter, less tart bowls</text>
    <text x="24" y="186" fill="#713d2f" font-family="Inter, Arial, sans-serif" font-size="15">Raspberry</text>
    <text x="128" y="186" fill="#4b5a54" font-family="Inter, Arial, sans-serif" font-size="15">higher intensity, more crumble</text>
    <text x="24" y="222" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">Add near serving time if crispness matters.</text>
  </g>

  <g transform="translate(112 536)">
    <rect width="976" height="34" rx="17" fill="#1f332d"/>
    <text x="28" y="23" fill="#fffdf8" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">No matching local consumer photo was available, so this applications cover uses a custom editorial SVG instead.</text>
  </g>
</svg>
