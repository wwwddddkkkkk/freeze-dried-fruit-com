<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">What an organic freeze-dried fruit label does and doesn't tell you</title>
  <desc id="desc">Annotated label diagram showing which parts of an organic freeze-dried fruit package indicate certification and which quality questions still need separate checks.</desc>
  <rect width="1200" height="680" fill="#f6f4ee"/>
  <rect x="74" y="72" width="1052" height="536" rx="34" fill="#fffdf8" stroke="#d8d2c3" stroke-width="2"/>
  <text x="112" y="128" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="700">Organic explains one layer of the product</text>
  <text x="112" y="166" fill="#68736c" font-family="Inter, Arial, sans-serif" font-size="17">Certification matters, but crunch, breakage, and packaging still need separate proof.</text>

  <g transform="translate(134 214)">
    <rect width="430" height="300" rx="26" fill="#fffdf8" stroke="#d8d2c3" stroke-width="2"/>
    <rect x="28" y="28" width="138" height="48" rx="18" fill="#cadccf"/>
    <text x="52" y="58" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Organic</text>
    <text x="28" y="112" fill="#4a5953" font-family="Inter, Arial, sans-serif" font-size="15">Ingredient line</text>
    <line x1="28" y1="122" x2="384" y2="122" stroke="#d8d2c3"/>
    <text x="28" y="164" fill="#4a5953" font-family="Inter, Arial, sans-serif" font-size="15">Fruit format</text>
    <line x1="28" y1="174" x2="384" y2="174" stroke="#d8d2c3"/>
    <text x="28" y="216" fill="#4a5953" font-family="Inter, Arial, sans-serif" font-size="15">Net weight / pack</text>
    <line x1="28" y1="226" x2="384" y2="226" stroke="#d8d2c3"/>
    <text x="28" y="268" fill="#4a5953" font-family="Inter, Arial, sans-serif" font-size="15">Handling + storage</text>
  </g>

  <g transform="translate(606 214)">
    <rect width="206" height="300" rx="26" fill="#edf6f1" stroke="#c8d7cb"/>
    <text x="24" y="42" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="700">It tells you</text>
    <text x="24" y="92" fill="#425650" font-family="Inter, Arial, sans-serif" font-size="15">certification status</text>
    <text x="24" y="138" fill="#425650" font-family="Inter, Arial, sans-serif" font-size="15">claim structure</text>
    <text x="24" y="184" fill="#425650" font-family="Inter, Arial, sans-serif" font-size="15">documentation burden</text>
    <text x="24" y="230" fill="#425650" font-family="Inter, Arial, sans-serif" font-size="15">sourcing positioning</text>
  </g>

  <g transform="translate(840 214)">
    <rect width="248" height="300" rx="26" fill="#f5eee9" stroke="#dbcdbf"/>
    <text x="24" y="42" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="700">It does not tell you</text>
    <text x="24" y="92" fill="#6a5744" font-family="Inter, Arial, sans-serif" font-size="15">best variety choice</text>
    <text x="24" y="138" fill="#6a5744" font-family="Inter, Arial, sans-serif" font-size="15">lowest breakage</text>
    <text x="24" y="184" fill="#6a5744" font-family="Inter, Arial, sans-serif" font-size="15">best crunch retention</text>
    <text x="24" y="230" fill="#6a5744" font-family="Inter, Arial, sans-serif" font-size="15">strongest package barrier</text>
  </g>

  <g transform="translate(112 538)">
    <rect width="976" height="34" rx="17" fill="#1f332d"/>
    <text x="28" y="23" fill="#fffdf8" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">Label rule: certification can support the value story, but the bag still has to prove the quality story.</text>
  </g>
</svg>
