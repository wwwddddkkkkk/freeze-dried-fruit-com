<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Best freeze-dried fruit for parfaits and layered breakfast cups</title>
  <desc id="desc">Layered breakfast cup diagram comparing strawberry, blueberry, apple, and raspberry for visibility, crunch retention, and flavor contrast.</desc>
  <rect width="1600" height="900" fill="#f4efe6"/>
  <rect x="64" y="64" width="1472" height="772" rx="28" fill="#fffaf2" stroke="#ccbda1" stroke-width="2"/>
  <text x="110" y="136" fill="#3d3326" font-family="'DM Serif Display', Georgia, serif" font-size="40">Parfait-Friendly Fruit</text>
  <text x="110" y="178" fill="#7a6a56" font-family="'Source Sans 3', Arial, sans-serif" font-size="22">Choosing freeze-dried fruit for layered breakfast cups</text>

  <rect x="120" y="236" width="544" height="484" rx="28" fill="#fcf6ea" stroke="#d3c4a6"/>
  <text x="162" y="290" fill="#3d3326" font-family="'Source Sans 3', Arial, sans-serif" font-size="24" letter-spacing="3">LAYER LOGIC</text>

  <path d="M270 380 C260 340, 300 322, 392 322 C484 322, 524 340, 514 380 L486 612 C480 644, 450 660, 392 660 C334 660, 304 644, 298 612 Z" fill="#ffffff" stroke="#cdbda0" stroke-width="3"/>
  <rect x="316" y="372" width="152" height="66" rx="12" fill="#f4d9dc"/>
  <rect x="316" y="438" width="152" height="54" rx="12" fill="#f4f0e7"/>
  <rect x="316" y="492" width="152" height="58" rx="12" fill="#e6d3a1"/>
  <rect x="316" y="550" width="152" height="54" rx="12" fill="#f8e7ed"/>
  <text x="346" y="414" fill="#7b4a55" font-family="'Source Sans 3', Arial, sans-serif" font-size="20">fruit layer</text>
  <text x="344" y="471" fill="#6d6557" font-family="'Source Sans 3', Arial, sans-serif" font-size="20">yogurt</text>
  <text x="334" y="528" fill="#70571f" font-family="'Source Sans 3', Arial, sans-serif" font-size="20">granola</text>
  <text x="346" y="585" fill="#7b4a55" font-family="'Source Sans 3', Arial, sans-serif" font-size="20">top fruit</text>

  <line x1="468" y1="400" x2="590" y2="386" stroke="#cb5d58" stroke-width="3"/>
  <text x="606" y="390" fill="#7a6a56" font-family="'Source Sans 3', Arial, sans-serif" font-size="20">visible side layer</text>
  <line x1="468" y1="577" x2="590" y2="612" stroke="#88b8aa" stroke-width="3"/>
  <text x="606" y="618" fill="#7a6a56" font-family="'Source Sans 3', Arial, sans-serif" font-size="20">late-added crunch stays stronger</text>

  <rect x="710" y="236" width="770" height="484" rx="28" fill="#fcf6ea" stroke="#d3c4a6"/>
  <text x="752" y="290" fill="#3d3326" font-family="'Source Sans 3', Arial, sans-serif" font-size="24" letter-spacing="3">BEST CHOICES</text>

  <rect x="752" y="332" width="316" height="142" rx="22" fill="#ffffff" stroke="#d3c4a6"/>
  <text x="786" y="378" fill="#3d3326" font-family="'DM Serif Display', Georgia, serif" font-size="30">Strawberry</text>
  <text x="786" y="416" fill="#7a6a56" font-family="'Source Sans 3', Arial, sans-serif" font-size="20">best all-around</text>
  <text x="786" y="448" fill="#7a6a56" font-family="'Source Sans 3', Arial, sans-serif" font-size="20">strong color and familiar flavor</text>

  <rect x="1098" y="332" width="316" height="142" rx="22" fill="#ffffff" stroke="#d3c4a6"/>
  <text x="1132" y="378" fill="#3d3326" font-family="'DM Serif Display', Georgia, serif" font-size="30">Blueberry</text>
  <text x="1132" y="416" fill="#7a6a56" font-family="'Source Sans 3', Arial, sans-serif" font-size="20">clean breakfast profile</text>
  <text x="1132" y="448" fill="#7a6a56" font-family="'Source Sans 3', Arial, sans-serif" font-size="20">neat layering and easy spooning</text>

  <rect x="752" y="500" width="316" height="142" rx="22" fill="#ffffff" stroke="#d3c4a6"/>
  <text x="786" y="546" fill="#3d3326" font-family="'DM Serif Display', Georgia, serif" font-size="30">Apple</text>
  <text x="786" y="584" fill="#7a6a56" font-family="'Source Sans 3', Arial, sans-serif" font-size="20">best for delayed eating</text>
  <text x="786" y="616" fill="#7a6a56" font-family="'Source Sans 3', Arial, sans-serif" font-size="20">holds identity longest</text>

  <rect x="1098" y="500" width="316" height="142" rx="22" fill="#ffffff" stroke="#d3c4a6"/>
  <text x="1132" y="546" fill="#3d3326" font-family="'DM Serif Display', Georgia, serif" font-size="30">Raspberry</text>
  <text x="1132" y="584" fill="#7a6a56" font-family="'Source Sans 3', Arial, sans-serif" font-size="20">best tart accent</text>
  <text x="1132" y="616" fill="#7a6a56" font-family="'Source Sans 3', Arial, sans-serif" font-size="20">use in smaller amounts</text>

  <rect x="120" y="748" width="1360" height="66" rx="18" fill="#efe4d0" stroke="#d3c4a6"/>
  <text x="160" y="790" fill="#3d3326" font-family="'Source Sans 3', Arial, sans-serif" font-size="22">Timing rule: if the cup will sit, keep some fruit dry until the last moment. Apple and blueberry are the most forgiving delayed-eating options.</text>
</svg>
