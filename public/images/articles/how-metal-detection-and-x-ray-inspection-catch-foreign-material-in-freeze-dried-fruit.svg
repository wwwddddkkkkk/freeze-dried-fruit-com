<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">How metal detection and X-ray inspection catch foreign material in freeze-dried fruit</title>
  <desc id="desc">A packing-line diagram comparing a metal detector and an X-ray inspection station, showing which contaminants each can and cannot catch in low-density freeze-dried fruit.</desc>
  <rect width="1200" height="680" fill="#f6f4ee"/>
  <rect x="74" y="72" width="1052" height="536" rx="34" fill="#fffdf8" stroke="#d8d2c3" stroke-width="2"/>
  <text x="112" y="128" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="33" font-weight="700">Two detectors, two different blind spots</text>
  <text x="112" y="166" fill="#68736c" font-family="Inter, Arial, sans-serif" font-size="17">Freeze-dried fruit is airy: dense fragments stand out, low-density ones can hide.</text>

  <!-- conveyor line -->
  <rect x="112" y="232" width="976" height="26" rx="13" fill="#e7e1d3"/>
  <g fill="#cfc8b8">
    <circle cx="150" cy="245" r="7"/><circle cx="250" cy="245" r="7"/><circle cx="350" cy="245" r="7"/>
    <circle cx="600" cy="245" r="7"/><circle cx="700" cy="245" r="7"/><circle cx="800" cy="245" r="7"/>
    <circle cx="1000" cy="245" r="7"/>
  </g>
  <!-- airy fruit pack on belt -->
  <g transform="translate(140 196)">
    <rect width="86" height="38" rx="10" fill="#eef4ef" stroke="#9db5a7" stroke-width="2"/>
    <circle cx="24" cy="19" r="9" fill="#c45d7d"/>
    <circle cx="46" cy="22" r="7" fill="#ead8b7"/>
    <circle cx="64" cy="17" r="8" fill="#c7845f"/>
  </g>
  <text x="183" y="288" fill="#68736c" font-family="Inter, Arial, sans-serif" font-size="13" text-anchor="middle">airy fruit pack</text>

  <!-- Metal detector station -->
  <g transform="translate(360 150)">
    <rect x="-18" y="34" width="170" height="120" rx="16" fill="none" stroke="#34526a" stroke-width="10"/>
    <text x="67" y="22" fill="#34526a" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" text-anchor="middle">Metal detector</text>
    <text x="67" y="186" fill="#34526a" font-family="Inter, Arial, sans-serif" font-size="13" text-anchor="middle">electromagnetic field</text>
  </g>

  <!-- X-ray station -->
  <g transform="translate(740 150)">
    <rect x="-18" y="34" width="170" height="120" rx="16" fill="#f1ece0" stroke="#7a3f35" stroke-width="4"/>
    <path d="M67 40 L40 154 M67 40 L94 154" stroke="#7a3f35" stroke-width="2" opacity="0.5"/>
    <circle cx="67" cy="44" r="6" fill="#7a3f35"/>
    <text x="67" y="22" fill="#7a3f35" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" text-anchor="middle">X-ray inspection</text>
    <text x="67" y="186" fill="#7a3f35" font-family="Inter, Arial, sans-serif" font-size="13" text-anchor="middle">density contrast</text>
  </g>

  <!-- reject diverter -->
  <g transform="translate(1000 150)">
    <path d="M0 100 l36 36" stroke="#9a6b2f" stroke-width="6" stroke-linecap="round"/>
    <rect x="22" y="150" width="60" height="40" rx="8" fill="#ead8b7" stroke="#9a6b2f" stroke-width="2"/>
    <text x="52" y="216" fill="#6e5a2f" font-family="Inter, Arial, sans-serif" font-size="13" text-anchor="middle">reject bin</text>
  </g>

  <!-- Catch matrix -->
  <g transform="translate(118 332)">
    <rect width="464" height="244" rx="22" fill="#dce7f3"/>
    <text x="28" y="42" fill="#34526a" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">Metal detector catches</text>
    <g font-family="Inter, Arial, sans-serif" font-size="16" fill="#34526a">
      <text x="28" y="84">✓ ferrous metal</text>
      <text x="28" y="116">✓ non-ferrous (aluminum, copper)</text>
      <text x="28" y="148">~ stainless steel (hardest)</text>
    </g>
    <text x="28" y="190" fill="#7a3f35" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">Blind to</text>
    <text x="28" y="218" fill="#7a3f35" font-family="Inter, Arial, sans-serif" font-size="15">✗ glass · stone · plastic · wood</text>
  </g>

  <g transform="translate(618 332)">
    <rect width="470" height="244" rx="22" fill="#ead8b7"/>
    <text x="28" y="42" fill="#6e5a2f" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">X-ray catches</text>
    <g font-family="Inter, Arial, sans-serif" font-size="16" fill="#6e5a2f">
      <text x="28" y="84">✓ metal (all types)</text>
      <text x="28" y="116">✓ glass · stone · dense bone</text>
      <text x="28" y="148">✓ some high-density plastics</text>
    </g>
    <text x="28" y="190" fill="#7a3f35" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">Blind to</text>
    <text x="28" y="218" fill="#7a3f35" font-family="Inter, Arial, sans-serif" font-size="15">✗ thin film · hair · insects · paper</text>
  </g>
</svg>
