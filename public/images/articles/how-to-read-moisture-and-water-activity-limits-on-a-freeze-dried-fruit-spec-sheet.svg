<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Reading moisture and water activity limits on a freeze-dried fruit spec sheet</title>
  <desc id="desc">A spec sheet excerpt comparing a moisture content row and a water activity row, each annotated with what it controls, plus a water activity scale showing the crisp zone, a rising-risk zone, and the microbial growth threshold.</desc>
  <rect width="1600" height="900" fill="#f4efe6"/>
  <rect x="64" y="64" width="1472" height="772" rx="28" fill="#fffaf2" stroke="#ccbda1" stroke-width="2"/>
  <text x="112" y="136" fill="#3c3226" font-family="Georgia, 'Times New Roman', serif" font-size="34">Two Water Lines, Two Different Jobs</text>
  <text x="112" y="176" fill="#786956" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20">Moisture content and water activity sit side by side on the spec sheet, but they do not say the same thing</text>

  <!-- spec sheet excerpt -->
  <rect x="110" y="228" width="740" height="320" rx="20" fill="#fcf6ea" stroke="#d3c4a6"/>
  <text x="138" y="270" fill="#3c3226" font-family="Georgia, 'Times New Roman', serif" font-size="24">Spec sheet excerpt</text>
  <line x1="138" y1="288" x2="822" y2="288" stroke="#d3c4a6" stroke-width="2"/>

  <!-- header row -->
  <text x="138" y="324" fill="#8a7a64" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15">PARAMETER</text>
  <text x="470" y="324" fill="#8a7a64" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15">LIMIT</text>
  <text x="650" y="324" fill="#8a7a64" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15">METHOD</text>

  <rect x="130" y="338" width="700" height="78" rx="12" fill="#eef4ef" stroke="#bcd2c4"/>
  <text x="146" y="372" fill="#235041" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20">Moisture content</text>
  <text x="146" y="398" fill="#4e6a5d" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15">total water by weight</text>
  <text x="470" y="382" fill="#235041" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20">max %</text>
  <text x="650" y="382" fill="#4e6a5d" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16">named method</text>

  <rect x="130" y="426" width="700" height="78" rx="12" fill="#f7ead8" stroke="#d9c4a0"/>
  <text x="146" y="460" fill="#7a5d31" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20">Water activity (aw)</text>
  <text x="146" y="486" fill="#7a6a56" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15">how available that water is</text>
  <text x="470" y="470" fill="#7a5d31" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20">max 0–1</text>
  <text x="650" y="470" fill="#7a6a56" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16">at defined temp</text>

  <text x="138" y="534" fill="#9b8d7a" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15">Each limit needs a maximum and a stated method to be enforceable.</text>

  <!-- what each controls -->
  <rect x="880" y="228" width="604" height="320" rx="20" fill="#f8efe0" stroke="#d3c4a6"/>
  <text x="908" y="270" fill="#3c3226" font-family="Georgia, 'Times New Roman', serif" font-size="24">What each one controls</text>
  <rect x="908" y="292" width="548" height="108" rx="14" fill="#eef4ef" stroke="#bcd2c4"/>
  <text x="928" y="326" fill="#235041" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20">Moisture %</text>
  <text x="928" y="356" fill="#4e6a5d" font-family="'Helvetica Neue', Arial, sans-serif" font-size="17">Process + consistency signal.</text>
  <text x="928" y="382" fill="#4e6a5d" font-family="'Helvetica Neue', Arial, sans-serif" font-size="17">Low alone does not prove stable.</text>

  <rect x="908" y="414" width="548" height="116" rx="14" fill="#f7ead8" stroke="#d9c4a0"/>
  <text x="928" y="448" fill="#7a5d31" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20">Water activity</text>
  <text x="928" y="478" fill="#7a6a56" font-family="'Helvetica Neue', Arial, sans-serif" font-size="17">Predicts microbial stability AND crunch.</text>
  <text x="928" y="504" fill="#7a6a56" font-family="'Helvetica Neue', Arial, sans-serif" font-size="17">Usually the deciding line.</text>

  <!-- water activity scale -->
  <rect x="110" y="572" width="1374" height="200" rx="20" fill="#fcf6ea" stroke="#d3c4a6"/>
  <text x="138" y="614" fill="#3c3226" font-family="Georgia, 'Times New Roman', serif" font-size="24">Water activity scale</text>
  <defs>
    <linearGradient id="aw" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3fae6a"/>
      <stop offset="0.45" stop-color="#d8c24a"/>
      <stop offset="0.75" stop-color="#d98a3c"/>
      <stop offset="1" stop-color="#c2412f"/>
    </linearGradient>
  </defs>
  <rect x="160" y="636" width="1264" height="34" rx="8" fill="url(#aw)"/>
  <text x="160" y="700" fill="#2f6a51" font-family="'Helvetica Neue', Arial, sans-serif" font-size="17">0</text>
  <text x="1424" y="700" fill="#9a3526" font-family="'Helvetica Neue', Arial, sans-serif" font-size="17" text-anchor="end">1.0</text>

  <line x1="430" y1="624" x2="430" y2="682" stroke="#2f6a51" stroke-width="3" stroke-dasharray="6 6"/>
  <text x="200" y="730" fill="#2f6a51" font-family="'Helvetica Neue', Arial, sans-serif" font-size="17">crisp + stable target (freeze-dried fruit sits low)</text>

  <line x1="1180" y1="624" x2="1180" y2="682" stroke="#9a3526" stroke-width="3" stroke-dasharray="6 6"/>
  <text x="1180" y="730" fill="#9a3526" font-family="'Helvetica Neue', Arial, sans-serif" font-size="17" text-anchor="middle">~0.85: most pathogens grow above here</text>
  <text x="640" y="730" fill="#9a6a2a" font-family="'Helvetica Neue', Arial, sans-serif" font-size="17">rising aw → crunch fades before it looks wet</text>
</svg>
