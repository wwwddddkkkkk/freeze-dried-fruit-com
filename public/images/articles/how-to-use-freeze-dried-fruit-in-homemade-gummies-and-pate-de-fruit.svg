<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">How to use freeze-dried fruit in homemade gummies and pâte de fruit</title>
  <desc id="desc">A workflow diagram showing freeze-dried fruit ground to powder, added late to a gelling base for flavor and color, then finished and stored sealed against humidity.</desc>
  <rect width="1200" height="680" fill="#f6f4ee"/>
  <rect x="74" y="72" width="1052" height="536" rx="34" fill="#fffdf8" stroke="#d8d2c3" stroke-width="2"/>
  <text x="112" y="128" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="33" font-weight="700">Flavor and color without the water</text>
  <text x="112" y="166" fill="#68736c" font-family="Inter, Arial, sans-serif" font-size="17">Powder adds fruit character; the gelling agent still does the setting.</text>

  <!-- Step 1 -->
  <g transform="translate(112 220)">
    <rect width="290" height="180" rx="22" fill="#f7f3ea" stroke="#d8d2c3"/>
    <circle cx="60" cy="60" r="26" fill="#e7c0b5"/>
    <text x="52" y="67" fill="#7a3f35" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">1</text>
    <text x="100" y="55" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Grind to powder</text>
    <text x="100" y="80" fill="#68736c" font-family="Inter, Arial, sans-serif" font-size="14">fine, sifted, seeds removed</text>
    <rect x="30" y="108" width="230" height="46" rx="12" fill="#fffdf8" stroke="#d8d2c3"/>
    <text x="48" y="136" fill="#495852" font-family="Inter, Arial, sans-serif" font-size="14">keep dry until you use it</text>
  </g>

  <!-- Step 2 -->
  <g transform="translate(456 220)">
    <rect width="290" height="180" rx="22" fill="#fffdf8" stroke="#d8d2c3"/>
    <circle cx="60" cy="60" r="26" fill="#cadccf"/>
    <text x="52" y="67" fill="#27453c" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">2</text>
    <text x="100" y="55" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Add it late</text>
    <text x="100" y="80" fill="#68736c" font-family="Inter, Arial, sans-serif" font-size="14">end of cook or in mixing</text>
    <rect x="30" y="108" width="230" height="46" rx="12" fill="#f7f3ea" stroke="#d8d2c3"/>
    <text x="48" y="136" fill="#495852" font-family="Inter, Arial, sans-serif" font-size="14">protects flavor and color</text>
  </g>

  <!-- Step 3 -->
  <g transform="translate(800 220)">
    <rect width="290" height="180" rx="22" fill="#f7f3ea" stroke="#d8d2c3"/>
    <circle cx="60" cy="60" r="26" fill="#dce7f3"/>
    <text x="52" y="67" fill="#34526a" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">3</text>
    <text x="100" y="55" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Finish and seal</text>
    <text x="100" y="80" fill="#68736c" font-family="Inter, Arial, sans-serif" font-size="14">light coating, airtight store</text>
    <rect x="30" y="108" width="230" height="46" rx="12" fill="#fffdf8" stroke="#d8d2c3"/>
    <text x="48" y="136" fill="#495852" font-family="Inter, Arial, sans-serif" font-size="14">powder attracts humidity</text>
  </g>

  <!-- arrows -->
  <path d="M406 310 H452" stroke="#bdb4a1" stroke-width="4"/>
  <path d="M446 302 L462 310 L446 318 Z" fill="#bdb4a1"/>
  <path d="M750 310 H796" stroke="#bdb4a1" stroke-width="4"/>
  <path d="M790 302 L806 310 L790 318 Z" fill="#bdb4a1"/>

  <g transform="translate(112 440)">
    <rect width="976" height="66" rx="20" fill="#f7f3ea" stroke="#d8d2c3"/>
    <text x="28" y="34" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">Remember: the powder flavors and tints but does not gel.</text>
    <text x="28" y="56" fill="#68736c" font-family="Inter, Arial, sans-serif" font-size="14">You still need gelatin, pectin, or another setting agent for structure. Overusing powder makes candy tacky.</text>
  </g>

  <g transform="translate(112 522)">
    <rect width="976" height="48" rx="24" fill="#1f332d"/>
    <text x="28" y="30" fill="#fffdf8" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">Kitchen note: start with a modest amount, taste as you go, and store the finished candy sealed against humid air.</text>
  </g>
</svg>
