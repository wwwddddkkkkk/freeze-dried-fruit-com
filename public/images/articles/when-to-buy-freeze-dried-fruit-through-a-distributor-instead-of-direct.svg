<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">When to buy freeze-dried fruit through a distributor instead of direct</title>
  <desc id="desc">Commercial decision grid comparing distributor and direct buying models for freeze-dried fruit across volume, lead time, importer burden, and inventory load.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f5efe4"/>
      <stop offset="100%" stop-color="#e6dac5"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect x="72" y="70" width="1456" height="760" rx="30" fill="#fcfaf6" stroke="#203836" stroke-width="2.5"/>
  <text x="114" y="146" fill="#203836" font-family="'Source Sans 3', Arial, sans-serif" font-size="26" letter-spacing="5">INDUSTRY INSIGHTS</text>
  <text x="114" y="198" fill="#122826" font-family="'DM Serif Display', Georgia, serif" font-size="50">Distributor or Direct? Match the Buying Model to the Workload.</text>
  <text x="114" y="238" fill="#516360" font-family="'Source Serif 4', Georgia, serif" font-size="24">Factory pricing is only cheaper when the team can absorb the inventory, import, and specification burden behind it.</text>

  <rect x="110" y="286" width="622" height="458" rx="24" fill="#17312f"/>
  <text x="146" y="336" fill="#f7f0e4" font-family="'Source Sans 3', Arial, sans-serif" font-size="25" letter-spacing="4">MODEL FIT</text>
  <text x="146" y="388" fill="#ffffff" font-family="'DM Serif Display', Georgia, serif" font-size="34">Where each channel earns its margin</text>

  <rect x="146" y="430" width="256" height="250" rx="20" fill="#fcfaf6"/>
  <text x="184" y="470" fill="#294643" font-family="'Source Sans 3', Arial, sans-serif" font-size="24" letter-spacing="3">DISTRIBUTOR</text>
  <text x="182" y="514" fill="#435855" font-family="'Source Sans 3', Arial, sans-serif" font-size="21">mixed SKUs</text>
  <text x="182" y="546" fill="#435855" font-family="'Source Sans 3', Arial, sans-serif" font-size="21">faster replenishment</text>
  <text x="182" y="578" fill="#435855" font-family="'Source Sans 3', Arial, sans-serif" font-size="21">lower entry volume</text>
  <text x="182" y="610" fill="#435855" font-family="'Source Sans 3', Arial, sans-serif" font-size="21">less admin load</text>

  <rect x="438" y="430" width="256" height="250" rx="20" fill="#f1ebdf" stroke="#cdbfa9"/>
  <text x="490" y="470" fill="#294643" font-family="'Source Sans 3', Arial, sans-serif" font-size="24" letter-spacing="3">DIRECT</text>
  <text x="474" y="514" fill="#435855" font-family="'Source Sans 3', Arial, sans-serif" font-size="21">stable volume</text>
  <text x="474" y="546" fill="#435855" font-family="'Source Sans 3', Arial, sans-serif" font-size="21">tighter factory terms</text>
  <text x="474" y="578" fill="#435855" font-family="'Source Sans 3', Arial, sans-serif" font-size="21">spec control</text>
  <text x="474" y="610" fill="#435855" font-family="'Source Sans 3', Arial, sans-serif" font-size="21">more internal work</text>

  <rect x="770" y="286" width="648" height="458" rx="24" fill="#f1ebdf" stroke="#294643" stroke-width="2"/>
  <text x="806" y="336" fill="#294643" font-family="'Source Sans 3', Arial, sans-serif" font-size="25" letter-spacing="4">DECISION GRID</text>

  <rect x="804" y="376" width="580" height="286" rx="18" fill="#fcfaf6" stroke="#d2c5b2"/>
  <line x1="948" y1="376" x2="948" y2="662" stroke="#d2c5b2" stroke-width="2"/>
  <line x1="1178" y1="376" x2="1178" y2="662" stroke="#d2c5b2" stroke-width="2"/>
  <line x1="804" y1="438" x2="1384" y2="438" stroke="#d2c5b2" stroke-width="2"/>
  <line x1="804" y1="500" x2="1384" y2="500" stroke="#d2c5b2" stroke-width="2"/>
  <line x1="804" y1="562" x2="1384" y2="562" stroke="#d2c5b2" stroke-width="2"/>

  <text x="828" y="416" fill="#4e625e" font-family="'Source Sans 3', Arial, sans-serif" font-size="20">factor</text>
  <text x="986" y="416" fill="#4e625e" font-family="'Source Sans 3', Arial, sans-serif" font-size="20">distributor</text>
  <text x="1222" y="416" fill="#4e625e" font-family="'Source Sans 3', Arial, sans-serif" font-size="20">direct</text>

  <text x="828" y="478" fill="#102725" font-family="'Source Sans 3', Arial, sans-serif" font-size="22">MOQ fit</text>
  <text x="986" y="478" fill="#102725" font-family="'Source Sans 3', Arial, sans-serif" font-size="22">smaller entries</text>
  <text x="1222" y="478" fill="#102725" font-family="'Source Sans 3', Arial, sans-serif" font-size="22">larger commitments</text>

  <text x="828" y="540" fill="#102725" font-family="'Source Sans 3', Arial, sans-serif" font-size="22">lead time</text>
  <text x="986" y="540" fill="#102725" font-family="'Source Sans 3', Arial, sans-serif" font-size="22">stock on hand</text>
  <text x="1222" y="540" fill="#102725" font-family="'Source Sans 3', Arial, sans-serif" font-size="22">factory schedule</text>

  <text x="828" y="602" fill="#102725" font-family="'Source Sans 3', Arial, sans-serif" font-size="22">FSVP burden</text>
  <text x="986" y="602" fill="#102725" font-family="'Source Sans 3', Arial, sans-serif" font-size="22">lighter interface</text>
  <text x="1222" y="602" fill="#102725" font-family="'Source Sans 3', Arial, sans-serif" font-size="22">buyer carries more</text>

  <text x="828" y="664" fill="#102725" font-family="'Source Sans 3', Arial, sans-serif" font-size="22">inventory risk</text>
  <text x="986" y="664" fill="#102725" font-family="'Source Sans 3', Arial, sans-serif" font-size="22">shared externally</text>
  <text x="1222" y="664" fill="#102725" font-family="'Source Sans 3', Arial, sans-serif" font-size="22">buyer carries more</text>

  <rect x="110" y="776" width="1308" height="42" rx="16" fill="#203836"/>
  <text x="144" y="804" fill="#fffdf8" font-family="'Source Sans 3', Arial, sans-serif" font-size="20" font-weight="700">Useful rule: compare operating load and inventory risk, not just the first quote line.</text>
</svg>
