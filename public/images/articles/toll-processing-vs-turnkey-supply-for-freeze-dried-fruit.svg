<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">Toll processing versus turnkey supply for freeze-dried fruit</title>
  <desc id="desc">Comparison diagram showing which responsibilities sit with the buyer and which sit with the supplier under toll processing and turnkey supply.</desc>
  <rect width="1200" height="680" fill="#f6f4ee"/>
  <rect x="72" y="72" width="1056" height="536" rx="34" fill="#fffdf8" stroke="#d8d2c3" stroke-width="2"/>
  <text x="110" y="126" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="700">One model buys control. The other buys simplification.</text>
  <text x="110" y="164" fill="#68736c" font-family="Inter, Arial, sans-serif" font-size="17">Both can work. The better fit is the one your team can actually run across sourcing, records, and finished-goods flow.</text>

  <g transform="translate(110 214)">
    <rect width="436" height="294" rx="28" fill="#eef4fb" stroke="#c9d5e6"/>
    <text x="28" y="42" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Toll processing</text>
    <text x="28" y="72" fill="#466b8f" font-family="Inter, Arial, sans-serif" font-size="14">brand keeps more control points</text>

    <g transform="translate(28 106)">
      <rect width="172" height="44" rx="22" fill="#7ca1c8"/>
      <text x="18" y="28" fill="#f8fbff" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">fruit source</text>

      <rect x="0" y="58" width="172" height="44" rx="22" fill="#7ca1c8"/>
      <text x="18" y="86" fill="#f8fbff" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">packaging inputs</text>

      <rect x="0" y="116" width="172" height="44" rx="22" fill="#7ca1c8"/>
      <text x="18" y="144" fill="#f8fbff" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">backup sourcing</text>
    </g>

    <g transform="translate(226 106)">
      <rect width="182" height="44" rx="22" fill="#dce7f3"/>
      <text x="18" y="28" fill="#274764" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">more coordination load</text>

      <rect x="0" y="58" width="182" height="44" rx="22" fill="#dce7f3"/>
      <text x="18" y="86" fill="#274764" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">more vendor management</text>

      <rect x="0" y="116" width="182" height="44" rx="22" fill="#dce7f3"/>
      <text x="18" y="144" fill="#274764" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">more inventory planning</text>
    </g>
  </g>

  <g transform="translate(654 214)">
    <rect width="434" height="294" rx="28" fill="#edf6f1" stroke="#c6d8ce"/>
    <text x="28" y="42" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Turnkey supply</text>
    <text x="28" y="72" fill="#466056" font-family="Inter, Arial, sans-serif" font-size="14">supplier absorbs more of the stack</text>

    <g transform="translate(28 106)">
      <rect width="172" height="44" rx="22" fill="#87b49a"/>
      <text x="18" y="28" fill="#f7fbf8" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">faster launch path</text>

      <rect x="0" y="58" width="172" height="44" rx="22" fill="#87b49a"/>
      <text x="18" y="86" fill="#f7fbf8" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">fewer moving parts</text>

      <rect x="0" y="116" width="172" height="44" rx="22" fill="#87b49a"/>
      <text x="18" y="144" fill="#f7fbf8" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">single finished-goods flow</text>
    </g>

    <g transform="translate(224 106)">
      <rect width="182" height="44" rx="22" fill="#cadccf"/>
      <text x="18" y="28" fill="#27453c" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">less raw-material control</text>

      <rect x="0" y="58" width="182" height="44" rx="22" fill="#cadccf"/>
      <text x="18" y="86" fill="#27453c" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">less packaging visibility</text>

      <rect x="0" y="116" width="182" height="44" rx="22" fill="#cadccf"/>
      <text x="18" y="144" fill="#27453c" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">less backup-source optionality</text>
    </g>
  </g>

  <g transform="translate(110 540)">
    <rect width="978" height="40" rx="20" fill="#1f332d"/>
    <text x="28" y="26" fill="#fffdf8" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">Neither structure removes FDA-facing responsibilities outright. It mainly changes which party has to organize the records, suppliers, labels, and inventory in practice.</text>
  </g>
</svg>
