<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Why case-level lot visibility speeds freeze-dried fruit receiving and claims</title>
  <desc id="desc">Warehouse diagram showing readable case lot identity helping freeze-dried fruit receiving, hold segregation, and claims handling.</desc>
  <rect width="1600" height="900" fill="#f4efe6"/>
  <rect x="56" y="56" width="1488" height="788" rx="28" fill="#fcfaf5" stroke="#d4c7b1" stroke-width="2"/>
  <text x="112" y="136" fill="#24433d" font-family="'Source Sans 3', Arial, sans-serif" font-size="26" letter-spacing="5">INDUSTRY INSIGHTS</text>
  <text x="112" y="192" fill="#172f2b" font-family="'DM Serif Display', Georgia, serif" font-size="48">Clear lot identity shrinks the hold before the argument grows</text>
  <text x="112" y="234" fill="#5f716d" font-family="'Source Serif 4', Georgia, serif" font-size="24">When the case carries the lot clearly, receiving can separate one issue from the rest of the shipment.</text>

  <g transform="translate(112 294)">
    <rect width="706" height="404" rx="24" fill="#eef4ef" stroke="#24433d" stroke-width="2"/>
    <text x="34" y="50" fill="#24433d" font-family="'Source Sans 3', Arial, sans-serif" font-size="22" letter-spacing="4">RECEIVING FLOOR</text>

    <rect x="52" y="110" width="178" height="126" rx="12" fill="#ead8b7" stroke="#9c8458"/>
    <rect x="264" y="110" width="178" height="126" rx="12" fill="#ead8b7" stroke="#9c8458"/>
    <rect x="476" y="110" width="178" height="126" rx="12" fill="#ead8b7" stroke="#9c8458"/>
    <rect x="70" y="132" width="142" height="38" rx="8" fill="#17312f"/>
    <rect x="282" y="132" width="142" height="38" rx="8" fill="#17312f"/>
    <rect x="494" y="132" width="142" height="38" rx="8" fill="#17312f"/>
    <text x="88" y="157" fill="#fffdf8" font-family="'JetBrains Mono', monospace" font-size="17">LOT 26FD-041</text>
    <text x="300" y="157" fill="#fffdf8" font-family="'JetBrains Mono', monospace" font-size="17">LOT 26FD-041</text>
    <text x="512" y="157" fill="#fffdf8" font-family="'JetBrains Mono', monospace" font-size="17">LOT 26FD-042</text>

    <rect x="78" y="286" width="554" height="66" rx="18" fill="#fffdf8" stroke="#c8d1c8"/>
    <text x="108" y="328" fill="#3f534f" font-family="'Source Sans 3', Arial, sans-serif" font-size="24">Readable cases let teams hold one lot and release the rest.</text>
  </g>

  <g transform="translate(864 294)">
    <rect width="624" height="404" rx="24" fill="#17312f"/>
    <text x="34" y="50" fill="#dfe9e2" font-family="'Source Sans 3', Arial, sans-serif" font-size="22" letter-spacing="4">DECISION SPEED</text>

    <line x1="72" y1="124" x2="72" y2="332" stroke="#d4e1d7" stroke-width="4"/>
    <line x1="72" y1="332" x2="544" y2="332" stroke="#d4e1d7" stroke-width="4"/>
    <rect x="104" y="254" width="86" height="78" rx="12" fill="#9fb7a6"/>
    <rect x="234" y="220" width="86" height="112" rx="12" fill="#c7c099"/>
    <rect x="364" y="176" width="86" height="156" rx="12" fill="#d78966"/>
    <rect x="494" y="142" width="86" height="190" rx="12" fill="#c84b4b"/>
    <text x="110" y="368" fill="#dfe9e2" font-family="'Source Sans 3', Arial, sans-serif" font-size="18">receive</text>
    <text x="240" y="368" fill="#dfe9e2" font-family="'Source Sans 3', Arial, sans-serif" font-size="18">segregate</text>
    <text x="372" y="368" fill="#dfe9e2" font-family="'Source Sans 3', Arial, sans-serif" font-size="18">investigate</text>
    <text x="500" y="368" fill="#dfe9e2" font-family="'Source Sans 3', Arial, sans-serif" font-size="18">claim</text>
    <text x="34" y="112" fill="#f8eee0" font-family="'Source Sans 3', Arial, sans-serif" font-size="20">The more product the team has to guess at, open, or broadly hold,</text>
    <text x="34" y="140" fill="#f8eee0" font-family="'Source Sans 3', Arial, sans-serif" font-size="20">the more routine receiving turns into avoidable commercial delay.</text>
  </g>

  <rect x="112" y="760" width="1376" height="48" rx="18" fill="#203836"/>
  <text x="146" y="791" fill="#fffdf8" font-family="'Source Sans 3', Arial, sans-serif" font-size="20" font-weight="700">Case-level lot visibility is not only recall prep. It is everyday warehouse control.</text>
</svg>
