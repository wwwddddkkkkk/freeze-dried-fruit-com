<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">How fresh-to-dried yield ratios shape freeze-dried fruit pricing</title>
  <desc id="desc">A flow showing a large fresh-fruit mass losing weight to trim and water removal, leaving a small finished yield, beside a bar comparison of yield ratios for different fruits and a note on the cost multiplier.</desc>
  <rect width="1600" height="900" fill="#f4efe6"/>
  <rect x="66" y="66" width="1468" height="768" rx="30" fill="#fcfaf5" stroke="#d4c7b1" stroke-width="2"/>
  <text x="112" y="140" fill="#24433d" font-family="'Source Sans 3', Arial, sans-serif" font-size="26" letter-spacing="5">INDUSTRY INSIGHTS</text>
  <text x="112" y="194" fill="#172f2b" font-family="'DM Serif Display', Georgia, serif" font-size="46">Most of the Fruit Never Reaches the Bag</text>
  <text x="112" y="236" fill="#5f716d" font-family="'Source Serif 4', Georgia, serif" font-size="24">The fresh-to-dried yield ratio is the multiplier sitting underneath every freeze-dried quote.</text>

  <!-- Mass-loss funnel -->
  <text x="112" y="304" fill="#294643" font-family="'Source Sans 3', Arial, sans-serif" font-size="22" letter-spacing="3">WHERE THE WEIGHT GOES</text>

  <rect x="112" y="330" width="300" height="300" rx="16" fill="#88b8aa" stroke="#17312f" stroke-width="2"/>
  <text x="262" y="476" fill="#0f2622" font-family="'DM Serif Display', Georgia, serif" font-size="34" text-anchor="middle">10 kg</text>
  <text x="262" y="512" fill="#0f2622" font-family="'Source Sans 3', Arial, sans-serif" font-size="20" text-anchor="middle">fresh fruit</text>

  <path d="M430 470 l64 0" stroke="#17312f" stroke-width="3" marker-end="url(#a)"/>
  <defs><marker id="a" markerWidth="12" markerHeight="12" refX="8" refY="6" orient="auto"><path d="M0 0 L10 6 L0 12 z" fill="#17312f"/></marker></defs>

  <rect x="512" y="392" width="120" height="176" rx="12" fill="#e0b05f" stroke="#17312f" stroke-width="2"/>
  <text x="572" y="468" fill="#3a2f17" font-family="'Source Sans 3', Arial, sans-serif" font-size="17" text-anchor="middle">trim,</text>
  <text x="572" y="490" fill="#3a2f17" font-family="'Source Sans 3', Arial, sans-serif" font-size="17" text-anchor="middle">peel,</text>
  <text x="572" y="512" fill="#3a2f17" font-family="'Source Sans 3', Arial, sans-serif" font-size="17" text-anchor="middle">core</text>

  <path d="M650 470 l64 0" stroke="#17312f" stroke-width="3" marker-end="url(#a)"/>

  <rect x="732" y="360" width="150" height="240" rx="12" fill="#cfe2dd" stroke="#17312f" stroke-width="2" stroke-dasharray="7 6"/>
  <text x="807" y="455" fill="#294643" font-family="'Source Sans 3', Arial, sans-serif" font-size="18" text-anchor="middle">water</text>
  <text x="807" y="478" fill="#294643" font-family="'Source Sans 3', Arial, sans-serif" font-size="18" text-anchor="middle">sublimes</text>
  <text x="807" y="501" fill="#294643" font-family="'Source Sans 3', Arial, sans-serif" font-size="18" text-anchor="middle">away</text>

  <path d="M900 470 l64 0" stroke="#17312f" stroke-width="3" marker-end="url(#a)"/>

  <rect x="982" y="446" width="80" height="48" rx="10" fill="#cb5d58" stroke="#17312f" stroke-width="2"/>
  <text x="1022" y="476" fill="#fff" font-family="'DM Serif Display', Georgia, serif" font-size="22" text-anchor="middle">~1 kg</text>
  <text x="1022" y="524" fill="#9c3f3b" font-family="'Source Sans 3', Arial, sans-serif" font-size="18" text-anchor="middle">finished</text>

  <!-- ratio bars -->
  <rect x="1110" y="300" width="312" height="330" rx="20" fill="#17312f"/>
  <text x="1140" y="344" fill="#f7f0e4" font-family="'Source Sans 3', Arial, sans-serif" font-size="20" letter-spacing="3">TYPICAL RATIOS</text>
  <text x="1140" y="392" fill="#edf0ea" font-family="'Source Sans 3', Arial, sans-serif" font-size="19">apple</text>
  <rect x="1140" y="402" width="120" height="20" rx="6" fill="#88b8aa"/>
  <text x="1272" y="418" fill="#cfe2dd" font-family="'JetBrains Mono', monospace" font-size="17">~7:1</text>
  <text x="1140" y="452" fill="#edf0ea" font-family="'Source Sans 3', Arial, sans-serif" font-size="19">mango</text>
  <rect x="1140" y="462" width="150" height="20" rx="6" fill="#a9c7a0"/>
  <text x="1272" y="478" fill="#cfe2dd" font-family="'JetBrains Mono', monospace" font-size="17">~8:1</text>
  <text x="1140" y="512" fill="#edf0ea" font-family="'Source Sans 3', Arial, sans-serif" font-size="19">strawberry</text>
  <rect x="1140" y="522" width="200" height="20" rx="6" fill="#e0b05f"/>
  <text x="1272" y="538" fill="#f0e4c8" font-family="'JetBrains Mono', monospace" font-size="17">~11:1</text>
  <text x="1140" y="572" fill="#edf0ea" font-family="'Source Sans 3', Arial, sans-serif" font-size="19">watermelon</text>
  <rect x="1140" y="582" width="240" height="20" rx="6" fill="#cb5d58"/>
  <text x="1272" y="598" fill="#f3d2cf" font-family="'JetBrains Mono', monospace" font-size="17">~13:1</text>

  <!-- multiplier note -->
  <rect x="112" y="660" width="1310" height="78" rx="18" fill="#f1ebdf" stroke="#294643" stroke-width="2"/>
  <text x="146" y="700" fill="#17312f" font-family="'Source Serif 4', Georgia, serif" font-size="22">Raw-fruit cost in a quote ≈ fresh price × yield ratio.</text>
  <text x="146" y="728" fill="#5c5040" font-family="'Source Sans 3', Arial, sans-serif" font-size="19">A higher ratio multiplies every swing in the fresh crop market — wet fruits feel it most.</text>

  <rect x="112" y="754" width="1310" height="48" rx="18" fill="#203836"/>
  <text x="146" y="785" fill="#fffdf8" font-family="'Source Sans 3', Arial, sans-serif" font-size="20" font-weight="700">Ask suppliers for the yield assumption behind a quote — it is the number that really sets the price.</text>
</svg>
