<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">How ice crystal size shapes freeze-dried fruit pore structure and rehydration speed</title>
  <desc id="desc">Comparison diagram: slow freezing produces large ice crystals and wide pores that rehydrate fast, while fast freezing produces fine crystals and a dense pore network that rehydrates slowly.</desc>
  <rect width="1600" height="900" fill="#f4efe6"/>
  <rect x="64" y="64" width="1472" height="772" rx="30" fill="#fcfaf5" stroke="#d4c7b1" stroke-width="2"/>
  <text x="112" y="138" fill="#24433d" font-family="'Source Sans 3', Arial, sans-serif" font-size="26" letter-spacing="5">TECHNOLOGY</text>
  <text x="112" y="192" fill="#172f2b" font-family="'DM Serif Display', Georgia, serif" font-size="46">The Ice Becomes the Pore</text>
  <text x="112" y="232" fill="#5f716d" font-family="'Source Serif 4', Georgia, serif" font-size="23">Freezing rate sets crystal size — and crystal size becomes the finished pore network.</text>

  <!-- Left panel: slow freezing -->
  <rect x="104" y="286" width="658" height="446" rx="24" fill="#f1ebdf" stroke="#294643" stroke-width="2"/>
  <text x="142" y="332" fill="#294643" font-family="'Source Sans 3', Arial, sans-serif" font-size="22" letter-spacing="3">SLOW FREEZING</text>
  <text x="142" y="372" fill="#17312f" font-family="'DM Serif Display', Georgia, serif" font-size="30">Large crystals, wide pores</text>
  <!-- large pore lattice -->
  <g stroke="#294643" stroke-width="2" fill="#dfeae2">
    <circle cx="230" cy="470" r="46"/>
    <circle cx="352" cy="470" r="46"/>
    <circle cx="474" cy="470" r="46"/>
    <circle cx="596" cy="470" r="46"/>
    <circle cx="291" cy="560" r="46"/>
    <circle cx="413" cy="560" r="46"/>
    <circle cx="535" cy="560" r="46"/>
    <circle cx="230" cy="640" r="46"/>
    <circle cx="352" cy="640" r="46"/>
    <circle cx="474" cy="640" r="46"/>
    <circle cx="596" cy="640" r="46"/>
  </g>
  <text x="142" y="712" fill="#465b57" font-family="'Source Sans 3', Arial, sans-serif" font-size="19">Fast rehydration &#183; airier bite &#183; more fragile, more fines</text>

  <!-- Right panel: fast freezing -->
  <rect x="838" y="286" width="658" height="446" rx="24" fill="#17312f"/>
  <text x="876" y="332" fill="#a7c7bd" font-family="'Source Sans 3', Arial, sans-serif" font-size="22" letter-spacing="3">FAST FREEZING</text>
  <text x="876" y="372" fill="#ffffff" font-family="'DM Serif Display', Georgia, serif" font-size="30">Fine crystals, dense network</text>
  <!-- fine pore lattice -->
  <g stroke="#7fa89c" stroke-width="1.5" fill="#24433d">
    <circle cx="905" cy="452" r="17"/><circle cx="948" cy="452" r="17"/><circle cx="991" cy="452" r="17"/><circle cx="1034" cy="452" r="17"/><circle cx="1077" cy="452" r="17"/><circle cx="1120" cy="452" r="17"/><circle cx="1163" cy="452" r="17"/><circle cx="1206" cy="452" r="17"/><circle cx="1249" cy="452" r="17"/><circle cx="1292" cy="452" r="17"/><circle cx="1335" cy="452" r="17"/><circle cx="1378" cy="452" r="17"/><circle cx="1421" cy="452" r="17"/>
    <circle cx="905" cy="496" r="17"/><circle cx="948" cy="496" r="17"/><circle cx="991" cy="496" r="17"/><circle cx="1034" cy="496" r="17"/><circle cx="1077" cy="496" r="17"/><circle cx="1120" cy="496" r="17"/><circle cx="1163" cy="496" r="17"/><circle cx="1206" cy="496" r="17"/><circle cx="1249" cy="496" r="17"/><circle cx="1292" cy="496" r="17"/><circle cx="1335" cy="496" r="17"/><circle cx="1378" cy="496" r="17"/><circle cx="1421" cy="496" r="17"/>
    <circle cx="905" cy="540" r="17"/><circle cx="948" cy="540" r="17"/><circle cx="991" cy="540" r="17"/><circle cx="1034" cy="540" r="17"/><circle cx="1077" cy="540" r="17"/><circle cx="1120" cy="540" r="17"/><circle cx="1163" cy="540" r="17"/><circle cx="1206" cy="540" r="17"/><circle cx="1249" cy="540" r="17"/><circle cx="1292" cy="540" r="17"/><circle cx="1335" cy="540" r="17"/><circle cx="1378" cy="540" r="17"/><circle cx="1421" cy="540" r="17"/>
    <circle cx="905" cy="584" r="17"/><circle cx="948" cy="584" r="17"/><circle cx="991" cy="584" r="17"/><circle cx="1034" cy="584" r="17"/><circle cx="1077" cy="584" r="17"/><circle cx="1120" cy="584" r="17"/><circle cx="1163" cy="584" r="17"/><circle cx="1206" cy="584" r="17"/><circle cx="1249" cy="584" r="17"/><circle cx="1292" cy="584" r="17"/><circle cx="1335" cy="584" r="17"/><circle cx="1378" cy="584" r="17"/><circle cx="1421" cy="584" r="17"/>
    <circle cx="905" cy="628" r="17"/><circle cx="948" cy="628" r="17"/><circle cx="991" cy="628" r="17"/><circle cx="1034" cy="628" r="17"/><circle cx="1077" cy="628" r="17"/><circle cx="1120" cy="628" r="17"/><circle cx="1163" cy="628" r="17"/><circle cx="1206" cy="628" r="17"/><circle cx="1249" cy="628" r="17"/><circle cx="1292" cy="628" r="17"/><circle cx="1335" cy="628" r="17"/><circle cx="1378" cy="628" r="17"/><circle cx="1421" cy="628" r="17"/>
  </g>
  <text x="876" y="712" fill="#cfe0d8" font-family="'Source Sans 3', Arial, sans-serif" font-size="19">Slow rehydration &#183; holds crunch longer &#183; keeps shape</text>

  <rect x="104" y="756" width="1392" height="48" rx="18" fill="#203836"/>
  <text x="142" y="787" fill="#fffdf8" font-family="'Source Sans 3', Arial, sans-serif" font-size="20" font-weight="700">Same final moisture, different behavior: rehydration speed is decided at the freezer, not the dryer.</text>
</svg>
