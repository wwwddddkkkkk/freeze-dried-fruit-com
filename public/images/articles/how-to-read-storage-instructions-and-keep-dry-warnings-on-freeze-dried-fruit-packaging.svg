<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">How to read storage instructions and keep-dry warnings on freeze-dried fruit packaging</title>
  <desc id="desc">A field-guide diagram of a pouch back panel with annotated storage lines: cool dry place, away from light, reseal after opening, and desiccant enclosed.</desc>
  <rect width="1200" height="680" fill="#f7f2e8"/>
  <rect x="76" y="72" width="1048" height="536" rx="34" fill="#fffdf8" stroke="#d8d0bf" stroke-width="2"/>
  <text x="116" y="128" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="33" font-weight="700">The storage line is the fine print of the date</text>
  <text x="116" y="166" fill="#69736d" font-family="Inter, Arial, sans-serif" font-size="17">Each instruction names a condition the shelf life was tested against.</text>

  <!-- Pouch back panel -->
  <g transform="translate(120 210)">
    <rect width="360" height="360" rx="18" fill="#f2ede1" stroke="#cf6f5d" stroke-width="3"/>
    <rect x="34" y="30" width="292" height="18" rx="6" fill="#d8d0bf"/>
    <rect x="34" y="60" width="220" height="12" rx="4" fill="#e4ddce"/>
    <text x="34" y="120" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">STORAGE</text>
    <text x="34" y="150" fill="#4a5952" font-family="Inter, Arial, sans-serif" font-size="14">Store in a cool, dry place.</text>
    <text x="34" y="178" fill="#4a5952" font-family="Inter, Arial, sans-serif" font-size="14">Keep away from direct sunlight.</text>
    <text x="34" y="206" fill="#4a5952" font-family="Inter, Arial, sans-serif" font-size="14">Reseal after opening.</text>
    <text x="34" y="234" fill="#4a5952" font-family="Inter, Arial, sans-serif" font-size="14">Desiccant enclosed — do not eat.</text>
    <rect x="34" y="286" width="292" height="46" rx="8" fill="#fffdf8" stroke="#d8d0bf"/>
    <text x="50" y="315" fill="#69736d" font-family="Inter, Arial, sans-serif" font-size="13">BEST BY: valid under these conditions</text>
  </g>

  <!-- Annotations -->
  <g transform="translate(540 214)" font-family="Inter, Arial, sans-serif">
    <g>
      <circle cx="0" cy="122" r="7" fill="#cf6f5d"/>
      <text x="24" y="118" font-size="16" font-weight="700" fill="#1f332d">"Cool, dry"</text>
      <text x="24" y="140" font-size="14" fill="#65736c">names the two biggest shelf risks: heat and moisture</text>
    </g>
    <g>
      <circle cx="0" cy="182" r="7" fill="#cf6f5d"/>
      <text x="24" y="178" font-size="16" font-weight="700" fill="#1f332d">"Away from light"</text>
      <text x="24" y="200" font-size="14" fill="#65736c">often hints the pack doesn't fully block light itself</text>
    </g>
    <g>
      <circle cx="0" cy="242" r="7" fill="#cf6f5d"/>
      <text x="24" y="238" font-size="16" font-weight="700" fill="#1f332d">"Reseal"</text>
      <text x="24" y="260" font-size="14" fill="#65736c">protection depends on you closing the seal again</text>
    </g>
    <g>
      <circle cx="0" cy="302" r="7" fill="#3f6f5c"/>
      <text x="24" y="298" font-size="16" font-weight="700" fill="#1f332d">"Desiccant enclosed"</text>
      <text x="24" y="320" font-size="14" fill="#65736c">a direct signal moisture is the main enemy — leave it in</text>
    </g>
  </g>
</svg>
