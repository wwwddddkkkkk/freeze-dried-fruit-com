<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">What raw and cold-processed claims mean on freeze-dried fruit labels</title>
  <desc id="desc">Diagram contrasting the marketing terms raw and cold-processed with what freeze-drying actually does: low-temperature vacuum sublimation with gentle shelf heat.</desc>
  <rect width="1200" height="680" fill="#f6f4ee"/>
  <rect x="70" y="70" width="1060" height="540" rx="34" fill="#fffdf8" stroke="#d8d2c3" stroke-width="2"/>

  <text x="110" y="126" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="33" font-weight="700">What the claim says vs. what the process does</text>
  <text x="110" y="162" fill="#68736c" font-family="Inter, Arial, sans-serif" font-size="17">Two common badges, neither tightly defined for freeze-dried fruit.</text>

  <!-- claim cards -->
  <g transform="translate(112 208)">
    <rect width="470" height="150" rx="20" fill="#f4ede6" stroke="#d8c9bc"/>
    <text x="24" y="42" fill="#8a4a30" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="700">"Raw"</text>
    <text x="24" y="76" fill="#5f6a63" font-family="Inter, Arial, sans-serif" font-size="15">No standardized definition here.</text>
    <text x="24" y="102" fill="#5f6a63" font-family="Inter, Arial, sans-serif" font-size="15">Fruit may still be frozen, cut, or</text>
    <text x="24" y="124" fill="#5f6a63" font-family="Inter, Arial, sans-serif" font-size="15">pre-treated before drying.</text>

    <rect y="168" width="470" height="150" rx="20" fill="#f4ede6" stroke="#d8c9bc"/>
    <text x="24" y="210" fill="#8a4a30" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="700">"Cold-processed"</text>
    <text x="24" y="244" fill="#5f6a63" font-family="Inter, Arial, sans-serif" font-size="15">Means "not cooked with high heat" —</text>
    <text x="24" y="266" fill="#5f6a63" font-family="Inter, Arial, sans-serif" font-size="15">not literally cold. Shelves are</text>
    <text x="24" y="288" fill="#5f6a63" font-family="Inter, Arial, sans-serif" font-size="15">warmed to drive sublimation.</text>
  </g>

  <!-- arrow -->
  <g transform="translate(596 356)">
    <path d="M0 0 L34 0 L34 -12 L60 16 L34 44 L34 32 L0 32 Z" fill="#c8bfa9"/>
  </g>

  <!-- reality panel -->
  <g transform="translate(668 208)">
    <rect width="420" height="318" rx="20" fill="#edf6f1" stroke="#c6d8ce"/>
    <text x="24" y="42" fill="#27453c" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">What actually happens</text>

    <g transform="translate(24 66)">
      <circle cx="12" cy="12" r="10" fill="#cadccf"/><text x="34" y="17" fill="#27453c" font-family="Inter, Arial, sans-serif" font-size="15">Freeze the fruit solid</text>
      <circle cx="12" cy="58" r="10" fill="#cadccf"/><text x="34" y="63" fill="#27453c" font-family="Inter, Arial, sans-serif" font-size="15">Pull deep vacuum</text>
      <circle cx="12" cy="104" r="10" fill="#b6cfc0"/><text x="34" y="109" fill="#27453c" font-family="Inter, Arial, sans-serif" font-size="15">Gently warm shelves — heat is used</text>
      <circle cx="12" cy="150" r="10" fill="#cadccf"/><text x="34" y="155" fill="#27453c" font-family="Inter, Arial, sans-serif" font-size="15">Ice sublimates: low product temp</text>
    </g>

    <rect x="24" y="238" width="372" height="58" rx="14" fill="#cadccf"/>
    <text x="40" y="264" fill="#27453c" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">Verify: ingredient list, pre-treatment,</text>
    <text x="40" y="285" fill="#27453c" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">temperature and nutrition claims.</text>
  </g>

  <text x="110" y="576" fill="#8a949b" font-family="Inter, Arial, sans-serif" font-size="13">Low-temperature does not mean zero-heat, and "raw" does not certify untreated fruit.</text>
</svg>
