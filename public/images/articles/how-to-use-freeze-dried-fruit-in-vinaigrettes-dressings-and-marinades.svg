<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">How to use freeze-dried fruit in vinaigrettes, dressings, and marinades</title>
  <desc id="desc">Editorial kitchen diagram showing freeze-dried fruit powder whisked into vinaigrette, creamy dressing, and marinade bases.</desc>
  <rect width="1600" height="900" fill="#f6f1e7"/>
  <rect x="62" y="58" width="1476" height="784" rx="30" fill="#fcfaf6" stroke="#d1c6b6" stroke-width="2"/>

  <text x="112" y="126" fill="#6d5030" font-family="'Source Sans 3', Arial, sans-serif" font-size="24" letter-spacing="5">APPLICATIONS</text>
  <text x="112" y="188" fill="#2f2419" font-family="'DM Serif Display', Georgia, serif" font-size="50">Use the fruit like a concentrate, not a garnish.</text>
  <text x="112" y="228" fill="#6f6a60" font-family="'Source Serif 4', Georgia, serif" font-size="24">Powder, hydration, and balance decide whether the dressing tastes bright or dusty.</text>

  <rect x="108" y="286" width="556" height="472" rx="26" fill="#fffdf8" stroke="#cfc3b2"/>
  <text x="146" y="334" fill="#2f2419" font-family="'Source Sans 3', Arial, sans-serif" font-size="22" letter-spacing="3">MIXING SEQUENCE</text>

  <circle cx="250" cy="480" r="88" fill="#f3d7d1" stroke="#c96f5b" stroke-width="3"/>
  <text x="214" y="488" fill="#7b4035" font-family="'Source Sans 3', Arial, sans-serif" font-size="24" font-weight="700">fruit</text>
  <text x="198" y="518" fill="#7b4035" font-family="'Source Sans 3', Arial, sans-serif" font-size="24" font-weight="700">powder</text>

  <circle cx="452" cy="480" r="88" fill="#eef0cf" stroke="#8fa04b" stroke-width="3"/>
  <text x="418" y="470" fill="#52611e" font-family="'Source Sans 3', Arial, sans-serif" font-size="23" font-weight="700">acid</text>
  <text x="394" y="500" fill="#52611e" font-family="'Source Sans 3', Arial, sans-serif" font-size="23" font-weight="700">first</text>

  <path d="M346 480 L362 480" stroke="#d7b36f" stroke-width="8" stroke-linecap="round"/>
  <path d="M354 468 L370 480 L354 492" fill="none" stroke="#d7b36f" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <path d="M552 480 C614 480 652 504 652 560" fill="none" stroke="#17312f" stroke-width="6" stroke-linecap="round"/>
  <path d="M640 550 L652 568 L662 548" fill="none" stroke="#17312f" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <ellipse cx="652" cy="612" rx="92" ry="64" fill="#f1c987" stroke="#c29042" stroke-width="3"/>
  <path d="M598 612 C622 590 684 590 706 612" fill="none" stroke="#fff7e8" stroke-width="6" stroke-linecap="round"/>
  <text x="604" y="620" fill="#765323" font-family="'Source Sans 3', Arial, sans-serif" font-size="22" font-weight="700">whisk in oil</text>

  <rect x="738" y="286" width="754" height="472" rx="26" fill="#17312f"/>
  <text x="778" y="334" fill="#f7f0e4" font-family="'Source Sans 3', Arial, sans-serif" font-size="22" letter-spacing="3">BEST FITS</text>

  <rect x="778" y="380" width="206" height="142" rx="18" fill="#fcfaf6"/>
  <text x="808" y="420" fill="#21403c" font-family="'Source Sans 3', Arial, sans-serif" font-size="21">vinaigrette</text>
  <text x="808" y="454" fill="#62716d" font-family="'Source Sans 3', Arial, sans-serif" font-size="18">strawberry</text>
  <text x="808" y="482" fill="#62716d" font-family="'Source Sans 3', Arial, sans-serif" font-size="18">raspberry</text>

  <rect x="1032" y="380" width="206" height="142" rx="18" fill="#fcfaf6"/>
  <text x="1062" y="420" fill="#21403c" font-family="'Source Sans 3', Arial, sans-serif" font-size="21">creamy dressing</text>
  <text x="1062" y="454" fill="#62716d" font-family="'Source Sans 3', Arial, sans-serif" font-size="18">mango</text>
  <text x="1062" y="482" fill="#62716d" font-family="'Source Sans 3', Arial, sans-serif" font-size="18">pineapple</text>

  <rect x="1286" y="380" width="166" height="142" rx="18" fill="#fcfaf6"/>
  <text x="1316" y="420" fill="#21403c" font-family="'Source Sans 3', Arial, sans-serif" font-size="21">marinade</text>
  <text x="1316" y="454" fill="#62716d" font-family="'Source Sans 3', Arial, sans-serif" font-size="18">cherry</text>
  <text x="1316" y="482" fill="#62716d" font-family="'Source Sans 3', Arial, sans-serif" font-size="18">cranberry</text>

  <rect x="778" y="568" width="674" height="122" rx="18" fill="#fcfaf6"/>
  <text x="808" y="608" fill="#21403c" font-family="'Source Sans 3', Arial, sans-serif" font-size="22" letter-spacing="2">COMMON FAILURE</text>
  <text x="808" y="644" fill="#62716d" font-family="'Source Sans 3', Arial, sans-serif" font-size="20">powder stays dry -> dressing tastes chalky</text>
  <text x="808" y="672" fill="#62716d" font-family="'Source Sans 3', Arial, sans-serif" font-size="20">too much fruit -> dressing tips sweet instead of bright</text>

  <rect x="108" y="784" width="1384" height="38" rx="14" fill="#2f2419"/>
  <text x="144" y="809" fill="#fffdf8" font-family="'Source Sans 3', Arial, sans-serif" font-size="19" font-weight="700">Useful rule: hydrate the fruit in the watery phase first, then build the emulsion.</text>
</svg>
