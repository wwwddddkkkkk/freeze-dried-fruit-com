<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Mock recall readiness and supplier risk</title>
  <desc id="desc">A supplier-risk diagram showing how lot coding, shipment records, and mock recall practice improve recall containment for freeze-dried fruit.</desc>
  <rect width="1600" height="900" fill="#f4efe6"/>
  <rect x="62" y="62" width="1476" height="776" rx="28" fill="#fffaf2" stroke="#ccbda1" stroke-width="2"/>
  <text x="112" y="136" fill="#3c3226" font-family="Georgia, 'Times New Roman', serif" font-size="34">Recall Readiness Changes Commercial Risk</text>
  <text x="112" y="176" fill="#786956" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20">How one freeze-dried fruit lot either stays narrow or becomes everyone's problem</text>

  <rect x="118" y="236" width="1364" height="470" rx="26" fill="#fcf6ea" stroke="#d3c4a6"/>

  <rect x="156" y="294" width="226" height="188" rx="24" fill="#edf4ef" stroke="#c6d8ce"/>
  <text x="186" y="346" fill="#23433a" font-family="Georgia, 'Times New Roman', serif" font-size="28">1. Lot Defined</text>
  <text x="186" y="390" fill="#4e665c" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20">Shift, line, or batch logic</text>
  <text x="186" y="420" fill="#4e665c" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20">must be precise enough to</text>
  <text x="186" y="450" fill="#4e665c" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20">avoid broad unnecessary holds.</text>

  <rect x="462" y="294" width="226" height="188" rx="24" fill="#fffaf1" stroke="#d3c4a6"/>
  <text x="492" y="346" fill="#3c3226" font-family="Georgia, 'Times New Roman', serif" font-size="28">2. Cases Tagged</text>
  <text x="492" y="390" fill="#6c5d49" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20">Item + lot stay visible in</text>
  <text x="492" y="420" fill="#6c5d49" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20">shipping records and at</text>
  <text x="492" y="450" fill="#6c5d49" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20">case level when possible.</text>

  <rect x="768" y="294" width="226" height="188" rx="24" fill="#fffaf1" stroke="#d3c4a6"/>
  <text x="798" y="346" fill="#3c3226" font-family="Georgia, 'Times New Roman', serif" font-size="28">3. Shipments Mapped</text>
  <text x="798" y="390" fill="#6c5d49" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20">Direct consignees, dates,</text>
  <text x="798" y="420" fill="#6c5d49" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20">and remaining inventory can</text>
  <text x="798" y="450" fill="#6c5d49" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20">be retrieved quickly.</text>

  <rect x="1074" y="294" width="226" height="188" rx="24" fill="#f6d9cf" stroke="#d7a89c"/>
  <text x="1104" y="346" fill="#7a3c31" font-family="Georgia, 'Times New Roman', serif" font-size="28">4. Drill It</text>
  <text x="1104" y="390" fill="#8d5a50" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20">Mock recalls test whether</text>
  <text x="1104" y="420" fill="#8d5a50" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20">the plan works under time</text>
  <text x="1104" y="450" fill="#8d5a50" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20">pressure instead of on paper.</text>

  <path d="M382 388H462" stroke="#c3b392" stroke-width="4" stroke-linecap="round"/>
  <path d="M688 388H768" stroke="#c3b392" stroke-width="4" stroke-linecap="round"/>
  <path d="M994 388H1074" stroke="#c3b392" stroke-width="4" stroke-linecap="round"/>
  <path d="M446 388l16 -12v24z" fill="#c3b392"/>
  <path d="M752 388l16 -12v24z" fill="#c3b392"/>
  <path d="M1058 388l16 -12v24z" fill="#c3b392"/>

  <rect x="206" y="548" width="1188" height="116" rx="24" fill="#efe4d0" stroke="#d3c4a6"/>
  <text x="248" y="596" fill="#3c3226" font-family="Georgia, 'Times New Roman', serif" font-size="30">Outcome</text>
  <text x="248" y="632" fill="#6c5d49" font-family="'Helvetica Neue', Arial, sans-serif" font-size="22">Strong system: one affected lot is identified fast, customers are notified clearly, and unaffected inventory keeps moving.</text>
  <text x="248" y="662" fill="#8d5a50" font-family="'Helvetica Neue', Arial, sans-serif" font-size="22">Weak system: wide holds, vague code matching, delayed communication, and avoidable commercial loss.</text>

  <rect x="118" y="754" width="1364" height="60" rx="18" fill="#1f332d"/>
  <text x="152" y="792" fill="#fffdf8" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="700">The real buyer question is not "Do you have a recall plan?" but "Can you isolate one lot without freezing the whole program?"</text>
</svg>
