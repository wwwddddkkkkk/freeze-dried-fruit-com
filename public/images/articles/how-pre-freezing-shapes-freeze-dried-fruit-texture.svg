<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">How pre-freezing shapes freeze-dried fruit texture</title>
  <desc id="desc">A technical process flow showing pre-freezing rate, ice crystal pattern, pore structure, and final texture outcome in freeze-dried fruit.</desc>
  <rect width="1200" height="680" fill="#f6f4ee"/>
  <rect x="74" y="72" width="1052" height="536" rx="34" fill="#fffdf8" stroke="#d8d2c3" stroke-width="2"/>
  <text x="112" y="128" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="33" font-weight="700">Texture starts before sublimation</text>
  <text x="112" y="166" fill="#68736c" font-family="Inter, Arial, sans-serif" font-size="17">Pre-freezing sets the crystal pattern that later becomes the fruit's pore network.</text>

  <g transform="translate(112 218)">
    <rect width="224" height="258" rx="24" fill="#edf4f7" stroke="#c8d8de"/>
    <text x="24" y="44" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="700">1. Fruit loading</text>
    <text x="24" y="72" fill="#60716c" font-family="Inter, Arial, sans-serif" font-size="14">cut size and temperature</text>
    <rect x="34" y="104" width="56" height="104" rx="14" fill="#ffd4c1" stroke="#e3a88f"/>
    <rect x="100" y="92" width="56" height="116" rx="14" fill="#ffc7ad" stroke="#e3a88f"/>
    <rect x="166" y="110" width="24" height="98" rx="12" fill="#ffdccc" stroke="#e3a88f"/>
    <text x="24" y="232" fill="#425650" font-family="Inter, Arial, sans-serif" font-size="14">variation here changes</text>
    <text x="24" y="252" fill="#425650" font-family="Inter, Arial, sans-serif" font-size="14">how evenly pieces freeze</text>
  </g>

  <g transform="translate(376 218)">
    <rect width="224" height="258" rx="24" fill="#eef0fb" stroke="#ccd1e8"/>
    <text x="24" y="44" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="700">2. Pre-freezing</text>
    <text x="24" y="72" fill="#60716c" font-family="Inter, Arial, sans-serif" font-size="14">freezing rate changes structure</text>
    <line x1="44" y1="202" x2="180" y2="202" stroke="#a9b7de" stroke-width="2"/>
    <path d="M46 178 C74 134, 108 102, 138 90 S182 74, 182 74" fill="none" stroke="#5d79c8" stroke-width="5" stroke-linecap="round"/>
    <circle cx="84" cy="132" r="10" fill="#b8c6f0"/>
    <circle cx="124" cy="112" r="16" fill="#d5def7"/>
    <circle cx="158" cy="92" r="8" fill="#b8c6f0"/>
    <text x="24" y="232" fill="#425650" font-family="Inter, Arial, sans-serif" font-size="14">smaller or larger crystals</text>
    <text x="24" y="252" fill="#425650" font-family="Inter, Arial, sans-serif" font-size="14">lead to different pore maps</text>
  </g>

  <g transform="translate(640 218)">
    <rect width="224" height="258" rx="24" fill="#f3efe6" stroke="#d8d2c3"/>
    <text x="24" y="44" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="700">3. After drying</text>
    <text x="24" y="72" fill="#60716c" font-family="Inter, Arial, sans-serif" font-size="14">empty crystal paths become pores</text>
    <rect x="38" y="96" width="148" height="126" rx="24" fill="#fffdf8" stroke="#d8d2c3"/>
    <circle cx="68" cy="128" r="11" fill="#d6eadb"/>
    <circle cx="110" cy="120" r="18" fill="#d6eadb"/>
    <circle cx="152" cy="134" r="10" fill="#d6eadb"/>
    <circle cx="88" cy="168" r="16" fill="#d6eadb"/>
    <circle cx="136" cy="176" r="22" fill="#d6eadb"/>
    <text x="24" y="232" fill="#425650" font-family="Inter, Arial, sans-serif" font-size="14">pore size affects crunch,</text>
    <text x="24" y="252" fill="#425650" font-family="Inter, Arial, sans-serif" font-size="14">strength, and drying uniformity</text>
  </g>

  <g transform="translate(904 218)">
    <rect width="184" height="258" rx="24" fill="#edf6f1" stroke="#c6d8ce"/>
    <text x="24" y="44" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="700">4. Outcome</text>
    <rect x="24" y="92" width="136" height="34" rx="17" fill="#cadccf"/>
    <text x="42" y="114" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="14">airy crisp</text>
    <rect x="24" y="140" width="136" height="34" rx="17" fill="#e8d9b9"/>
    <text x="42" y="162" fill="#6b5136" font-family="Inter, Arial, sans-serif" font-size="14">denser bite</text>
    <rect x="24" y="188" width="136" height="34" rx="17" fill="#e7c0b5"/>
    <text x="42" y="210" fill="#7a3f35" font-family="Inter, Arial, sans-serif" font-size="14">fragile edges</text>
  </g>

  <path d="M340 348h22" stroke="#7d8e88" stroke-width="3" stroke-linecap="round"/>
  <path d="M604 348h22" stroke="#7d8e88" stroke-width="3" stroke-linecap="round"/>
  <path d="M868 348h22" stroke="#7d8e88" stroke-width="3" stroke-linecap="round"/>

  <g transform="translate(112 536)">
    <rect width="976" height="34" rx="17" fill="#1f332d"/>
    <text x="28" y="23" fill="#fffdf8" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">Buyer note: ask how fruit is frozen, not only what final moisture number the supplier reports.</text>
  </g>
</svg>
