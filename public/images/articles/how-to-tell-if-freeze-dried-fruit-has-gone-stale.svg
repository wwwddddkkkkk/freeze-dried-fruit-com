<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">How to tell if freeze-dried fruit has gone stale and when to toss it</title>
  <desc id="desc">A decision guide running freeze-dried fruit through texture, appearance, and smell checks, sorting the result into still good to eat, use in baking, or discard.</desc>
  <rect width="1600" height="900" fill="#f4efe6"/>
  <rect x="64" y="64" width="1472" height="772" rx="30" fill="#fcfaf5" stroke="#d4c7b1" stroke-width="2"/>
  <text x="112" y="138" fill="#24433d" font-family="'Source Sans 3', Arial, sans-serif" font-size="26" letter-spacing="5">APPLICATIONS</text>
  <text x="112" y="196" fill="#172f2b" font-family="'DM Serif Display', Georgia, serif" font-size="48">Stale, or Actually Spoiled?</text>
  <text x="112" y="238" fill="#5f716d" font-family="'Source Serif 4', Georgia, serif" font-size="23">Three quick checks sort good fruit from fruit that belongs in the bin.</text>

  <!-- three checks column -->
  <g font-family="'Source Sans 3', Arial, sans-serif">
    <rect x="112" y="300" width="360" height="120" rx="14" fill="#eef3ee" stroke="#9db3a6" stroke-width="2"/>
    <text x="140" y="342" fill="#24433d" font-size="24">1 · TEXTURE</text>
    <text x="140" y="378" fill="#5f716d" font-family="'Source Serif 4', Georgia, serif" font-size="19">Snaps &amp; crumbles → good</text>
    <text x="140" y="404" fill="#5f716d" font-family="'Source Serif 4', Georgia, serif" font-size="19">Bends or chews → moisture</text>

    <rect x="112" y="440" width="360" height="120" rx="14" fill="#eef3ee" stroke="#9db3a6" stroke-width="2"/>
    <text x="140" y="482" fill="#24433d" font-size="24">2 · APPEARANCE</text>
    <text x="140" y="518" fill="#5f716d" font-family="'Source Serif 4', Georgia, serif" font-size="19">Dry, separate → good</text>
    <text x="140" y="544" fill="#5f716d" font-family="'Source Serif 4', Georgia, serif" font-size="19">Damp clumps / mold → stop</text>

    <rect x="112" y="580" width="360" height="120" rx="14" fill="#eef3ee" stroke="#9db3a6" stroke-width="2"/>
    <text x="140" y="622" fill="#24433d" font-size="24">3 · SMELL</text>
    <text x="140" y="658" fill="#5f716d" font-family="'Source Serif 4', Georgia, serif" font-size="19">Fruity / neutral → good</text>
    <text x="140" y="684" fill="#5f716d" font-family="'Source Serif 4', Georgia, serif" font-size="19">Sour / fermented → discard</text>
  </g>

  <!-- arrows to outcomes -->
  <g stroke="#8a9a8f" stroke-width="3" fill="none" marker-end="url(#sa)">
    <line x1="472" y1="360" x2="700" y2="420"/>
    <line x1="472" y1="500" x2="700" y2="500"/>
    <line x1="472" y1="640" x2="700" y2="580"/>
  </g>
  <defs>
    <marker id="sa" markerWidth="12" markerHeight="12" refX="9" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#8a9a8f"/></marker>
  </defs>

  <!-- outcomes -->
  <rect x="712" y="330" width="384" height="112" rx="14" fill="#dcefe2" stroke="#2f6b4f" stroke-width="2.5"/>
  <text x="736" y="374" fill="#2f6b4f" font-family="'DM Serif Display', Georgia, serif" font-size="28">Crisp &amp; clean → EAT IT</text>
  <text x="736" y="410" fill="#3d5347" font-family="'Source Serif 4', Georgia, serif" font-size="19">Snack straight from the bag.</text>

  <rect x="712" y="452" width="384" height="112" rx="14" fill="#fbe6cf" stroke="#c99a5c" stroke-width="2.5"/>
  <text x="736" y="496" fill="#8a5a1f" font-family="'DM Serif Display', Georgia, serif" font-size="26">Soft but safe → BAKE IT</text>
  <text x="736" y="532" fill="#6b5230" font-family="'Source Serif 4', Georgia, serif" font-size="19">Oatmeal, smoothies, muffins, powder.</text>

  <rect x="712" y="574" width="384" height="112" rx="14" fill="#f7dcd6" stroke="#b5473a" stroke-width="2.5"/>
  <text x="736" y="618" fill="#a03b2e" font-family="'DM Serif Display', Georgia, serif" font-size="28">Mold / off smell → TOSS</text>
  <text x="736" y="654" fill="#7d3226" font-family="'Source Serif 4', Georgia, serif" font-size="19">Damp clumping counts too.</text>

  <!-- prevention note -->
  <rect x="1128" y="330" width="340" height="356" rx="14" fill="#fbf3e8" stroke="#d8b98a" stroke-width="2"/>
  <text x="1152" y="372" fill="#8a5a1f" font-family="'Source Sans 3', Arial, sans-serif" font-size="22" letter-spacing="1">KEEP IT CRISP</text>
  <g font-family="'Source Serif 4', Georgia, serif" font-size="19" fill="#6b5230">
    <text x="1152" y="418">• Reseal tight, press out air</text>
    <text x="1152" y="458">• Cool, dark, away from stove</text>
    <text x="1152" y="498">• Keep the desiccant packet</text>
    <text x="1152" y="538">• Airtight jar for open bags</text>
    <text x="1152" y="578">• Best-by date as a guide</text>
    <text x="1152" y="618">• Senses = final word</text>
  </g>

  <text x="112" y="760" fill="#172f2b" font-family="'Source Serif 4', Georgia, serif" font-size="22" font-style="italic">Moisture, not mold, is the usual failure — texture tells you first.</text>
  <text x="112" y="806" fill="#5f716d" font-family="'Source Sans 3', Arial, sans-serif" font-size="18">Freeze-Dried-Fruit.com — Applications field notes</text>
</svg>
