<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">How to make freeze-dried fruit powder at home</title>
  <desc id="desc">Four-step diagram: crisp freeze-dried fruit pieces, grinding in a grinder, sieving into fine powder, and sealing in an airtight jar with a desiccant, followed by use icons for drinks, baking, and seasoning.</desc>
  <rect width="1600" height="900" fill="#f4efe6"/>
  <rect x="64" y="64" width="1472" height="772" rx="30" fill="#fcfaf5" stroke="#d4c7b1" stroke-width="2"/>
  <text x="112" y="138" fill="#24433d" font-family="'Source Sans 3', Arial, sans-serif" font-size="26" letter-spacing="5">APPLICATIONS</text>
  <text x="112" y="194" fill="#172f2b" font-family="'DM Serif Display', Georgia, serif" font-size="48">Pulse, Sieve, Seal — Then Beat the Humidity</text>
  <text x="112" y="236" fill="#5f716d" font-family="'Source Serif 4', Georgia, serif" font-size="24">Grinding is the easy minute. Keeping the powder loose is the real skill.</text>

  <!-- Step 1 -->
  <g>
    <rect x="104" y="296" width="312" height="232" rx="20" fill="#f1ebdf" stroke="#294643" stroke-width="2"/>
    <text x="132" y="334" fill="#294643" font-family="'Source Sans 3', Arial, sans-serif" font-size="20" letter-spacing="2">1 · CRISP PIECES</text>
    <circle cx="190" cy="430" r="26" fill="#e8556b"/>
    <circle cx="250" cy="450" r="22" fill="#f0a04b"/>
    <circle cx="300" cy="420" r="24" fill="#7a4ea8"/>
    <circle cx="220" cy="478" r="18" fill="#e7ad55"/>
    <text x="132" y="512" fill="#5a4a30" font-family="'Source Sans 3', Arial, sans-serif" font-size="17">Must still snap, not bend.</text>
  </g>
  <!-- Step 2 -->
  <g>
    <rect x="444" y="296" width="312" height="232" rx="20" fill="#f1ebdf" stroke="#294643" stroke-width="2"/>
    <text x="472" y="334" fill="#294643" font-family="'Source Sans 3', Arial, sans-serif" font-size="20" letter-spacing="2">2 · GRIND DRY</text>
    <rect x="556" y="372" width="88" height="92" rx="10" fill="#cdd9d2" stroke="#5a7068"/>
    <rect x="556" y="436" width="88" height="28" rx="4" fill="#203836"/>
    <path d="M572 392 L628 392 M572 410 L628 410" stroke="#5a7068" stroke-width="3"/>
    <text x="472" y="500" fill="#5a4a30" font-family="'Source Sans 3', Arial, sans-serif" font-size="17">Short pulses, dry jar.</text>
  </g>
  <!-- Step 3 -->
  <g>
    <rect x="784" y="296" width="312" height="232" rx="20" fill="#f1ebdf" stroke="#294643" stroke-width="2"/>
    <text x="812" y="334" fill="#294643" font-family="'Source Sans 3', Arial, sans-serif" font-size="20" letter-spacing="2">3 · SIEVE</text>
    <path d="M880 380 a60 24 0 0 0 120 0" fill="none" stroke="#9a6b22" stroke-width="3"/>
    <line x1="880" y1="380" x2="1000" y2="380" stroke="#9a6b22" stroke-width="3"/>
    <g stroke="#c9a24a" stroke-width="2"><line x1="896" y1="388" x2="896" y2="398"/><line x1="916" y1="390" x2="916" y2="400"/><line x1="940" y1="391" x2="940" y2="401"/><line x1="964" y1="390" x2="964" y2="400"/><line x1="984" y1="388" x2="984" y2="398"/></g>
    <g fill="#e7ad55"><circle cx="912" cy="430" r="3"/><circle cx="940" cy="448" r="3"/><circle cx="968" cy="432" r="3"/><circle cx="926" cy="462" r="3"/><circle cx="956" cy="468" r="3"/></g>
    <text x="812" y="500" fill="#5a4a30" font-family="'Source Sans 3', Arial, sans-serif" font-size="17">Regrind the holdouts.</text>
  </g>
  <!-- Step 4 -->
  <g>
    <rect x="1124" y="296" width="312" height="232" rx="20" fill="#17312f"/>
    <text x="1152" y="334" fill="#f7f0e4" font-family="'Source Sans 3', Arial, sans-serif" font-size="20" letter-spacing="2">4 · SEAL + DRY</text>
    <rect x="1230" y="372" width="100" height="108" rx="10" fill="#fcfaf6" stroke="#cfc4ac"/>
    <rect x="1244" y="356" width="72" height="22" rx="6" fill="#b6433a"/>
    <rect x="1252" y="430" width="56" height="34" rx="5" fill="#e7ad55"/>
    <rect x="1262" y="392" width="36" height="22" rx="4" fill="#d9d2c0" stroke="#9a8f74"/>
    <text x="1280" y="408" fill="#6a5f44" font-family="'Source Sans 3', Arial, sans-serif" font-size="11" text-anchor="middle">DRY</text>
    <text x="1152" y="512" fill="#cfe0d9" font-family="'Source Sans 3', Arial, sans-serif" font-size="17">Airtight, with a desiccant.</text>
  </g>

  <!-- arrows between steps -->
  <g stroke="#203836" stroke-width="3" fill="none">
    <path d="M420 412 L440 412" marker-end="url(#a2)"/>
    <path d="M760 412 L780 412" marker-end="url(#a2)"/>
    <path d="M1100 412 L1120 412" marker-end="url(#a2)"/>
  </g>

  <!-- uses strip -->
  <rect x="104" y="560" width="1332" height="188" rx="20" fill="#eef3ef" stroke="#294643"/>
  <text x="132" y="598" fill="#294643" font-family="'Source Sans 3', Arial, sans-serif" font-size="20" letter-spacing="2">WHERE POWDER SHINES</text>
  <g font-family="'Source Sans 3', Arial, sans-serif" font-size="20" fill="#1f3a35">
    <text x="160" y="652">🥤  Drinks &amp; lattes</text>
    <text x="160" y="694">🍓  Frostings &amp; whipped cream</text>
    <text x="540" y="652">🥣  Yogurt &amp; oatmeal dusting</text>
    <text x="540" y="694">🍩  Rims, chocolate, finishing</text>
    <text x="980" y="652">🧂  Vinaigrettes &amp; rubs</text>
    <text x="980" y="694">🧁  Add late to batters, briefly</text>
  </g>

  <rect x="104" y="772" width="1332" height="46" rx="16" fill="#203836"/>
  <text x="132" y="802" fill="#fffdf8" font-family="'Source Sans 3', Arial, sans-serif" font-size="19" font-weight="700">Powder grabs moisture faster than pieces — have the jar open and ready before you grind.</text>

  <defs>
    <marker id="a2" markerWidth="11" markerHeight="11" refX="8" refY="5" orient="auto"><path d="M0 0 L11 5 L0 10 z" fill="#203836"/></marker>
  </defs>
</svg>
