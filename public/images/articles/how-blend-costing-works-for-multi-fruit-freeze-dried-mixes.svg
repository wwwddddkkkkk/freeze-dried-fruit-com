<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">How blend costing works for multi-fruit freeze-dried mixes</title>
  <desc id="desc">A weighted-cost diagram showing four freeze-dried fruits with different per-kilogram costs and different blend percentages, combining into a single weighted blended cost plus a loss adjustment.</desc>
  <rect width="1200" height="680" fill="#f6f4ee"/>
  <rect x="74" y="72" width="1052" height="536" rx="34" fill="#fffdf8" stroke="#d8d2c3" stroke-width="2"/>
  <text x="112" y="128" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="33" font-weight="700">A blend price is a weighted average</text>
  <text x="112" y="166" fill="#68736c" font-family="Inter, Arial, sans-serif" font-size="17">Cost per fruit &#215; share of recipe, summed, then adjusted for losses.</text>

  <!-- fruit rows -->
  <g transform="translate(112 210)" font-family="Inter, Arial, sans-serif">
    <!-- apple -->
    <circle cx="18" cy="18" r="15" fill="#e8b4b0" stroke="#c07a74" stroke-width="2"/>
    <text x="48" y="16" fill="#1f332d" font-size="17" font-weight="700">Apple base</text>
    <text x="48" y="36" fill="#8a8578" font-size="13">50% of mix &#183; low cost/kg</text>
    <rect x="360" y="4" width="320" height="26" rx="6" fill="#eef2fb" stroke="#cdd8ef"/>
    <rect x="360" y="4" width="180" height="26" rx="6" fill="#9bb0e0"/>
    <text x="700" y="24" fill="#37477e" font-size="14" font-weight="600">low unit cost, high weight</text>

    <!-- banana -->
    <circle cx="18" cy="80" r="15" fill="#f0d98a" stroke="#c9a94a" stroke-width="2"/>
    <text x="48" y="78" fill="#1f332d" font-size="17" font-weight="700">Banana</text>
    <text x="48" y="98" fill="#8a8578" font-size="13">25% of mix &#183; low-mid cost/kg</text>
    <rect x="360" y="66" width="320" height="26" rx="6" fill="#eef2fb" stroke="#cdd8ef"/>
    <rect x="360" y="66" width="120" height="26" rx="6" fill="#9bb0e0"/>

    <!-- strawberry -->
    <circle cx="18" cy="142" r="15" fill="#d9534f" stroke="#a83b38" stroke-width="2"/>
    <text x="48" y="140" fill="#1f332d" font-size="17" font-weight="700">Strawberry</text>
    <text x="48" y="160" fill="#8a8578" font-size="13">15% of mix &#183; mid-high cost/kg</text>
    <rect x="360" y="128" width="320" height="26" rx="6" fill="#eef2fb" stroke="#cdd8ef"/>
    <rect x="360" y="128" width="150" height="26" rx="6" fill="#5d79c8"/>

    <!-- raspberry -->
    <circle cx="18" cy="204" r="15" fill="#b0305a" stroke="#82203f" stroke-width="2"/>
    <text x="48" y="202" fill="#1f332d" font-size="17" font-weight="700">Raspberry accent</text>
    <text x="48" y="222" fill="#8a8578" font-size="13">10% of mix &#183; high cost/kg</text>
    <rect x="360" y="190" width="320" height="26" rx="6" fill="#eef2fb" stroke="#cdd8ef"/>
    <rect x="360" y="190" width="300" height="26" rx="6" fill="#3a4f9e"/>
    <text x="700" y="210" fill="#3a4f9e" font-size="14" font-weight="600">small weight, big cost share</text>
  </g>

  <!-- combine arrow -->
  <path d="M600 470 v-14 M600 470 l-8 -10 h16 z" fill="none"/>
  <text x="112" y="486" fill="#8a8578" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="600" letter-spacing="1.5">WEIGHTED SUM</text>

  <!-- result bar -->
  <g transform="translate(112 500)">
    <rect width="620" height="80" rx="18" fill="#f7f3ea" stroke="#d8d2c3"/>
    <text x="24" y="34" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700">Blended cost per kg</text>
    <text x="24" y="60" fill="#68736c" font-family="Inter, Arial, sans-serif" font-size="14">sits between the cheapest and priciest fruit, pulled up by the accent</text>
  </g>
  <path d="M744 540 h34 M778 540 l-10 -6 v12 z" fill="#bdb4a1" stroke="#bdb4a1" stroke-width="3"/>
  <g transform="translate(792 500)">
    <rect width="276" height="80" rx="18" fill="#eaf4ee" stroke="#7db08e" stroke-width="2"/>
    <text x="22" y="34" fill="#2f6b53" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">+ loss adjustment</text>
    <text x="22" y="60" fill="#4f8468" font-family="Inter, Arial, sans-serif" font-size="13">breakage, fines, fill give-away</text>
  </g>
</svg>
