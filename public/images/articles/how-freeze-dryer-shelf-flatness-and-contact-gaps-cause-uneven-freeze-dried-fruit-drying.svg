<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">How freeze-dryer shelf flatness and contact gaps cause uneven drying</title>
  <desc id="desc">Cross-section comparing a tray with full shelf contact to a tray sitting on a warped shelf with an air gap, showing heat arrows weaken across the gap.</desc>
  <rect width="1200" height="680" fill="#f6f4ee"/>
  <rect x="72" y="72" width="1056" height="536" rx="34" fill="#fffdf8" stroke="#d8d2c3" stroke-width="2"/>
  <text x="110" y="126" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="700">Heat only helps where the tray actually touches the shelf</text>
  <text x="110" y="164" fill="#68736c" font-family="Inter, Arial, sans-serif" font-size="17">Under vacuum, a thin gap between shelf and tray behaves like insulation and slows that part of the load.</text>

  <!-- Left: good contact -->
  <g transform="translate(110 214)">
    <rect width="452" height="330" rx="26" fill="#eef6ef" stroke="#c7ddc9"/>
    <text x="24" y="40" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Full contact</text>
    <text x="24" y="66" fill="#4c6150" font-family="Inter, Arial, sans-serif" font-size="14">flat shelf + flat tray = strong conduction</text>

    <!-- fruit layer -->
    <rect x="70" y="110" width="312" height="34" rx="10" fill="#e9c27d"/>
    <circle cx="110" cy="127" r="9" fill="#d9a95c"/>
    <circle cx="150" cy="127" r="9" fill="#d9a95c"/>
    <circle cx="190" cy="127" r="9" fill="#d9a95c"/>
    <circle cx="230" cy="127" r="9" fill="#d9a95c"/>
    <circle cx="270" cy="127" r="9" fill="#d9a95c"/>
    <circle cx="310" cy="127" r="9" fill="#d9a95c"/>
    <text x="392" y="132" fill="#7a6741" font-family="Inter, Arial, sans-serif" font-size="13">fruit</text>
    <!-- tray -->
    <rect x="60" y="150" width="332" height="20" rx="6" fill="#ffffff" stroke="#c7ddc9"/>
    <text x="60" y="192" fill="#4c6150" font-family="Inter, Arial, sans-serif" font-size="13">tray sits flush across its whole base</text>
    <!-- shelf -->
    <rect x="60" y="212" width="332" height="30" rx="6" fill="#7fae86"/>
    <text x="70" y="232" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700">heated shelf</text>
    <!-- strong heat arrows -->
    <g stroke="#3f7a4c" stroke-width="6" stroke-linecap="round">
      <line x1="110" y1="210" x2="110" y2="172"/>
      <line x1="190" y1="210" x2="190" y2="172"/>
      <line x1="270" y1="210" x2="270" y2="172"/>
      <line x1="340" y1="210" x2="340" y2="172"/>
    </g>
    <g fill="#3f7a4c">
      <polygon points="110,166 104,178 116,178"/>
      <polygon points="190,166 184,178 196,178"/>
      <polygon points="270,166 264,178 276,178"/>
      <polygon points="340,166 334,178 346,178"/>
    </g>
    <text x="24" y="300" fill="#2f5d3a" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">Dries on schedule &#183; crisp, even bite</text>
  </g>

  <!-- Right: gap -->
  <g transform="translate(636 214)">
    <rect width="452" height="330" rx="26" fill="#fbeeee" stroke="#e6c9c9"/>
    <text x="24" y="40" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Contact gap</text>
    <text x="24" y="66" fill="#8a4c4c" font-family="Inter, Arial, sans-serif" font-size="14">warped shelf or bowed tray = air gap insulates</text>

    <!-- fruit layer -->
    <rect x="70" y="110" width="312" height="34" rx="10" fill="#e9c27d"/>
    <circle cx="110" cy="127" r="9" fill="#cbb489"/>
    <circle cx="150" cy="127" r="9" fill="#cbb489"/>
    <circle cx="190" cy="127" r="9" fill="#c7a86a"/>
    <circle cx="230" cy="127" r="9" fill="#c7a86a"/>
    <circle cx="270" cy="127" r="9" fill="#cbb489"/>
    <circle cx="310" cy="127" r="9" fill="#cbb489"/>
    <text x="392" y="132" fill="#7a6741" font-family="Inter, Arial, sans-serif" font-size="13">fruit</text>
    <!-- tray, bowed -->
    <path d="M60 170 Q226 140 392 170 L392 150 Q226 120 60 150 Z" fill="#ffffff" stroke="#e6c9c9"/>
    <!-- gap label -->
    <path d="M120 190 L120 208 M332 190 L332 208" stroke="#c96b6b" stroke-width="2" stroke-dasharray="4 4"/>
    <text x="150" y="204" fill="#b4544f" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700">air / vacuum gap</text>
    <!-- shelf, warped -->
    <path d="M60 242 Q226 214 392 242 L392 222 Q226 210 60 222 Z" fill="#cf8f8f"/>
    <text x="70" y="238" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700">warped shelf</text>
    <!-- weak heat arrows, short/dashed -->
    <g stroke="#c96b6b" stroke-width="4" stroke-linecap="round" stroke-dasharray="5 6">
      <line x1="140" y1="210" x2="140" y2="192"/>
      <line x1="226" y1="205" x2="226" y2="190"/>
      <line x1="312" y1="210" x2="312" y2="192"/>
    </g>
    <text x="24" y="300" fill="#a34a45" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">Runs behind &#183; soft centers, higher moisture</text>
  </g>
</svg>
