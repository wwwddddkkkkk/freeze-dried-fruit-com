<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">What natural flavor means on a freeze-dried fruit label</title>
  <desc id="desc">An annotated ingredient panel showing fruit, natural flavor, allergen disclosure, and the difference between plain fruit and a formulated product.</desc>
  <rect width="1200" height="680" fill="#f6f4ee"/>
  <rect x="74" y="72" width="1052" height="536" rx="34" fill="#fffdf8" stroke="#d8d2c3" stroke-width="2"/>
  <text x="112" y="128" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="33" font-weight="700">“Natural flavor” is a product-definition clue</text>
  <text x="112" y="166" fill="#68736c" font-family="Inter, Arial, sans-serif" font-size="17">It does not make the product bad, but it does move the bag away from a plain fruit-only comparison.</text>

  <g transform="translate(142 216)">
    <rect width="428" height="306" rx="26" fill="#fffdf8" stroke="#d8d2c3" stroke-width="2"/>
    <text x="28" y="44" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Ingredient panel</text>
    <rect x="28" y="78" width="296" height="40" rx="14" fill="#cadccf"/>
    <text x="46" y="104" fill="#27453c" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">strawberries</text>
    <rect x="28" y="132" width="188" height="40" rx="14" fill="#ead8b7"/>
    <text x="46" y="158" fill="#6e5a2f" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">natural flavor</text>
    <rect x="28" y="186" width="236" height="40" rx="14" fill="#dce7f3"/>
    <text x="46" y="212" fill="#34526a" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">citric acid (optional cue)</text>
    <rect x="28" y="240" width="250" height="40" rx="14" fill="#e7c0b5"/>
    <text x="46" y="266" fill="#7a3f35" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">contains: milk / peanuts?</text>
    <text x="286" y="260" fill="#6a6f68" font-family="Inter, Arial, sans-serif" font-size="13">only when applicable</text>
  </g>

  <g transform="translate(636 216)">
    <rect width="420" height="306" rx="26" fill="#f7f3ea" stroke="#d8d2c3"/>
    <text x="26" y="42" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">How to read it</text>
    <text x="26" y="90" fill="#495852" font-family="Inter, Arial, sans-serif" font-size="15">1. If natural flavor is listed, the bag is not fruit-only.</text>
    <text x="26" y="124" fill="#495852" font-family="Inter, Arial, sans-serif" font-size="15">2. Ingredient order still matters more than the phrase alone.</text>
    <text x="26" y="158" fill="#495852" font-family="Inter, Arial, sans-serif" font-size="15">3. Compare plain fruit only against plain fruit only.</text>
    <text x="26" y="192" fill="#495852" font-family="Inter, Arial, sans-serif" font-size="15">4. Allergy disclosure can still apply to a flavor system.</text>
    <rect x="26" y="228" width="352" height="42" rx="21" fill="#1f332d"/>
    <text x="48" y="254" fill="#fffdf8" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">Short term, big implication: “natural flavor” changes the comparison set.</text>
  </g>

  <g transform="translate(112 538)">
    <rect width="976" height="34" rx="17" fill="#1f332d"/>
    <text x="28" y="23" fill="#fffdf8" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">Reading rule: treat “natural flavor” as a clue about formulation, then judge the rest of the ingredient line in context.</text>
  </g>
</svg>
