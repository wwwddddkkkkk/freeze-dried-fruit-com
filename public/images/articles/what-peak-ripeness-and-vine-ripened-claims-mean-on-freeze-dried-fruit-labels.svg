<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">What peak-ripeness and vine-ripened claims mean on freeze-dried fruit labels</title>
  <desc id="desc">A diagram separating an unverified front-of-pack ripeness marketing claim from the verifiable quality signals such as spec sheet, Brix, moisture and water activity, and lot consistency.</desc>
  <rect width="1200" height="680" fill="#f6f4ee"/>
  <rect x="74" y="72" width="1052" height="536" rx="34" fill="#fffdf8" stroke="#d8d2c3" stroke-width="2"/>
  <text x="112" y="128" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="33" font-weight="700">A ripeness claim is a story, not a spec</text>
  <text x="112" y="166" fill="#68736c" font-family="Inter, Arial, sans-serif" font-size="17">Separate the marketing phrase from what can actually be verified.</text>

  <!-- Left: the claim -->
  <g transform="translate(112 214)">
    <rect width="440" height="272" rx="26" fill="#f7f3ea" stroke="#d8d2c3"/>
    <text x="28" y="42" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">Front panel</text>
    <rect x="28" y="64" width="384" height="86" rx="16" fill="#fffdf8" stroke="#e7c0b5" stroke-width="2"/>
    <text x="52" y="104" fill="#7a3f35" font-family="Georgia, serif" font-size="24" font-style="italic">"Picked at peak ripeness"</text>
    <text x="52" y="132" fill="#7a3f35" font-family="Georgia, serif" font-size="20" font-style="italic">"Vine-ripened"</text>

    <text x="28" y="184" fill="#495852" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">What it is</text>
    <text x="28" y="210" fill="#68736c" font-family="Inter, Arial, sans-serif" font-size="14">• marketing language, no fixed definition</text>
    <text x="28" y="234" fill="#68736c" font-family="Inter, Arial, sans-serif" font-size="14">• not certified or independently verified</text>
    <text x="28" y="258" fill="#68736c" font-family="Inter, Arial, sans-serif" font-size="14">• describes intent at harvest only</text>
  </g>

  <!-- arrow -->
  <g transform="translate(566 340)">
    <path d="M0 10 H70" stroke="#bdb4a1" stroke-width="4"/>
    <path d="M62 0 L78 10 L62 20 Z" fill="#bdb4a1"/>
  </g>

  <!-- Right: verifiable -->
  <g transform="translate(660 214)">
    <rect width="428" height="272" rx="26" fill="#fffdf8" stroke="#d8d2c3"/>
    <text x="28" y="42" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">What you can check</text>
    <rect x="28" y="64" width="372" height="34" rx="17" fill="#cadccf"/>
    <text x="48" y="87" fill="#27453c" font-family="Inter, Arial, sans-serif" font-size="14">variety and Brix on the spec sheet</text>
    <rect x="28" y="106" width="372" height="34" rx="17" fill="#cadccf"/>
    <text x="48" y="129" fill="#27453c" font-family="Inter, Arial, sans-serif" font-size="14">moisture and water activity targets</text>
    <rect x="28" y="148" width="372" height="34" rx="17" fill="#cadccf"/>
    <text x="48" y="171" fill="#27453c" font-family="Inter, Arial, sans-serif" font-size="14">defect limits and grading criteria</text>
    <rect x="28" y="190" width="372" height="34" rx="17" fill="#cadccf"/>
    <text x="48" y="213" fill="#27453c" font-family="Inter, Arial, sans-serif" font-size="14">lot-to-lot consistency and the fruit itself</text>
    <text x="28" y="252" fill="#68736c" font-family="Inter, Arial, sans-serif" font-size="13">Freezing, drying, and packaging still decide the finished bag.</text>
  </g>

  <g transform="translate(112 522)">
    <rect width="976" height="48" rx="24" fill="#1f332d"/>
    <text x="28" y="30" fill="#fffdf8" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">Buyer note: treat ripeness claims as a soft signal, then judge the fruit by measurable specs and consistency.</text>
  </g>
</svg>
