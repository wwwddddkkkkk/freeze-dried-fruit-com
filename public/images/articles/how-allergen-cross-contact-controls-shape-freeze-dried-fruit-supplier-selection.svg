<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">How allergen cross-contact controls shape freeze-dried fruit supplier selection</title>
  <desc id="desc">A shared facility runs fruit, nut, and dairy lines. Four control gates — segregation, validated cleaning, scheduling, and testing — sit between the shared plant and a supported allergen-free claim.</desc>
  <rect width="1600" height="900" fill="#f4efe6"/>
  <rect x="64" y="64" width="1472" height="772" rx="30" fill="#fcfaf5" stroke="#d4c7b1" stroke-width="2"/>
  <text x="112" y="138" fill="#24433d" font-family="'Source Sans 3', Arial, sans-serif" font-size="26" letter-spacing="5">INDUSTRY INSIGHTS</text>
  <text x="112" y="192" fill="#172f2b" font-family="'DM Serif Display', Georgia, serif" font-size="46">The Fruit Is Clean. Is the Plant?</text>
  <text x="112" y="232" fill="#5f716d" font-family="'Source Serif 4', Georgia, serif" font-size="23">Cross-contact risk lives in shared equipment — controls, not recipes, gate the claim.</text>

  <!-- Shared facility block -->
  <rect x="104" y="300" width="360" height="430" rx="22" fill="#f1ebdf" stroke="#294643" stroke-width="2"/>
  <text x="130" y="342" fill="#294643" font-family="'Source Sans 3', Arial, sans-serif" font-size="20" letter-spacing="2">SHARED FACILITY</text>
  <g font-family="'Source Sans 3', Arial, sans-serif" font-size="21">
    <rect x="130" y="366" width="308" height="66" rx="10" fill="#dfeae2" stroke="#294643" stroke-width="1.5"/>
    <text x="152" y="406" fill="#17312f">Fruit line</text>
    <rect x="130" y="446" width="308" height="66" rx="10" fill="#f0dccb" stroke="#b7472f" stroke-width="1.5"/>
    <text x="152" y="486" fill="#8f3a26">Nut line</text>
    <rect x="130" y="526" width="308" height="66" rx="10" fill="#f0dccb" stroke="#b7472f" stroke-width="1.5"/>
    <text x="152" y="566" fill="#8f3a26">Dairy line</text>
    <rect x="130" y="606" width="308" height="66" rx="10" fill="#f0dccb" stroke="#b7472f" stroke-width="1.5"/>
    <text x="152" y="646" fill="#8f3a26">Wheat line</text>
  </g>

  <!-- Control gates -->
  <text x="516" y="332" fill="#294643" font-family="'Source Sans 3', Arial, sans-serif" font-size="20" letter-spacing="2">CONTROL GATES</text>
  <g font-family="'Source Sans 3', Arial, sans-serif" font-size="22">
    <rect x="516" y="356" width="470" height="76" rx="12" fill="#24433d"/>
    <text x="540" y="402" fill="#ffffff">1 &#183; Segregation of lines / rooms</text>
    <rect x="516" y="446" width="470" height="76" rx="12" fill="#24433d"/>
    <text x="540" y="492" fill="#ffffff">2 &#183; Validated cleaning + swab tests</text>
    <rect x="516" y="536" width="470" height="76" rx="12" fill="#24433d"/>
    <text x="540" y="582" fill="#ffffff">3 &#183; Scheduling &amp; run sequencing</text>
    <rect x="516" y="626" width="470" height="76" rx="12" fill="#24433d"/>
    <text x="540" y="672" fill="#ffffff">4 &#183; Allergen testing / monitoring</text>
  </g>

  <!-- arrows to outcome -->
  <g stroke="#294643" stroke-width="3" fill="none">
    <path d="M986 470 H1060" marker-end="url(#ar)"/>
  </g>
  <defs>
    <marker id="ar" markerWidth="12" markerHeight="12" refX="8" refY="6" orient="auto">
      <path d="M0 0 L10 6 L0 12 Z" fill="#294643"/>
    </marker>
  </defs>

  <!-- Outcome -->
  <rect x="1072" y="356" width="392" height="346" rx="22" fill="#17312f"/>
  <text x="1100" y="400" fill="#a7c7bd" font-family="'Source Sans 3', Arial, sans-serif" font-size="20" letter-spacing="2">SUPPORTED CLAIM</text>
  <text x="1100" y="452" fill="#ffffff" font-family="'DM Serif Display', Georgia, serif" font-size="30">Free-from</text>
  <text x="1100" y="490" fill="#ffffff" font-family="'DM Serif Display', Georgia, serif" font-size="30">that holds up</text>
  <text x="1100" y="548" fill="#cfe0d8" font-family="'Source Serif 4', Georgia, serif" font-size="20">Backed by an allergen</text>
  <text x="1100" y="578" fill="#cfe0d8" font-family="'Source Serif 4', Georgia, serif" font-size="20">profile + cleaning records</text>
  <text x="1100" y="632" fill="#cfe0d8" font-family="'Source Serif 4', Georgia, serif" font-size="20">Without them: only a</text>
  <text x="1100" y="662" fill="#cfe0d8" font-family="'Source Serif 4', Georgia, serif" font-size="20">voluntary "may contain"</text>

  <rect x="104" y="756" width="1360" height="48" rx="18" fill="#203836"/>
  <text x="142" y="787" fill="#fffdf8" font-family="'Source Sans 3', Arial, sans-serif" font-size="20" font-weight="700">Ask for the allergen profile and cleaning validation before you print a label — not after.</text>
</svg>
