  <text x="92" y="178" fill="#1d2732" font-family="'Source Serif 4', Georgia, serif" font-size="54">Puncture Resistance in Fruit Pouches</text>
  <text x="92" y="216" fill="#526170" font-family="'Source Sans 3', Arial, sans-serif" font-size="22">Film-body damage risk is different from barrier numbers and seal strength.</text>

  <rect x="96" y="276" width="700" height="486" rx="26" fill="#fffdfa" stroke="#1d2732" stroke-width="2"/>
