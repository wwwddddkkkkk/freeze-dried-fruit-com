<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">How vendor-managed inventory and consignment stocking work for freeze-dried fruit</title>
  <desc id="desc">Side-by-side comparison of VMI and consignment models showing who manages replenishment, who owns the stock, and when payment and title transfer.</desc>
  <rect width="1600" height="900" fill="#f4efe6"/>
  <rect x="64" y="64" width="1472" height="772" rx="30" fill="#fcfaf5" stroke="#d4c7b1" stroke-width="2"/>
  <text x="112" y="138" fill="#24433d" font-family="'Source Sans 3', Arial, sans-serif" font-size="26" letter-spacing="5">INDUSTRY INSIGHTS</text>
  <text x="112" y="194" fill="#172f2b" font-family="'DM Serif Display', Georgia, serif" font-size="50">Same Favor, Two Very Different Risks</text>
  <text x="112" y="236" fill="#5f716d" font-family="'Source Serif 4', Georgia, serif" font-size="24">VMI moves who manages stock. Consignment moves who owns it until you draw it.</text>

  <!-- VMI panel -->
  <rect x="104" y="290" width="660" height="468" rx="24" fill="#f1ebdf" stroke="#294643" stroke-width="2"/>
  <text x="140" y="338" fill="#294643" font-family="'Source Sans 3', Arial, sans-serif" font-size="24" letter-spacing="3">VENDOR-MANAGED INVENTORY</text>
  <text x="140" y="372" fill="#5f716d" font-family="'Source Serif 4', Georgia, serif" font-size="20">Supplier watches levels and replenishes</text>

  <!-- supplier eye to shelf -->
  <circle cx="200" cy="470" r="38" fill="#88b8aa"/>
  <text x="200" y="478" fill="#102725" font-family="'Source Sans 3', Arial, sans-serif" font-size="18" text-anchor="middle" font-weight="700">SUPPLIER</text>
  <path d="M252 470 L360 470" stroke="#17312f" stroke-width="6" stroke-linecap="round" marker-end="url(#a1)"/>
  <text x="262" y="452" fill="#2f4f49" font-family="'Source Sans 3', Arial, sans-serif" font-size="18">tops up to min/max</text>
  <defs><marker id="a1" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0 0 L6 3 L0 6 Z" fill="#17312f"/></marker></defs>

  <rect x="380" y="420" width="320" height="100" rx="14" fill="#fcfaf6" stroke="#c7bda8"/>
  <text x="400" y="452" fill="#465b57" font-family="'Source Sans 3', Arial, sans-serif" font-size="18" letter-spacing="2">YOUR STOCK</text>
  <circle cx="420" cy="486" r="13" fill="#e0b05f"/><circle cx="456" cy="490" r="12" fill="#e0b05f"/><circle cx="492" cy="484" r="14" fill="#e0b05f"/><circle cx="532" cy="490" r="11" fill="#e0b05f"/><circle cx="572" cy="486" r="13" fill="#e0b05f"/><circle cx="612" cy="490" r="12" fill="#e0b05f"/>

  <rect x="140" y="566" width="560" height="78" rx="14" fill="#17312f"/>
  <text x="164" y="600" fill="#9fc4ba" font-family="'Source Sans 3', Arial, sans-serif" font-size="18">OWNERSHIP</text>
  <text x="164" y="628" fill="#ffffff" font-family="'Source Sans 3', Arial, sans-serif" font-size="22" font-weight="700">usually yours on arrival &#8212; you may pay on delivery</text>
  <text x="140" y="690" fill="#2f4f49" font-family="'Source Sans 3', Arial, sans-serif" font-size="20">Wins: fewer stockouts, less ordering effort</text>
  <text x="140" y="722" fill="#9a3b2f" font-family="'Source Sans 3', Arial, sans-serif" font-size="20">Watch: cash may not be freed up</text>

  <!-- Consignment panel -->
  <rect x="788" y="290" width="660" height="468" rx="24" fill="#17312f"/>
  <text x="824" y="338" fill="#f7f0e4" font-family="'Source Sans 3', Arial, sans-serif" font-size="24" letter-spacing="3">CONSIGNMENT</text>
  <text x="824" y="372" fill="#9fc4ba" font-family="'Source Serif 4', Georgia, serif" font-size="20">Supplier owns stock at your site until you draw it</text>

  <rect x="824" y="416" width="300" height="108" rx="14" fill="#0f2422" stroke="#3f5d59"/>
  <text x="844" y="448" fill="#9fc4ba" font-family="'Source Sans 3', Arial, sans-serif" font-size="18" letter-spacing="2">AT YOUR WAREHOUSE</text>
  <circle cx="864" cy="488" r="13" fill="#e0b05f"/><circle cx="900" cy="492" r="12" fill="#e0b05f"/><circle cx="936" cy="486" r="14" fill="#e0b05f"/><circle cx="976" cy="492" r="11" fill="#e0b05f"/><circle cx="1016" cy="488" r="13" fill="#e0b05f"/><circle cx="1056" cy="492" r="12" fill="#e0b05f"/>
  <text x="844" y="514" fill="#9fc4ba" font-family="'Source Sans 3', Arial, sans-serif" font-size="16">still supplier-owned</text>

  <path d="M1140 470 L1230 470" stroke="#e0b05f" stroke-width="6" stroke-linecap="round" marker-end="url(#a2)"/>
  <defs><marker id="a2" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0 0 L6 3 L0 6 Z" fill="#e0b05f"/></marker></defs>
  <text x="1150" y="452" fill="#e0b05f" font-family="'Source Sans 3', Arial, sans-serif" font-size="18">DRAW</text>
  <rect x="1240" y="430" width="176" height="80" rx="14" fill="#e0b05f"/>
  <text x="1328" y="464" fill="#102725" font-family="'Source Sans 3', Arial, sans-serif" font-size="18" text-anchor="middle" font-weight="700">title +</text>
  <text x="1328" y="490" fill="#102725" font-family="'Source Sans 3', Arial, sans-serif" font-size="18" text-anchor="middle" font-weight="700">payment</text>

  <text x="824" y="582" fill="#cfe6df" font-family="'Source Sans 3', Arial, sans-serif" font-size="20">Wins: pay as you use, frees up cash</text>
  <text x="824" y="616" fill="#f0b8ae" font-family="'Source Sans 3', Arial, sans-serif" font-size="20">Watch: who pays if it expires first?</text>
  <text x="824" y="650" fill="#cfe6df" font-family="'Source Sans 3', Arial, sans-serif" font-size="20">Needs: FEFO rotation, min-draw, reconciliation</text>

  <rect x="104" y="772" width="1344" height="42" rx="16" fill="#203836"/>
  <text x="142" y="800" fill="#fffdf8" font-family="'Source Sans 3', Arial, sans-serif" font-size="20" font-weight="700">The clause that decides everything: who absorbs freeze-dried fruit that ages out before it is drawn.</text>
</svg>
