<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">How to use freeze-dried fruit in homemade marshmallows, nougat, and fluff</title>
  <desc id="desc">Diagram contrasting fruit purée adding water to a sugar foam with freeze-dried powder adding flavor only, plus a timeline showing when to fold the powder in and a stickiness control panel.</desc>
  <rect width="1200" height="680" fill="#f6f4ee"/>
  <rect x="70" y="70" width="1060" height="540" rx="34" fill="#fffdf8" stroke="#d8d2c3" stroke-width="2"/>

  <text x="110" y="126" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="33" font-weight="700">A sugar foam cannot afford the water</text>
  <text x="110" y="162" fill="#68736c" font-family="Inter, Arial, sans-serif" font-size="17">Powder adds the fruit. Purée adds the fruit and the problem.</text>

  <!-- Left: puree -->
  <rect x="110" y="200" width="290" height="220" rx="16" fill="#fbe0dd" stroke="#d99f96" stroke-width="2"/>
  <text x="134" y="232" fill="#b7503f" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">Purée into the foam</text>
  <!-- foam bubbles collapsing -->
  <g fill="#ffffff" stroke="#d99f96" stroke-width="1.5">
    <circle cx="170" cy="292" r="20"/><circle cx="218" cy="286" r="14"/><circle cx="256" cy="296" r="10"/>
    <circle cx="292" cy="300" r="8"/><circle cx="330" cy="304" r="6"/>
  </g>
  <g fill="#5f8fbf">
    <circle cx="196" cy="330" r="5"/><circle cx="240" cy="338" r="5"/><circle cx="284" cy="332" r="5"/><circle cx="322" cy="340" r="5"/>
  </g>
  <text x="134" y="372" fill="#b7503f" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">free water → softer set, weeping</text>
  <text x="134" y="396" fill="#68736c" font-family="Inter, Arial, sans-serif" font-size="13">and, oddly, less fruit flavor</text>

  <!-- Right: powder -->
  <rect x="430" y="200" width="290" height="220" rx="16" fill="#e6ece7" stroke="#93b09c" stroke-width="2"/>
  <text x="454" y="232" fill="#2f6b53" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">Powder into the foam</text>
  <g fill="#ffffff" stroke="#93b09c" stroke-width="1.5">
    <circle cx="490" cy="292" r="20"/><circle cx="538" cy="288" r="19"/><circle cx="586" cy="294" r="18"/>
    <circle cx="632" cy="290" r="19"/><circle cx="676" cy="294" r="17"/>
  </g>
  <g fill="#c94f5f">
    <circle cx="510" cy="330" r="3"/><circle cx="548" cy="336" r="3"/><circle cx="590" cy="330" r="3"/>
    <circle cx="626" cy="338" r="3"/><circle cx="664" cy="332" r="3"/><circle cx="530" cy="344" r="3"/><circle cx="606" cy="345" r="3"/>
  </g>
  <text x="454" y="372" fill="#2f6b53" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">flavor + acid + color, no water</text>
  <text x="454" y="396" fill="#68736c" font-family="Inter, Arial, sans-serif" font-size="13">foam keeps its air and its set</text>

  <!-- Right column: dose -->
  <rect x="750" y="200" width="330" height="220" rx="16" fill="#f1efe6" stroke="#e0dbcd" stroke-width="2"/>
  <text x="774" y="232" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">Dose by weight, not spoons</text>
  <line x1="774" y1="266" x2="1056" y2="266" stroke="#c9c2b1" stroke-width="2"/>
  <rect x="774" y="252" width="70" height="28" rx="6" fill="#2f6b53" opacity="0.85"/>
  <text x="782" y="272" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700">2–4%</text>
  <text x="856" y="272" fill="#68736c" font-family="Inter, Arial, sans-serif" font-size="13">of finished batch, then taste up</text>

  <text x="774" y="310" fill="#68736c" font-family="Inter, Arial, sans-serif" font-size="13">raspberry · strawberry · passion</text>
  <text x="774" y="330" fill="#c94f5f" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700">very intense — go low</text>
  <text x="774" y="360" fill="#68736c" font-family="Inter, Arial, sans-serif" font-size="13">mango · peach · banana</text>
  <text x="774" y="380" fill="#e8b04b" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700">needs more to read clearly</text>
  <text x="774" y="404" fill="#b7503f" font-family="Inter, Arial, sans-serif" font-size="12">too much = tacky surface</text>

  <!-- Timeline -->
  <text x="110" y="470" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700">When to add it</text>
  <line x1="150" y1="522" x2="1060" y2="522" stroke="#c9c2b1" stroke-width="3"/>

  <circle cx="230" cy="522" r="11" fill="#b7503f"/>
  <text x="180" y="556" fill="#b7503f" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700">cook syrup</text>
  <text x="176" y="576" fill="#68736c" font-family="Inter, Arial, sans-serif" font-size="12">✗ not here — heat dulls it</text>

  <circle cx="520" cy="522" r="11" fill="#c9c2b1"/>
  <text x="470" y="556" fill="#68736c" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700">whip the foam</text>
  <text x="474" y="576" fill="#68736c" font-family="Inter, Arial, sans-serif" font-size="12">build the air first</text>

  <circle cx="850" cy="522" r="14" fill="#2f6b53"/>
  <text x="782" y="556" fill="#2f6b53" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700">final whip → fold powder in</text>
  <text x="800" y="576" fill="#2f6b53" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700">✓ bright color, bright flavor</text>

  <text x="110" y="500" fill="#68736c" font-family="Inter, Arial, sans-serif" font-size="13">Grind fine → sieve out seeds → fold late → dust the cut faces → store airtight.</text>
</svg>
