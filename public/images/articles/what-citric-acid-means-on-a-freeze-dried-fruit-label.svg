<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Citric acid label reading diagram</title>
  <desc id="desc">An annotated freeze-dried fruit pouch label highlighting the fruit ingredient, citric acid, and notes about tartness, pH control, and product positioning.</desc>
  <rect width="1600" height="900" fill="#f4f1e8"/>
  <rect x="72" y="72" width="1456" height="756" rx="28" fill="#fffaf1" stroke="#cabda2" stroke-width="2"/>
  <text x="116" y="138" fill="#3f3526" font-family="Georgia, 'Times New Roman', serif" font-size="34">Reading "Citric Acid"</text>
  <text x="116" y="176" fill="#7b6a56" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20">A label clue about acidity, formula design, and whether the bag is fruit-only</text>

  <rect x="132" y="246" width="560" height="472" rx="30" fill="#f7cd6d" stroke="#9a7d39" stroke-width="3"/>
  <rect x="178" y="286" width="468" height="88" rx="18" fill="#fff7df"/>
  <text x="204" y="340" fill="#8f6e1f" font-family="'Helvetica Neue', Arial, sans-serif" font-size="36" font-weight="700">Freeze-Dried Mango Bites</text>
  <rect x="178" y="406" width="468" height="232" rx="18" fill="#fffaf0" stroke="#dbc9a3"/>
  <text x="206" y="454" fill="#5c4c3a" font-family="'Helvetica Neue', Arial, sans-serif" font-size="24">Ingredients:</text>
  <text x="206" y="504" fill="#2f261b" font-family="'Helvetica Neue', Arial, sans-serif" font-size="30">Mango, Citric Acid</text>
  <text x="206" y="560" fill="#7b6a56" font-family="'Helvetica Neue', Arial, sans-serif" font-size="22">Simple front panel, but not fruit-only</text>
  <text x="206" y="594" fill="#7b6a56" font-family="'Helvetica Neue', Arial, sans-serif" font-size="22">because a second ingredient is declared.</text>

  <circle cx="568" cy="504" r="18" fill="#d66f49"/>
  <path d="M586 504h168" stroke="#d66f49" stroke-width="4" stroke-linecap="round"/>
  <path d="M754 504l26 -20v40z" fill="#d66f49"/>

  <rect x="804" y="268" width="592" height="146" rx="22" fill="#fcf6ea" stroke="#d5c7a8"/>
  <text x="838" y="320" fill="#3f3526" font-family="Georgia, 'Times New Roman', serif" font-size="28">What It Usually Signals</text>
  <text x="838" y="360" fill="#7b6a56" font-family="'Helvetica Neue', Arial, sans-serif" font-size="21">Acid lift, pH control, or browning/color support</text>

  <rect x="804" y="450" width="280" height="226" rx="22" fill="#fffaf0" stroke="#d5c7a8"/>
  <text x="834" y="500" fill="#3f3526" font-family="Georgia, 'Times New Roman', serif" font-size="26">Read It As</text>
  <text x="834" y="542" fill="#7b6a56" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20">Added ingredient by</text>
  <text x="834" y="568" fill="#7b6a56" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20">common name on label</text>
  <text x="834" y="610" fill="#7b6a56" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20">Not added sugar</text>
  <text x="834" y="652" fill="#7b6a56" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20">Not automatically a problem</text>

  <rect x="1116" y="450" width="280" height="226" rx="22" fill="#fffaf0" stroke="#d5c7a8"/>
  <text x="1146" y="500" fill="#3f3526" font-family="Georgia, 'Times New Roman', serif" font-size="26">Ask Next</text>
  <text x="1146" y="542" fill="#7b6a56" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20">Why was it added?</text>
  <text x="1146" y="584" fill="#7b6a56" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20">Does it fit the flavor brief?</text>
  <text x="1146" y="626" fill="#7b6a56" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20">Is the bag still pitched as</text>
  <text x="1146" y="652" fill="#7b6a56" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20">plain fruit?</text>

  <rect x="804" y="716" width="592" height="78" rx="18" fill="#efe5d2" stroke="#d5c7a8"/>
  <text x="836" y="764" fill="#3f3526" font-family="'Helvetica Neue', Arial, sans-serif" font-size="22">Citric acid often makes a product more designed, not necessarily worse.</text>
</svg>
