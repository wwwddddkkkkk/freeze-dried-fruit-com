<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">How fruit skin, peel, and waxy cuticles slow freeze-drying</title>
  <desc id="desc">Three fruit piece cross-sections compared: a peeled dice with vapor leaving on all sides, a slice with skin only on the rim, and a skin-wrapped half where vapor can only escape through one cut face.</desc>
  <rect width="1600" height="900" fill="#f4efe6"/>
  <rect x="64" y="64" width="1472" height="772" rx="30" fill="#fcfaf5" stroke="#d4c7b1" stroke-width="2"/>
  <text x="112" y="138" fill="#24433d" font-family="'Source Sans 3', Arial, sans-serif" font-size="26" letter-spacing="5">TECHNOLOGY</text>
  <text x="112" y="192" fill="#172f2b" font-family="'DM Serif Display', Georgia, serif" font-size="46">The Barrier the Fruit Brought With It</text>
  <text x="112" y="232" fill="#5f716d" font-family="'Source Serif 4', Georgia, serif" font-size="23">A waxy cuticle blocks vapor escape, so cut geometry decides how fast a piece dries.</text>

  <!-- Panel 1: peeled dice -->
  <rect x="104" y="286" width="428" height="404" rx="24" fill="#f1ebdf" stroke="#294643" stroke-width="2"/>
  <text x="140" y="332" fill="#294643" font-family="'Source Sans 3', Arial, sans-serif" font-size="21" letter-spacing="3">PEELED DICE</text>
  <rect x="248" y="404" width="140" height="140" rx="10" fill="#eadfca" stroke="#294643" stroke-width="2"/>
  <g stroke="#2f6b57" stroke-width="3" marker-end="none">
    <line x1="318" y1="396" x2="318" y2="352"/><path d="M310 364 L318 350 L326 364" fill="none"/>
    <line x1="318" y1="552" x2="318" y2="596"/><path d="M310 584 L318 598 L326 584" fill="none"/>
    <line x1="240" y1="474" x2="196" y2="474"/><path d="M208 466 L194 474 L208 482" fill="none"/>
    <line x1="396" y1="474" x2="440" y2="474"/><path d="M428 466 L442 474 L428 482" fill="none"/>
  </g>
  <text x="140" y="644" fill="#465b57" font-family="'Source Sans 3', Arial, sans-serif" font-size="19">All faces open · shortest path out</text>
  <text x="140" y="672" fill="#2f6b57" font-family="'Source Sans 3', Arial, sans-serif" font-size="19" font-weight="700">Fastest, most uniform</text>

  <!-- Panel 2: slice with skin on rim -->
  <rect x="586" y="286" width="428" height="404" rx="24" fill="#f1ebdf" stroke="#294643" stroke-width="2"/>
  <text x="622" y="332" fill="#294643" font-family="'Source Sans 3', Arial, sans-serif" font-size="21" letter-spacing="3">SLICE · SKIN ON RIM</text>
  <rect x="712" y="404" width="176" height="140" rx="10" fill="#eadfca" stroke="#294643" stroke-width="2"/>
  <rect x="712" y="404" width="14" height="140" fill="#8a5a2b"/>
  <rect x="874" y="404" width="14" height="140" fill="#8a5a2b"/>
  <g stroke="#2f6b57" stroke-width="3">
    <line x1="800" y1="396" x2="800" y2="352"/><path d="M792 364 L800 350 L808 364" fill="none"/>
    <line x1="800" y1="552" x2="800" y2="596"/><path d="M792 584 L800 598 L808 584" fill="none"/>
  </g>
  <g stroke="#b7472f" stroke-width="3">
    <line x1="700" y1="462" x2="672" y2="462"/><line x1="672" y1="450" x2="672" y2="474"/>
    <line x1="900" y1="462" x2="928" y2="462"/><line x1="928" y1="450" x2="928" y2="474"/>
  </g>
  <text x="622" y="644" fill="#465b57" font-family="'Source Sans 3', Arial, sans-serif" font-size="19">Two large cut faces dominate</text>
  <text x="622" y="672" fill="#2f6b57" font-family="'Source Sans 3', Arial, sans-serif" font-size="19" font-weight="700">Skin barely matters here</text>

  <!-- Panel 3: skin-wrapped half -->
  <rect x="1068" y="286" width="428" height="404" rx="24" fill="#17312f"/>
  <text x="1104" y="332" fill="#a7c7bd" font-family="'Source Sans 3', Arial, sans-serif" font-size="21" letter-spacing="3">HALF · SKIN WRAPPED</text>
  <path d="M1204 544 A88 88 0 0 1 1380 544 Z" fill="#24433d" stroke="#7fa89c" stroke-width="2"/>
  <path d="M1204 544 A88 88 0 0 1 1380 544" fill="none" stroke="#c98a4b" stroke-width="12"/>
  <g stroke="#cfe0d8" stroke-width="3">
    <line x1="1292" y1="556" x2="1292" y2="606"/><path d="M1284 594 L1292 608 L1300 594" fill="none"/>
  </g>
  <g stroke="#e08a70" stroke-width="3">
    <line x1="1244" y1="478" x2="1216" y2="452"/><line x1="1214" y1="466" x2="1214" y2="450" /><line x1="1214" y1="450" x2="1230" y2="450"/>
    <line x1="1340" y1="478" x2="1368" y2="452"/><line x1="1370" y1="466" x2="1370" y2="450"/><line x1="1370" y1="450" x2="1354" y2="450"/>
  </g>
  <circle cx="1292" cy="492" r="16" fill="#b7472f" opacity="0.75"/>
  <text x="1104" y="644" fill="#cfe0d8" font-family="'Source Sans 3', Arial, sans-serif" font-size="19">One open face · long internal path</text>
  <text x="1104" y="672" fill="#e08a70" font-family="'Source Sans 3', Arial, sans-serif" font-size="19" font-weight="700">Soft spot hides under the skin</text>

  <rect x="104" y="726" width="1392" height="78" rx="18" fill="#203836"/>
  <text x="140" y="762" fill="#fffdf8" font-family="'Source Sans 3', Arial, sans-serif" font-size="20" font-weight="700">Effective escape area is the cut surface, not the total surface.</text>
  <text x="140" y="790" fill="#a7c7bd" font-family="'Source Sans 3', Arial, sans-serif" font-size="19">Changing the cut is usually cheaper than extending the cycle.</text>
</svg>
