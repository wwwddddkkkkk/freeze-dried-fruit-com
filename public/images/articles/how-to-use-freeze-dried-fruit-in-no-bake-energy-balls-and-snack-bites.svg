<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">How to use freeze-dried fruit in no-bake energy balls and snack bites</title>
  <desc id="desc">Three cross-sections of an energy ball showing freeze-dried fruit powdered through the mix, folded in as pieces, and pressed on as an outer coating, with notes on flavor and crunch for each.</desc>
  <rect width="1200" height="680" fill="#f6f4ee"/>
  <rect x="70" y="70" width="1060" height="540" rx="34" fill="#fffdf8" stroke="#d8d2c3" stroke-width="2"/>

  <text x="110" y="126" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="33" font-weight="700">Three ways to add the fruit</text>
  <text x="110" y="162" fill="#68736c" font-family="Inter, Arial, sans-serif" font-size="17">The form you choose decides flavor, color, and whether crunch survives.</text>

  <!-- Powdered -->
  <g transform="translate(150 250)">
    <circle cx="120" cy="120" r="96" fill="#e8b8bf" stroke="#c98a94" stroke-width="2"/>
    <text x="120" y="126" fill="#8a4550" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" text-anchor="middle">tinted</text>
    <text x="120" y="146" fill="#8a4550" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" text-anchor="middle">throughout</text>
    <text x="120" y="252" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="700" text-anchor="middle">Powdered in</text>
    <text x="120" y="278" fill="#5f6a63" font-family="Inter, Arial, sans-serif" font-size="14" text-anchor="middle">Even flavor + color</text>
    <text x="120" y="298" fill="#b45f42" font-family="Inter, Arial, sans-serif" font-size="14" text-anchor="middle">No crunch</text>
  </g>

  <!-- Folded pieces -->
  <g transform="translate(480 250)">
    <circle cx="120" cy="120" r="96" fill="#e7dcc4" stroke="#c9b78f" stroke-width="2"/>
    <g fill="#c0566a">
      <rect x="76" y="80" width="18" height="14" rx="3"/><rect x="150" y="98" width="16" height="16" rx="3"/>
      <rect x="100" y="140" width="15" height="15" rx="3"/><rect x="140" y="150" width="18" height="12" rx="3"/>
      <rect x="112" y="96" width="14" height="14" rx="3"/>
    </g>
    <text x="120" y="252" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="700" text-anchor="middle">Folded-in pieces</text>
    <text x="120" y="278" fill="#5f6a63" font-family="Inter, Arial, sans-serif" font-size="14" text-anchor="middle">Visible fruit bits</text>
    <text x="120" y="298" fill="#b45f42" font-family="Inter, Arial, sans-serif" font-size="14" text-anchor="middle">Crunch softens in a day</text>
  </g>

  <!-- Coated -->
  <g transform="translate(810 250)">
    <circle cx="120" cy="120" r="96" fill="#c0566a" stroke="#8a4550" stroke-width="2"/>
    <circle cx="120" cy="120" r="72" fill="#e7dcc4"/>
    <text x="120" y="126" fill="#8a7d5e" font-family="Inter, Arial, sans-serif" font-size="14" text-anchor="middle">crunchy shell</text>
    <text x="120" y="252" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="700" text-anchor="middle">Outer coating</text>
    <text x="120" y="278" fill="#5f6a63" font-family="Inter, Arial, sans-serif" font-size="14" text-anchor="middle">Striking look</text>
    <text x="120" y="298" fill="#3a5a34" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" text-anchor="middle">Crunch lasts longest</text>
  </g>

  <text x="110" y="588" fill="#68736c" font-family="Inter, Arial, sans-serif" font-size="15">Add fruit last so it does not oversoak or dry out the mix — and store the bites cold and airtight.</text>
</svg>
