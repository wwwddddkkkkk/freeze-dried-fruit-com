<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Best freeze-dried fruit for frozen yogurt bark</title>
  <desc id="desc">Application chart comparing freeze-dried fruit formats for frozen yogurt bark, including berry crumble, powder, small pieces, and oversized slices.</desc>
  <rect width="1600" height="900" fill="#f4efe6"/>
  <rect x="64" y="64" width="1472" height="772" rx="28" fill="#fffaf2" stroke="#ccbda1" stroke-width="2"/>
  <text x="110" y="136" fill="#3d3326" font-family="'Source Sans 3', Arial, sans-serif" font-size="24" letter-spacing="5">APPLICATIONS</text>
  <text x="110" y="188" fill="#3d3326" font-family="'DM Serif Display', Georgia, serif" font-size="46">Build the Bark Around Toppings That Break and Eat Cleanly</text>
  <text x="110" y="226" fill="#7a6a56" font-family="'Source Serif 4', Georgia, serif" font-size="24">The best freeze-dried fruit for frozen yogurt bark adds color and crunch without creating bulky, awkward shards.</text>

  <rect x="116" y="284" width="1368" height="394" rx="28" fill="#fcf6ea" stroke="#d3c4a6"/>

  <rect x="146" y="318" width="294" height="326" rx="22" fill="#fffdf8" stroke="#d3c4a6"/>
  <text x="178" y="362" fill="#3d3326" font-family="'DM Serif Display', Georgia, serif" font-size="30">Berry Crumble</text>
  <circle cx="216" cy="438" r="14" fill="#cb5d58"/>
  <circle cx="250" cy="420" r="16" fill="#cb5d58"/>
  <circle cx="286" cy="444" r="15" fill="#cb5d58"/>
  <circle cx="324" cy="426" r="14" fill="#cb5d58"/>
  <circle cx="354" cy="452" r="12" fill="#cb5d58"/>
  <text x="178" y="526" fill="#7a6a56" font-family="'Source Sans 3', Arial, sans-serif" font-size="20">best tart contrast</text>
  <text x="178" y="556" fill="#7a6a56" font-family="'Source Sans 3', Arial, sans-serif" font-size="20">spreads evenly on bark</text>
  <rect x="178" y="588" width="174" height="38" rx="12" fill="#efe3ca"/>
  <text x="202" y="614" fill="#3d3326" font-family="'Source Sans 3', Arial, sans-serif" font-size="18">strong choice</text>

  <rect x="470" y="318" width="294" height="326" rx="22" fill="#fffdf8" stroke="#d3c4a6"/>
  <text x="502" y="362" fill="#3d3326" font-family="'DM Serif Display', Georgia, serif" font-size="30">Powder</text>
  <path d="M540 468c34-48 74-72 122-72 48 0 92 24 132 72" fill="#e07a6a" opacity="0.32"/>
  <path d="M564 468c28-30 60-46 98-46 38 0 72 16 106 46" fill="#e07a6a" opacity="0.58"/>
  <text x="502" y="526" fill="#7a6a56" font-family="'Source Sans 3', Arial, sans-serif" font-size="20">best for color and swirl</text>
  <text x="502" y="556" fill="#7a6a56" font-family="'Source Sans 3', Arial, sans-serif" font-size="20">clean bites for kids</text>
  <rect x="502" y="588" width="174" height="38" rx="12" fill="#efe3ca"/>
  <text x="526" y="614" fill="#3d3326" font-family="'Source Sans 3', Arial, sans-serif" font-size="18">strong choice</text>

  <rect x="794" y="318" width="294" height="326" rx="22" fill="#fffdf8" stroke="#d3c4a6"/>
  <text x="826" y="362" fill="#3d3326" font-family="'DM Serif Display', Georgia, serif" font-size="30">Small Pieces</text>
  <circle cx="876" cy="442" r="24" fill="#88b8aa"/>
  <circle cx="938" cy="428" r="20" fill="#f3bf5b"/>
  <circle cx="994" cy="450" r="22" fill="#cb5d58"/>
  <text x="826" y="526" fill="#7a6a56" font-family="'Source Sans 3', Arial, sans-serif" font-size="20">best all-around balance</text>
  <text x="826" y="556" fill="#7a6a56" font-family="'Source Sans 3', Arial, sans-serif" font-size="20">easy to break and eat</text>
  <rect x="826" y="588" width="174" height="38" rx="12" fill="#dce9e4"/>
  <text x="850" y="614" fill="#17312f" font-family="'Source Sans 3', Arial, sans-serif" font-size="18">top choice</text>

  <rect x="1118" y="318" width="332" height="326" rx="22" fill="#17312f"/>
  <text x="1150" y="362" fill="#f7f0e4" font-family="'DM Serif Display', Georgia, serif" font-size="30">Oversized Pieces</text>
  <circle cx="1218" cy="446" r="34" fill="#e0b05f"/>
  <circle cx="1308" cy="432" r="38" fill="#cb5d58"/>
  <text x="1150" y="526" fill="#edf0ea" font-family="'Source Sans 3', Arial, sans-serif" font-size="20">dramatic, but bulky</text>
  <text x="1150" y="556" fill="#edf0ea" font-family="'Source Sans 3', Arial, sans-serif" font-size="20">can crack bark awkwardly</text>
  <rect x="1150" y="588" width="176" height="38" rx="12" fill="#e0b05f"/>
  <text x="1174" y="614" fill="#17312f" font-family="'Source Sans 3', Arial, sans-serif" font-size="18">use carefully</text>

  <rect x="116" y="720" width="1368" height="78" rx="18" fill="#efe4d0" stroke="#d3c4a6"/>
  <text x="154" y="766" fill="#3d3326" font-family="'Source Sans 3', Arial, sans-serif" font-size="22">Best pattern: one visible fruit format, one supporting crunch, and optional powder for color instead of piling on oversized showpiece pieces.</text>
</svg>
