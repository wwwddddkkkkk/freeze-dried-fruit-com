<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">Why freeze-dried fruit calories look high on the Nutrition Facts panel</title>
  <desc id="desc">Annotated Nutrition Facts comparison showing serving size, calories, added sugars, and concentrated fruit solids in freeze-dried fruit.</desc>
  <rect width="1200" height="680" fill="#f6f4ee"/>
  <rect x="74" y="72" width="1052" height="536" rx="34" fill="#fffdf8" stroke="#d8d2c3" stroke-width="2"/>
  <text x="112" y="128" fill="#1f332d" font-family="'Source Sans 3', Arial, sans-serif" font-size="33" font-weight="700">A small dry serving can carry a big-looking number</text>
  <text x="112" y="166" fill="#68736c" font-family="'Source Sans 3', Arial, sans-serif" font-size="17">The panel is reading concentrated fruit solids per serving, not the airy visual volume in your hand.</text>

  <g transform="translate(120 214)">
    <rect width="408" height="302" rx="26" fill="#fffdf8" stroke="#d8d2c3" stroke-width="2"/>
    <text x="30" y="42" fill="#1f332d" font-family="'Source Sans 3', Arial, sans-serif" font-size="21" font-weight="700">Nutrition Facts</text>
    <line x1="30" y1="56" x2="378" y2="56" stroke="#1f332d" stroke-width="3"/>
    <text x="30" y="92" fill="#55625c" font-family="'Source Sans 3', Arial, sans-serif" font-size="15">Serving size</text>
    <text x="250" y="92" fill="#1f332d" font-family="'Source Sans 3', Arial, sans-serif" font-size="15">28 g</text>
    <line x1="30" y1="104" x2="378" y2="104" stroke="#d8d2c3"/>
    <text x="30" y="144" fill="#1f332d" font-family="'Source Sans 3', Arial, sans-serif" font-size="19" font-weight="700">Calories</text>
    <text x="286" y="146" fill="#1f332d" font-family="'Source Sans 3', Arial, sans-serif" font-size="36" font-weight="700">120</text>
    <line x1="30" y1="164" x2="378" y2="164" stroke="#1f332d" stroke-width="2"/>
    <text x="30" y="210" fill="#55625c" font-family="'Source Sans 3', Arial, sans-serif" font-size="15">Total Sugars</text>
    <text x="290" y="210" fill="#1f332d" font-family="'Source Sans 3', Arial, sans-serif" font-size="15">20 g</text>
    <text x="30" y="246" fill="#7b4a3a" font-family="'Source Sans 3', Arial, sans-serif" font-size="15">Includes Added Sugars</text>
    <text x="290" y="246" fill="#7b4a3a" font-family="'Source Sans 3', Arial, sans-serif" font-size="15">0 g</text>
    <line x1="30" y1="262" x2="378" y2="262" stroke="#d8d2c3"/>
    <text x="30" y="302" fill="#55625c" font-family="'Source Sans 3', Arial, sans-serif" font-size="15">Servings per container</text>
    <text x="290" y="302" fill="#1f332d" font-family="'Source Sans 3', Arial, sans-serif" font-size="15">2</text>
  </g>

  <g transform="translate(566 214)">
    <rect width="520" height="302" rx="26" fill="#f7f3ea" stroke="#d8d2c3"/>
    <text x="28" y="42" fill="#1f332d" font-family="'Source Sans 3', Arial, sans-serif" font-size="21" font-weight="700">How to read it</text>
    <text x="28" y="88" fill="#495852" font-family="'Source Sans 3', Arial, sans-serif" font-size="16">1. Serving size sets the panel.</text>
    <text x="28" y="124" fill="#495852" font-family="'Source Sans 3', Arial, sans-serif" font-size="16">2. Water is gone, so fruit solids look concentrated.</text>
    <text x="28" y="160" fill="#495852" font-family="'Source Sans 3', Arial, sans-serif" font-size="16">3. One pouch may hold more than one serving.</text>
    <text x="28" y="196" fill="#495852" font-family="'Source Sans 3', Arial, sans-serif" font-size="16">4. Added Sugars still need a separate check.</text>

    <rect x="28" y="226" width="460" height="44" rx="16" fill="#cadccf"/>
    <text x="50" y="254" fill="#27453c" font-family="'Source Sans 3', Arial, sans-serif" font-size="16" font-weight="700">Concentrated does not automatically mean sweetened.</text>
  </g>

  <g transform="translate(112 536)">
    <rect width="976" height="34" rx="17" fill="#1f332d"/>
    <text x="28" y="23" fill="#fffdf8" font-family="'Source Sans 3', Arial, sans-serif" font-size="14" font-weight="700">Reading order: serving size first, then calories and sugars, then decide whether you are eating one serving or the whole pouch.</text>
  </g>
</svg>
