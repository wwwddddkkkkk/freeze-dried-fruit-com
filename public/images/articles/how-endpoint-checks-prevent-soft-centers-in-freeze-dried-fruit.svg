<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">How endpoint checks prevent soft centers in freeze-dried fruit</title>
  <desc id="desc">Technical endpoint-control diagram showing product temperature, chamber pressure, and tray cross-sections with dry outer layers and soft centers in freeze-dried fruit.</desc>
  <rect width="1600" height="900" fill="#f4efe6"/>
  <rect x="64" y="64" width="1472" height="772" rx="30" fill="#fcfaf5" stroke="#d4c7b1" stroke-width="2"/>
  <text x="112" y="138" fill="#24433d" font-family="'Source Sans 3', Arial, sans-serif" font-size="26" letter-spacing="5">TECHNOLOGY</text>
  <text x="112" y="194" fill="#172f2b" font-family="'DM Serif Display', Georgia, serif" font-size="52">Do Not End the Cycle on Looks Alone</text>
  <text x="112" y="236" fill="#5f716d" font-family="'Source Serif 4', Georgia, serif" font-size="24">Endpoint checks protect the lot from crisp surfaces hiding unfinished centers.</text>

  <rect x="106" y="286" width="702" height="456" rx="24" fill="#f3ece0" stroke="#294643" stroke-width="2"/>
  <text x="144" y="334" fill="#294643" font-family="'Source Sans 3', Arial, sans-serif" font-size="24" letter-spacing="4">ENDPOINT SIGNALS</text>

  <rect x="146" y="376" width="626" height="132" rx="18" fill="#fcfaf6" stroke="#c7bda8"/>
  <text x="176" y="416" fill="#4f625f" font-family="'Source Sans 3', Arial, sans-serif" font-size="20">product temperature</text>
  <text x="176" y="448" fill="#102725" font-family="'JetBrains Mono', monospace" font-size="22">stable rise into final stage</text>
  <text x="176" y="486" fill="#4f625f" font-family="'Source Sans 3', Arial, sans-serif" font-size="20">chamber signal</text>
  <text x="420" y="486" fill="#102725" font-family="'JetBrains Mono', monospace" font-size="22">sublimation no longer dominant</text>

  <rect x="146" y="540" width="626" height="166" rx="18" fill="#17312f"/>
  <text x="176" y="582" fill="#f7f0e4" font-family="'Source Sans 3', Arial, sans-serif" font-size="22" letter-spacing="3">WHY VISUAL CHECKS FAIL</text>
  <text x="176" y="622" fill="#edf0ea" font-family="'Source Sans 3', Arial, sans-serif" font-size="21">Surface looks crisp before the denser</text>
  <text x="176" y="652" fill="#edf0ea" font-family="'Source Sans 3', Arial, sans-serif" font-size="21">center of the load has fully cleared.</text>
  <text x="176" y="690" fill="#88b8aa" font-family="'Source Sans 3', Arial, sans-serif" font-size="21">Result: hidden softness, uneven crunch, repeatability drift.</text>

  <rect x="846" y="286" width="646" height="456" rx="24" fill="#17312f"/>
  <text x="884" y="334" fill="#f7f0e4" font-family="'Source Sans 3', Arial, sans-serif" font-size="24" letter-spacing="4">TRAY CROSS-SECTIONS</text>

  <rect x="888" y="386" width="248" height="280" rx="22" fill="#fcfaf6"/>
  <text x="940" y="426" fill="#17312f" font-family="'Source Sans 3', Arial, sans-serif" font-size="22">Unload too early</text>
  <rect x="944" y="470" width="136" height="128" rx="28" fill="#e7dcc6" stroke="#c7bda8" stroke-width="2"/>
  <rect x="970" y="496" width="84" height="76" rx="20" fill="#c77b62"/>
  <text x="914" y="640" fill="#5b5143" font-family="'Source Sans 3', Arial, sans-serif" font-size="19">dry shell</text>
  <text x="1008" y="640" fill="#8d4c3b" font-family="'Source Sans 3', Arial, sans-serif" font-size="19">soft center</text>

  <rect x="1242" y="386" width="206" height="280" rx="22" fill="#fcfaf6"/>
  <text x="1282" y="426" fill="#17312f" font-family="'Source Sans 3', Arial, sans-serif" font-size="22">Validated endpoint</text>
  <rect x="1296" y="470" width="98" height="128" rx="28" fill="#e7dcc6" stroke="#c7bda8" stroke-width="2"/>
  <rect x="1316" y="490" width="58" height="88" rx="18" fill="#88b8aa"/>
  <text x="1272" y="640" fill="#2d5049" font-family="'Source Sans 3', Arial, sans-serif" font-size="19">uniform dryness</text>

  <path d="M1164 526 C1196 526 1218 526 1236 526" stroke="#e0b05f" stroke-width="8" fill="none" stroke-linecap="round"/>
  <polygon points="1232,514 1254,526 1232,538" fill="#e0b05f"/>

  <rect x="888" y="700" width="560" height="30" rx="14" fill="#88b8aa"/>
  <text x="902" y="722" fill="#17312f" font-family="'Source Sans 3', Arial, sans-serif" font-size="18">Best practice: combine product, chamber, and release checks before ending the cycle.</text>

  <rect x="106" y="768" width="1386" height="44" rx="16" fill="#203836"/>
  <text x="146" y="797" fill="#fffdf8" font-family="'Source Sans 3', Arial, sans-serif" font-size="20" font-weight="700">Soft centers are often an endpoint problem that appears later as inconsistency, not as an obvious wet tray.</text>
</svg>
