<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">Private-label freeze-dried fruit launch checklist</title>
  <desc id="desc">A launch matrix showing the five areas brands should lock down before approving a private-label freeze-dried fruit launch.</desc>
  <rect width="1200" height="680" fill="#f6f4ee"/>
  <rect x="74" y="72" width="1052" height="536" rx="34" fill="#fffdf8" stroke="#d8d2c3" stroke-width="2"/>
  <text x="112" y="128" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="33" font-weight="700">Do not launch from a vague sample</text>
  <text x="112" y="166" fill="#68736c" font-family="Inter, Arial, sans-serif" font-size="17">A scalable private-label brief needs clear decisions on product, claims, packaging, channel, and lot approval.</text>

  <g transform="translate(112 214)">
    <rect width="976" height="302" rx="26" fill="#f7f3ea" stroke="#d8d2c3"/>
    <line x1="176" y1="0" x2="176" y2="302" stroke="#d8d2c3"/>
    <line x1="352" y1="0" x2="352" y2="302" stroke="#d8d2c3"/>
    <line x1="548" y1="0" x2="548" y2="302" stroke="#d8d2c3"/>
    <line x1="740" y1="0" x2="740" y2="302" stroke="#d8d2c3"/>
    <line x1="0" y1="80" x2="976" y2="80" stroke="#d8d2c3"/>
    <line x1="0" y1="154" x2="976" y2="154" stroke="#d8d2c3"/>
    <line x1="0" y1="228" x2="976" y2="228" stroke="#d8d2c3"/>

    <text x="26" y="46" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="700">Product brief</text>
    <text x="202" y="46" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="700">Quality spec</text>
    <text x="378" y="46" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="700">Claims + label</text>
    <text x="574" y="46" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="700">Packaging</text>
    <text x="766" y="46" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="700">Channel + approval</text>

    <text x="26" y="110" fill="#495852" font-family="Inter, Arial, sans-serif" font-size="15">fruit and cut style</text>
    <text x="202" y="110" fill="#495852" font-family="Inter, Arial, sans-serif" font-size="15">size and breakage</text>
    <text x="378" y="110" fill="#495852" font-family="Inter, Arial, sans-serif" font-size="15">100% fruit or not</text>
    <text x="574" y="110" fill="#495852" font-family="Inter, Arial, sans-serif" font-size="15">film and zipper choice</text>
    <text x="766" y="110" fill="#495852" font-family="Inter, Arial, sans-serif" font-size="15">retail vs e-commerce</text>

    <text x="26" y="184" fill="#495852" font-family="Inter, Arial, sans-serif" font-size="15">snack vs topping role</text>
    <text x="202" y="184" fill="#495852" font-family="Inter, Arial, sans-serif" font-size="15">moisture logic</text>
    <text x="378" y="184" fill="#495852" font-family="Inter, Arial, sans-serif" font-size="15">ingredient wording</text>
    <text x="574" y="184" fill="#495852" font-family="Inter, Arial, sans-serif" font-size="15">headspace and desiccant</text>
    <text x="766" y="184" fill="#495852" font-family="Inter, Arial, sans-serif" font-size="15">transit expectations</text>

    <text x="26" y="258" fill="#495852" font-family="Inter, Arial, sans-serif" font-size="15">single fruit or blend</text>
    <text x="202" y="258" fill="#495852" font-family="Inter, Arial, sans-serif" font-size="15">lot approval method</text>
    <text x="378" y="258" fill="#495852" font-family="Inter, Arial, sans-serif" font-size="15">claim proof discipline</text>
    <text x="574" y="258" fill="#495852" font-family="Inter, Arial, sans-serif" font-size="15">case and shipper design</text>
    <text x="766" y="258" fill="#495852" font-family="Inter, Arial, sans-serif" font-size="15">who owns exceptions</text>
  </g>

  <g transform="translate(112 534)">
    <rect width="976" height="34" rx="17" fill="#1f332d"/>
    <text x="26" y="23" fill="#fffdf8" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">Launch shortcut: if the brief cannot survive a written spec review, it is not ready for packaging artwork.</text>
  </g>
</svg>
