<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">How to read carrier and anti-caking ingredients in freeze-dried fruit</title>
  <desc id="desc">An annotated ingredient-panel diagram showing fruit, carrier ingredients, and anti-caking aids with callouts for function and comparison risk.</desc>
  <rect width="1200" height="680" fill="#f6f4ee"/>
  <rect x="74" y="72" width="1052" height="536" rx="34" fill="#fffdf8" stroke="#d8d2c3" stroke-width="2"/>
  <text x="112" y="128" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="700">Fruit-only and fruit-supported are different product definitions</text>
  <text x="112" y="166" fill="#68736c" font-family="Inter, Arial, sans-serif" font-size="17">Read the ingredient line to see whether the product is plain fruit, a carrier-supported powder, or a more fully formulated blend.</text>

  <g transform="translate(142 214)">
    <rect width="394" height="304" rx="28" fill="#fffdf8" stroke="#d8d2c3" stroke-width="2"/>
    <text x="28" y="44" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="700">Ingredient panel</text>
    <rect x="28" y="76" width="260" height="36" rx="18" fill="#cadccf"/>
    <text x="46" y="99" fill="#27453c" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">Freeze-dried passion fruit</text>
    <rect x="28" y="128" width="198" height="34" rx="17" fill="#ead8b7"/>
    <text x="46" y="150" fill="#6e5a2f" font-family="Inter, Arial, sans-serif" font-size="14">Maltodextrin</text>
    <rect x="28" y="178" width="180" height="34" rx="17" fill="#cfe1ee"/>
    <text x="46" y="200" fill="#34526a" font-family="Inter, Arial, sans-serif" font-size="14">Gum arabic</text>
    <rect x="28" y="228" width="166" height="34" rx="17" fill="#e7c0b5"/>
    <text x="46" y="250" fill="#713d2f" font-family="Inter, Arial, sans-serif" font-size="14">Silicon dioxide</text>
    <text x="28" y="286" fill="#4b5a54" font-family="Inter, Arial, sans-serif" font-size="14">Front panel may still lead with the fruit name.</text>
  </g>

  <g transform="translate(586 214)">
    <rect width="470" height="304" rx="28" fill="#f7f3ea" stroke="#d8d2c3"/>
    <text x="28" y="44" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="700">What the additions usually do</text>
    <text x="28" y="94" fill="#27453c" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">Carrier</text>
    <text x="142" y="94" fill="#4b5a54" font-family="Inter, Arial, sans-serif" font-size="15">supports drying or dilution of stickiness</text>
    <text x="28" y="138" fill="#34526a" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">Binder / gum</text>
    <text x="142" y="138" fill="#4b5a54" font-family="Inter, Arial, sans-serif" font-size="15">helps powder handling and dispersion</text>
    <text x="28" y="182" fill="#713d2f" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">Anti-caking aid</text>
    <text x="142" y="182" fill="#4b5a54" font-family="Inter, Arial, sans-serif" font-size="15">improves flow and reduces clumping</text>

    <line x1="28" y1="214" x2="442" y2="214" stroke="#d8d2c3"/>
    <text x="28" y="252" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">Reading rule</text>
    <text x="28" y="282" fill="#4b5a54" font-family="Inter, Arial, sans-serif" font-size="15">Compare fruit-only products with fruit-only peers.</text>
    <text x="28" y="306" fill="#4b5a54" font-family="Inter, Arial, sans-serif" font-size="15">Compare carrier-supported systems by the handling job they solve.</text>
  </g>

  <g transform="translate(112 536)">
    <rect width="976" height="34" rx="17" fill="#1f332d"/>
    <text x="28" y="23" fill="#fffdf8" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">Label shortcut: the ingredient line defines the product more honestly than the front-panel fruit story.</text>
  </g>
</svg>
