<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">How to make freeze-dried fruit smoothie packs for grab-and-go blending</title>
  <desc id="desc">Three-step diagram: build a shelf-stable pack with fruit and a body ingredient, seal and store it dry, then add liquid and ice at blend time to control texture.</desc>
  <rect width="1600" height="900" fill="#f4efe6"/>
  <rect x="64" y="64" width="1472" height="772" rx="30" fill="#fcfaf5" stroke="#d4c7b1" stroke-width="2"/>
  <text x="112" y="138" fill="#24433d" font-family="'Source Sans 3', Arial, sans-serif" font-size="26" letter-spacing="5">APPLICATIONS</text>
  <text x="112" y="192" fill="#172f2b" font-family="'DM Serif Display', Georgia, serif" font-size="46">Smoothie Packs That Skip the Freezer</text>
  <text x="112" y="232" fill="#5f716d" font-family="'Source Serif 4', Georgia, serif" font-size="23">The fruit is dry, so you add the water and the cold only at blend time.</text>

  <!-- Step 1 -->
  <rect x="104" y="290" width="432" height="420" rx="22" fill="#f1ebdf" stroke="#294643" stroke-width="2"/>
  <circle cx="152" cy="342" r="26" fill="#294643"/>
  <text x="152" y="351" fill="#fff" font-family="'DM Serif Display', Georgia, serif" font-size="28" text-anchor="middle">1</text>
  <text x="196" y="352" fill="#17312f" font-family="'DM Serif Display', Georgia, serif" font-size="30">Build the pack</text>
  <!-- pouch -->
  <rect x="196" y="392" width="248" height="256" rx="16" fill="#fcfaf6" stroke="#c7bda8"/>
  <rect x="248" y="384" width="144" height="24" rx="8" fill="#dfeae2" stroke="#c7bda8"/>
  <text x="222" y="452" fill="#4f625f" font-family="'Source Sans 3', Arial, sans-serif" font-size="19">Fruit &#8212; flavor</text>
  <rect x="222" y="466" width="196" height="20" rx="6" fill="#c9a24b"/>
  <text x="222" y="524" fill="#4f625f" font-family="'Source Sans 3', Arial, sans-serif" font-size="19">Body &#8212; banana / oats</text>
  <rect x="222" y="538" width="196" height="20" rx="6" fill="#8fae9c"/>
  <text x="222" y="596" fill="#4f625f" font-family="'Source Sans 3', Arial, sans-serif" font-size="19">Extras &#8212; seeds / cocoa</text>
  <rect x="222" y="610" width="196" height="20" rx="6" fill="#b98a6a"/>
  <text x="140" y="690" fill="#8d5c18" font-family="'Source Sans 3', Arial, sans-serif" font-size="18">Portion by dry weight for repeatable packs</text>

  <!-- Step 2 -->
  <rect x="584" y="290" width="432" height="420" rx="22" fill="#17312f"/>
  <circle cx="632" cy="342" r="26" fill="#a7c7bd"/>
  <text x="632" y="351" fill="#17312f" font-family="'DM Serif Display', Georgia, serif" font-size="28" text-anchor="middle">2</text>
  <text x="676" y="352" fill="#ffffff" font-family="'DM Serif Display', Georgia, serif" font-size="30">Seal &amp; store dry</text>
  <rect x="676" y="396" width="248" height="248" rx="16" fill="#24433d" stroke="#3c5b55"/>
  <text x="800" y="470" fill="#cfe0d8" font-family="'Source Sans 3', Arial, sans-serif" font-size="60" text-anchor="middle">&#10711;</text>
  <text x="800" y="520" fill="#eef4f0" font-family="'Source Sans 3', Arial, sans-serif" font-size="20" text-anchor="middle">Press out air</text>
  <text x="800" y="552" fill="#eef4f0" font-family="'Source Sans 3', Arial, sans-serif" font-size="20" text-anchor="middle">Cool, dark, dry</text>
  <text x="800" y="584" fill="#eef4f0" font-family="'Source Sans 3', Arial, sans-serif" font-size="20" text-anchor="middle">Pantry, not freezer</text>
  <text x="620" y="688" fill="#e0cdbe" font-family="'Source Sans 3', Arial, sans-serif" font-size="18">Once opened, blend soon &#8212; it re-absorbs humidity</text>

  <!-- Step 3 -->
  <rect x="1064" y="290" width="432" height="420" rx="22" fill="#f1ebdf" stroke="#294643" stroke-width="2"/>
  <circle cx="1112" cy="342" r="26" fill="#294643"/>
  <text x="1112" y="351" fill="#fff" font-family="'DM Serif Display', Georgia, serif" font-size="28" text-anchor="middle">3</text>
  <text x="1156" y="352" fill="#17312f" font-family="'DM Serif Display', Georgia, serif" font-size="30">Add &amp; blend</text>
  <!-- blender -->
  <path d="M1200 400 h160 l-18 210 h-124 z" fill="#fcfaf6" stroke="#294643" stroke-width="2"/>
  <rect x="1188" y="384" width="184" height="20" rx="6" fill="#294643"/>
  <rect x="1214" y="470" width="132" height="130" rx="4" fill="#c9a24b" opacity="0.65"/>
  <text x="1088" y="648" fill="#33534d" font-family="'Source Sans 3', Arial, sans-serif" font-size="19">Liquid = thickness &#8226; start low</text>
  <text x="1088" y="678" fill="#33534d" font-family="'Source Sans 3', Arial, sans-serif" font-size="19">Ice = chill + volume, not body</text>

  <rect x="104" y="748" width="1392" height="48" rx="18" fill="#203836"/>
  <text x="128" y="779" fill="#fffdf8" font-family="'Source Sans 3', Arial, sans-serif" font-size="20" font-weight="700">You control the final texture at the blender &#8212; not in the pack. Start with less liquid, add to loosen.</text>
</svg>
