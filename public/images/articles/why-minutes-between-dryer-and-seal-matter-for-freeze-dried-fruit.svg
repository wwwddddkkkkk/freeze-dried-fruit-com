<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Minutes between dryer and seal matter for freeze-dried fruit</title>
  <desc id="desc">Technical diagram showing product leaving a dryer, moving through transfer and filling, and gaining pre-seal risk as minutes exposed to air increase.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f6f1e7"/>
      <stop offset="100%" stop-color="#ebe2d1"/>
    </linearGradient>
    <linearGradient id="risk" x1="0" x2="1">
      <stop offset="0%" stop-color="#88b8aa"/>
      <stop offset="55%" stop-color="#e0b05f"/>
      <stop offset="100%" stop-color="#a95642"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect x="68" y="68" width="1464" height="764" rx="30" fill="#fcfaf5" stroke="#1f3a37" stroke-width="2.5"/>
  <text x="110" y="145" fill="#1f3a37" font-family="'Source Sans 3', Arial, sans-serif" font-size="26" letter-spacing="5">FREEZE-DRIED FRUIT TECHNOLOGY</text>
  <text x="110" y="198" fill="#102725" font-family="'DM Serif Display', Georgia, serif" font-size="54">Why Minutes Between Dryer and Seal Matter</text>
  <text x="110" y="236" fill="#4b5d5a" font-family="'Source Serif 4', Georgia, serif" font-size="25">Open-product dwell time is a quality variable, not just line choreography.</text>

  <rect x="108" y="300" width="310" height="190" rx="24" fill="#f3ede0" stroke="#254441" stroke-width="2"/>
  <text x="138" y="346" fill="#254441" font-family="'Source Sans 3', Arial, sans-serif" font-size="24" letter-spacing="3">STEP 1</text>
  <text x="138" y="392" fill="#122d2a" font-family="'DM Serif Display', Georgia, serif" font-size="38">Dryer Exit</text>
  <rect x="141" y="420" width="95" height="40" rx="8" fill="#1f3a37"/>
  <rect x="236" y="420" width="128" height="40" rx="8" fill="#708f88"/>
  <circle cx="188" cy="440" r="14" fill="#f7efe3"/>
  <circle cx="274" cy="440" r="10" fill="#f7efe3"/>
  <circle cx="305" cy="440" r="10" fill="#f7efe3"/>
  <circle cx="336" cy="440" r="10" fill="#f7efe3"/>
  <text x="138" y="525" fill="#4c5f5c" font-family="'Source Sans 3', Arial, sans-serif" font-size="24">Target endpoint set here.</text>

  <rect x="484" y="300" width="310" height="190" rx="24" fill="#f3ede0" stroke="#254441" stroke-width="2"/>
  <text x="514" y="346" fill="#254441" font-family="'Source Sans 3', Arial, sans-serif" font-size="24" letter-spacing="3">STEP 2</text>
  <text x="514" y="392" fill="#122d2a" font-family="'DM Serif Display', Georgia, serif" font-size="38">Transfer / Hold</text>
  <rect x="528" y="420" width="112" height="56" rx="10" fill="#cad7d2" stroke="#254441" stroke-width="2"/>
  <rect x="642" y="430" width="106" height="36" rx="8" fill="#e5d7b7" stroke="#254441" stroke-width="2"/>
  <circle cx="560" cy="448" r="9" fill="#a95642"/>
  <circle cx="587" cy="448" r="9" fill="#a95642"/>
  <circle cx="614" cy="448" r="9" fill="#a95642"/>
  <text x="514" y="525" fill="#4c5f5c" font-family="'Source Sans 3', Arial, sans-serif" font-size="24">Bins, hoppers, pauses, changeovers.</text>

  <rect x="860" y="300" width="310" height="190" rx="24" fill="#f3ede0" stroke="#254441" stroke-width="2"/>
  <text x="890" y="346" fill="#254441" font-family="'Source Sans 3', Arial, sans-serif" font-size="24" letter-spacing="3">STEP 3</text>
  <text x="890" y="392" fill="#122d2a" font-family="'DM Serif Display', Georgia, serif" font-size="38">Fill + Seal</text>
  <path d="M915 460 L960 420 L1005 460" fill="none" stroke="#254441" stroke-width="4"/>
  <path d="M995 460 L1040 420 L1085 460" fill="none" stroke="#254441" stroke-width="4"/>
  <rect x="922" y="460" width="156" height="26" rx="4" fill="#88b8aa"/>
  <text x="890" y="525" fill="#4c5f5c" font-family="'Source Sans 3', Arial, sans-serif" font-size="24">Barrier starts only after closure.</text>

  <path d="M419 394 H474" stroke="#254441" stroke-width="4" stroke-linecap="round"/>
  <path d="M795 394 H850" stroke="#254441" stroke-width="4" stroke-linecap="round"/>
  <polygon points="467,382 487,394 467,406" fill="#254441"/>
  <polygon points="843,382 863,394 843,406" fill="#254441"/>

  <text x="110" y="595" fill="#1f3a37" font-family="'Source Sans 3', Arial, sans-serif" font-size="24" letter-spacing="4">PRE-SEAL RISK RAMP</text>
  <rect x="110" y="625" width="1060" height="44" rx="22" fill="url(#risk)"/>
  <circle cx="220" cy="647" r="22" fill="#fcfaf5" stroke="#1f3a37" stroke-width="2"/>
  <circle cx="530" cy="647" r="22" fill="#fcfaf5" stroke="#1f3a37" stroke-width="2"/>
  <circle cx="855" cy="647" r="22" fill="#fcfaf5" stroke="#1f3a37" stroke-width="2"/>
  <circle cx="1100" cy="647" r="22" fill="#fcfaf5" stroke="#1f3a37" stroke-width="2"/>
  <text x="197" y="708" fill="#4c5f5c" font-family="'Source Sans 3', Arial, sans-serif" font-size="24">0-5 min</text>
  <text x="478" y="708" fill="#4c5f5c" font-family="'Source Sans 3', Arial, sans-serif" font-size="24">5-15 min</text>
  <text x="785" y="708" fill="#4c5f5c" font-family="'Source Sans 3', Arial, sans-serif" font-size="24">15-30 min</text>
  <text x="1041" y="708" fill="#4c5f5c" font-family="'Source Sans 3', Arial, sans-serif" font-size="24">30+ min</text>

  <rect x="1220" y="302" width="250" height="408" rx="24" fill="#18312f"/>
  <text x="1255" y="352" fill="#f8f2e7" font-family="'Source Sans 3', Arial, sans-serif" font-size="23" letter-spacing="3">BUYER CHECKS</text>
  <text x="1255" y="404" fill="#ffffff" font-family="'DM Serif Display', Georgia, serif" font-size="34">Ask For</text>
  <text x="1255" y="452" fill="#e7dfd2" font-family="'Source Sans 3', Arial, sans-serif" font-size="24">Normal dryer-to-seal time</text>
  <text x="1255" y="500" fill="#e7dfd2" font-family="'Source Sans 3', Arial, sans-serif" font-size="24">Covered vs open transfer</text>
  <text x="1255" y="548" fill="#e7dfd2" font-family="'Source Sans 3', Arial, sans-serif" font-size="24">Pause / hold rules</text>
  <text x="1255" y="596" fill="#e7dfd2" font-family="'Source Sans 3', Arial, sans-serif" font-size="24">Recheck triggers</text>
  <text x="1255" y="644" fill="#e7dfd2" font-family="'Source Sans 3', Arial, sans-serif" font-size="24">Powder handling logic</text>
</svg>
