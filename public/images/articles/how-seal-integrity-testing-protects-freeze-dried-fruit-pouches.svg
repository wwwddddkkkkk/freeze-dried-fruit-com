<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">How seal-integrity testing protects freeze-dried fruit pouches</title>
  <desc id="desc">A technical packaging diagram showing pouch seal zones, leak-test methods, and how weak seals expose freeze-dried fruit to humidity ingress.</desc>
  <rect width="1200" height="680" fill="#f6f4ee"/>
  <rect x="74" y="72" width="1052" height="536" rx="34" fill="#fffdf8" stroke="#d8d2c3" stroke-width="2"/>
  <text x="112" y="128" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="33" font-weight="700">A strong film still fails if the seal path is weak</text>
  <text x="112" y="166" fill="#68736c" font-family="Inter, Arial, sans-serif" font-size="17">Freeze-dried fruit packaging lives or dies at the actual closure, not only at the laminate spec.</text>

  <g transform="translate(118 214)">
    <rect width="420" height="304" rx="26" fill="#fffdf8" stroke="#d8d2c3" stroke-width="2"/>
    <text x="26" y="42" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Pouch risk map</text>
    <path d="M120 74h180l28 44v146l-24 42H120l-24-42V118z" fill="#eef4ef" stroke="#9db5a7" stroke-width="3"/>
    <rect x="136" y="90" width="156" height="24" rx="12" fill="#cadccf"/>
    <rect x="136" y="276" width="156" height="16" rx="8" fill="#cadccf"/>
    <rect x="126" y="122" width="10" height="138" rx="5" fill="#e7c0b5"/>
    <rect x="292" y="122" width="10" height="138" rx="5" fill="#e7c0b5"/>
    <circle cx="212" cy="188" r="40" fill="#ead8b7"/>
    <circle cx="182" cy="222" r="18" fill="#c7845f"/>
    <circle cx="222" cy="226" r="14" fill="#7a8fb7"/>
    <circle cx="250" cy="210" r="16" fill="#c45d7d"/>
    <text x="324" y="102" fill="#27453c" font-family="Inter, Arial, sans-serif" font-size="14">top seal</text>
    <text x="322" y="158" fill="#7a3f35" font-family="Inter, Arial, sans-serif" font-size="14">side seal</text>
    <text x="322" y="186" fill="#7a3f35" font-family="Inter, Arial, sans-serif" font-size="14">transition zone</text>
    <text x="324" y="286" fill="#27453c" font-family="Inter, Arial, sans-serif" font-size="14">bottom seal</text>
    <path d="M300 98h14" stroke="#27453c" stroke-width="2" stroke-linecap="round"/>
    <path d="M300 154h14" stroke="#7a3f35" stroke-width="2" stroke-linecap="round"/>
    <path d="M300 282h14" stroke="#27453c" stroke-width="2" stroke-linecap="round"/>
  </g>

  <g transform="translate(580 214)">
    <rect width="508" height="304" rx="26" fill="#f7f3ea" stroke="#d8d2c3"/>
    <text x="26" y="42" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Testing lanes</text>

    <rect x="26" y="76" width="456" height="52" rx="18" fill="#dce7f3"/>
    <text x="46" y="98" fill="#34526a" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">Seal strength</text>
    <text x="46" y="118" fill="#34526a" font-family="Inter, Arial, sans-serif" font-size="14">Checks whether the process is making consistent bonded seals.</text>

    <rect x="26" y="146" width="456" height="52" rx="18" fill="#ead8b7"/>
    <text x="46" y="168" fill="#6e5a2f" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">Dye-style leak check</text>
    <text x="46" y="188" fill="#6e5a2f" font-family="Inter, Arial, sans-serif" font-size="14">Looks for channels and leak paths that let moisture or gas move through.</text>

    <rect x="26" y="216" width="456" height="52" rx="18" fill="#e7c0b5"/>
    <text x="46" y="238" fill="#7a3f35" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">Gross-leak / bubble test</text>
    <text x="46" y="258" fill="#7a3f35" font-family="Inter, Arial, sans-serif" font-size="14">A fast reality check for obvious package-integrity failures.</text>
  </g>

  <g transform="translate(112 538)">
    <rect width="976" height="34" rx="17" fill="#1f332d"/>
    <text x="28" y="23" fill="#fffdf8" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">Practical rule: if the fruit is soft but the film spec looks good, investigate the seal path before blaming the laminate alone.</text>
  </g>
</svg>
