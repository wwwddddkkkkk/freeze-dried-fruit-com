<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">FDA food facility registration as a supplier approval gate</title>
  <desc id="desc">A flow diagram showing freeze-dried fruit supplier approval moving from facility identity to registration status, foreign-facility U.S. agent setup, and import verification.</desc>
  <rect width="1600" height="900" fill="#f4efe6"/>
  <rect x="64" y="64" width="1472" height="772" rx="28" fill="#fffaf2" stroke="#ccbda1" stroke-width="2"/>
  <text x="112" y="136" fill="#3c3226" font-family="Georgia, 'Times New Roman', serif" font-size="34">Registration Before Negotiation</text>
  <text x="112" y="176" fill="#786956" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20">Why FDA food facility registration is a first-pass supplier gate for U.S.-bound freeze-dried fruit</text>

  <rect x="110" y="236" width="1380" height="470" rx="26" fill="#fcf6ea" stroke="#d3c4a6"/>

  <rect x="148" y="306" width="240" height="180" rx="24" fill="#edf4ef" stroke="#c6d8ce"/>
  <text x="178" y="356" fill="#23433a" font-family="Georgia, 'Times New Roman', serif" font-size="28">1. Name the Facility</text>
  <text x="178" y="398" fill="#4e665c" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20">Processor, packer, or</text>
  <text x="178" y="428" fill="#4e665c" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20">repacker for the actual</text>
  <text x="178" y="458" fill="#4e665c" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20">U.S.-bound product</text>

  <rect x="456" y="306" width="240" height="180" rx="24" fill="#fffaf2" stroke="#d3c4a6"/>
  <text x="486" y="356" fill="#3c3226" font-family="Georgia, 'Times New Roman', serif" font-size="28">2. Confirm Status</text>
  <text x="486" y="398" fill="#6c5d49" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20">Is registration required?</text>
  <text x="486" y="428" fill="#6c5d49" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20">Is the setup current and</text>
  <text x="486" y="458" fill="#6c5d49" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20">internally consistent?</text>

  <rect x="764" y="306" width="240" height="180" rx="24" fill="#fffaf2" stroke="#d3c4a6"/>
  <text x="794" y="356" fill="#3c3226" font-family="Georgia, 'Times New Roman', serif" font-size="28">3. Map Import Chain</text>
  <text x="794" y="398" fill="#6c5d49" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20">Importer, U.S. agent,</text>
  <text x="794" y="428" fill="#6c5d49" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20">document owner, and</text>
  <text x="794" y="458" fill="#6c5d49" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20">shipment workflow</text>

  <rect x="1072" y="306" width="240" height="180" rx="24" fill="#f6d9cf" stroke="#d7a89c"/>
  <text x="1102" y="356" fill="#7a3c31" font-family="Georgia, 'Times New Roman', serif" font-size="28">4. Then Approve</text>
  <text x="1102" y="398" fill="#8d5a50" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20">Specs, samples, pricing,</text>
  <text x="1102" y="428" fill="#8d5a50" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20">packaging, and launch</text>
  <text x="1102" y="458" fill="#8d5a50" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20">only after the gate clears</text>

  <path d="M388 396H456" stroke="#c3b392" stroke-width="4" stroke-linecap="round"/>
  <path d="M696 396H764" stroke="#c3b392" stroke-width="4" stroke-linecap="round"/>
  <path d="M1004 396H1072" stroke="#c3b392" stroke-width="4" stroke-linecap="round"/>
  <path d="M440 396l16 -12v24z" fill="#c3b392"/>
  <path d="M748 396l16 -12v24z" fill="#c3b392"/>
  <path d="M1056 396l16 -12v24z" fill="#c3b392"/>

  <rect x="206" y="544" width="1188" height="118" rx="24" fill="#efe4d0" stroke="#d3c4a6"/>
  <text x="246" y="592" fill="#3c3226" font-family="Georgia, 'Times New Roman', serif" font-size="30">Buyer Read</text>
  <text x="246" y="628" fill="#6c5d49" font-family="'Helvetica Neue', Arial, sans-serif" font-size="22">Registration does not prove the supplier is excellent. Missing, vague, or mismatched registration answers do prove the approval process is not finished.</text>

  <rect x="118" y="754" width="1364" height="60" rx="18" fill="#1f332d"/>
  <text x="152" y="792" fill="#fffdf8" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="700">The practical question is not "Do you have a great sample?" but "Can you name the regulated facility behind it and explain how it reaches the U.S. market?"</text>
</svg>
