  <text x="892" y="326" fill="#1d2732" font-family="'Source Sans 3', Arial, sans-serif" font-size="24" letter-spacing="2">TEST LOGIC</text>
  <line x1="892" y1="344" x2="1470" y2="344" stroke="#d8cdbc" stroke-width="2"/>
