<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">How freeze concentration reshapes freeze-dried fruit</title>
  <desc id="desc">A diagram showing ice crystals growing during freezing and excluding sugars and acids into a shrinking pocket of concentrated unfrozen liquid, and how slow versus fast freezing change the concentrated phase.</desc>
  <rect width="1200" height="680" fill="#f6f4ee"/>
  <rect x="74" y="72" width="1052" height="536" rx="34" fill="#fffdf8" stroke="#d8d2c3" stroke-width="2"/>
  <text x="112" y="128" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="33" font-weight="700">Ice grows pure, so solutes crowd the liquid left behind</text>
  <text x="112" y="166" fill="#68736c" font-family="Inter, Arial, sans-serif" font-size="17">Freeze concentration sets up the material before drying ever begins.</text>

  <g transform="translate(112 214)">
    <rect width="470" height="272" rx="26" fill="#f7f3ea" stroke="#d8d2c3"/>
    <text x="28" y="40" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="700">Solute exclusion at the ice front</text>
    <circle cx="120" cy="150" r="52" fill="#dce7f3" stroke="#5d79c8" stroke-width="3"/>
    <circle cx="238" cy="120" r="44" fill="#dce7f3" stroke="#5d79c8" stroke-width="3"/>
    <circle cx="210" cy="210" r="40" fill="#dce7f3" stroke="#5d79c8" stroke-width="3"/>
    <text x="98" y="156" fill="#34526a" font-family="Inter, Arial, sans-serif" font-size="15">ice</text>
    <text x="220" y="126" fill="#34526a" font-family="Inter, Arial, sans-serif" font-size="15">ice</text>
    <path d="M300 120 q40 60 -8 120" fill="#e7c0b5" stroke="#a85a49" stroke-width="2" opacity="0.85"/>
    <circle cx="315" cy="150" r="4" fill="#7a3f35"/>
    <circle cx="305" cy="180" r="4" fill="#7a3f35"/>
    <circle cx="322" cy="205" r="4" fill="#7a3f35"/>
    <circle cx="300" cy="228" r="4" fill="#7a3f35"/>
    <text x="286" y="262" fill="#7a3f35" font-family="Inter, Arial, sans-serif" font-size="14">concentrated pocket</text>
    <text x="60" y="262" fill="#495852" font-family="Inter, Arial, sans-serif" font-size="14">sugars + acids pushed out</text>
  </g>

  <g transform="translate(614 214)">
    <rect width="474" height="272" rx="26" fill="#fffdf8" stroke="#d8d2c3"/>
    <text x="28" y="40" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="700">Freezing rate changes the phase</text>

    <text x="28" y="80" fill="#495852" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">Slow freeze</text>
    <rect x="28" y="92" width="180" height="70" rx="14" fill="#f7f3ea" stroke="#d8d2c3"/>
    <circle cx="78" cy="127" r="26" fill="#dce7f3" stroke="#5d79c8" stroke-width="2"/>
    <circle cx="150" cy="127" r="24" fill="#dce7f3" stroke="#5d79c8" stroke-width="2"/>
    <path d="M110 108 q14 19 0 38" stroke="#a85a49" stroke-width="6" fill="none"/>
    <text x="28" y="182" fill="#7a3f35" font-family="Inter, Arial, sans-serif" font-size="13">few big crystals, heavy pockets</text>

    <text x="256" y="80" fill="#495852" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">Fast freeze</text>
    <rect x="256" y="92" width="180" height="70" rx="14" fill="#f7f3ea" stroke="#d8d2c3"/>
    <circle cx="286" cy="115" r="11" fill="#dce7f3" stroke="#5d79c8" stroke-width="2"/>
    <circle cx="320" cy="130" r="11" fill="#dce7f3" stroke="#5d79c8" stroke-width="2"/>
    <circle cx="356" cy="112" r="11" fill="#dce7f3" stroke="#5d79c8" stroke-width="2"/>
    <circle cx="392" cy="134" r="11" fill="#dce7f3" stroke="#5d79c8" stroke-width="2"/>
    <circle cx="300" cy="148" r="11" fill="#dce7f3" stroke="#5d79c8" stroke-width="2"/>
    <circle cx="372" cy="148" r="11" fill="#dce7f3" stroke="#5d79c8" stroke-width="2"/>
    <text x="256" y="182" fill="#27453c" font-family="Inter, Arial, sans-serif" font-size="13">many small crystals, thin films</text>

    <rect x="28" y="200" width="408" height="52" rx="14" fill="#cadccf"/>
    <text x="48" y="223" fill="#27453c" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">More concentrated phase = lower collapse limit,</text>
    <text x="48" y="243" fill="#27453c" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">more stickiness, tighter drying window.</text>
  </g>

  <g transform="translate(112 520)">
    <rect width="976" height="48" rx="24" fill="#1f332d"/>
    <text x="28" y="30" fill="#fffdf8" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">Buyer note: texture and stickiness complaints often trace back to how the fruit was frozen, not just how it was dried.</text>
  </g>
</svg>
