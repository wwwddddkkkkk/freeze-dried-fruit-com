<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">How to use freeze-dried fruit in quick sauces, compotes, and dessert drizzles</title>
  <desc id="desc">Dessert-sauce illustration showing freeze-dried fruit powder, crumble, and pieces used for a drizzle, compote, and plated dessert sauce.</desc>
  <rect width="1600" height="900" fill="#f4efe6"/>
  <rect x="64" y="64" width="1472" height="772" rx="28" fill="#fffaf2" stroke="#ccbda1" stroke-width="2"/>
  <text x="110" y="136" fill="#3d3326" font-family="'DM Serif Display', Georgia, serif" font-size="40">Quick Fruit Sauce Logic</text>
  <text x="110" y="178" fill="#7a6a56" font-family="'Source Sans 3', Arial, sans-serif" font-size="22">Using freeze-dried fruit in compotes, drizzles, and dessert sauces</text>

  <rect x="120" y="236" width="442" height="484" rx="28" fill="#fcf6ea" stroke="#d3c4a6"/>
  <text x="162" y="290" fill="#3d3326" font-family="'Source Sans 3', Arial, sans-serif" font-size="24" letter-spacing="3">FORMATS</text>

  <rect x="160" y="340" width="362" height="92" rx="22" fill="#ffffff" stroke="#d3c4a6"/>
  <text x="194" y="392" fill="#3d3326" font-family="'DM Serif Display', Georgia, serif" font-size="30">Powder</text>
  <text x="340" y="392" fill="#7a6a56" font-family="'Source Sans 3', Arial, sans-serif" font-size="20">best for smooth drizzle</text>

  <rect x="160" y="466" width="362" height="92" rx="22" fill="#ffffff" stroke="#d3c4a6"/>
  <text x="194" y="518" fill="#3d3326" font-family="'DM Serif Display', Georgia, serif" font-size="30">Crumble</text>
  <text x="340" y="518" fill="#7a6a56" font-family="'Source Sans 3', Arial, sans-serif" font-size="20">best for spoonable compote</text>

  <rect x="160" y="592" width="362" height="92" rx="22" fill="#ffffff" stroke="#d3c4a6"/>
  <text x="194" y="644" fill="#3d3326" font-family="'DM Serif Display', Georgia, serif" font-size="30">Small pieces</text>
  <text x="340" y="644" fill="#7a6a56" font-family="'Source Sans 3', Arial, sans-serif" font-size="20">best for chunkier finish</text>

  <rect x="614" y="236" width="866" height="484" rx="28" fill="#fcf6ea" stroke="#d3c4a6"/>
  <text x="656" y="290" fill="#3d3326" font-family="'Source Sans 3', Arial, sans-serif" font-size="24" letter-spacing="3">SAUCE JOBS</text>

  <rect x="664" y="338" width="232" height="320" rx="26" fill="#ffffff" stroke="#d3c4a6"/>
  <text x="724" y="386" fill="#3d3326" font-family="'DM Serif Display', Georgia, serif" font-size="30">Drizzle</text>
  <path d="M722 438 C762 438 786 458 786 486 C786 528 730 528 730 568" fill="none" stroke="#cb5d58" stroke-width="12" stroke-linecap="round"/>
  <text x="706" y="622" fill="#7a6a56" font-family="'Source Sans 3', Arial, sans-serif" font-size="20">smooth pour</text>
  <text x="706" y="648" fill="#7a6a56" font-family="'Source Sans 3', Arial, sans-serif" font-size="20">powder first</text>

  <rect x="930" y="338" width="232" height="320" rx="26" fill="#ffffff" stroke="#d3c4a6"/>
  <text x="986" y="386" fill="#3d3326" font-family="'DM Serif Display', Georgia, serif" font-size="30">Compote</text>
  <ellipse cx="1046" cy="500" rx="74" ry="42" fill="#f4d9dc" stroke="#cb5d58" stroke-width="3"/>
  <circle cx="1012" cy="492" r="10" fill="#cb5d58"/>
  <circle cx="1048" cy="516" r="8" fill="#cb5d58"/>
  <circle cx="1080" cy="492" r="9" fill="#cb5d58"/>
  <text x="980" y="622" fill="#7a6a56" font-family="'Source Sans 3', Arial, sans-serif" font-size="20">body + fruit bits</text>
  <text x="980" y="648" fill="#7a6a56" font-family="'Source Sans 3', Arial, sans-serif" font-size="20">crumble works best</text>

  <rect x="1196" y="338" width="232" height="320" rx="26" fill="#ffffff" stroke="#d3c4a6"/>
  <text x="1236" y="386" fill="#3d3326" font-family="'DM Serif Display', Georgia, serif" font-size="30">Plate sauce</text>
  <ellipse cx="1312" cy="522" rx="82" ry="34" fill="#f8e7ed"/>
  <circle cx="1270" cy="514" r="8" fill="#cb5d58"/>
  <circle cx="1308" cy="528" r="7" fill="#cb5d58"/>
  <circle cx="1350" cy="516" r="8" fill="#cb5d58"/>
  <text x="1238" y="622" fill="#7a6a56" font-family="'Source Sans 3', Arial, sans-serif" font-size="20">finish with acid</text>
  <text x="1238" y="648" fill="#7a6a56" font-family="'Source Sans 3', Arial, sans-serif" font-size="20">and taste at the end</text>

  <rect x="120" y="748" width="1360" height="66" rx="18" fill="#efe4d0" stroke="#d3c4a6"/>
  <text x="160" y="790" fill="#3d3326" font-family="'Source Sans 3', Arial, sans-serif" font-size="22">Hydrate before heavy sugar: freeze-dried fruit blooms best in a water-based phase first, then sweetening can be adjusted after the flavor opens.</text>
</svg>
