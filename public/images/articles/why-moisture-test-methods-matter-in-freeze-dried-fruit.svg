<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">Why moisture test methods matter in freeze-dried fruit</title>
  <desc id="desc">A technical workflow diagram showing freeze-dried fruit subsampling, moisture test method selection, and how buyers should read the final report.</desc>
  <rect width="1200" height="680" fill="#f6f4ee"/>
  <rect x="74" y="72" width="1052" height="536" rx="34" fill="#fffdf8" stroke="#d8d2c3" stroke-width="2"/>
  <text x="112" y="128" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="33" font-weight="700">A moisture number means less without the method behind it</text>
  <text x="112" y="166" fill="#68736c" font-family="Inter, Arial, sans-serif" font-size="17">Freeze-dried fruit specs get stronger when the sample plan, analytical method, and reporting rule are all defined.</text>

  <g transform="translate(120 214)">
    <rect width="296" height="306" rx="26" fill="#fffdf8" stroke="#d8d2c3" stroke-width="2"/>
    <text x="24" y="42" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">1. Build the sample</text>
    <rect x="24" y="76" width="248" height="58" rx="18" fill="#dce7f3"/>
    <text x="42" y="102" fill="#34526a" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">five subsamples</text>
    <text x="42" y="122" fill="#34526a" font-family="Inter, Arial, sans-serif" font-size="14">Composite beats one convenient pouch.</text>
    <rect x="24" y="152" width="248" height="58" rx="18" fill="#ead8b7"/>
    <text x="42" y="178" fill="#6e5a2f" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">piece mix matters</text>
    <text x="42" y="198" fill="#6e5a2f" font-family="Inter, Arial, sans-serif" font-size="14">Whole pieces and fines do not behave the same.</text>
    <rect x="24" y="228" width="248" height="54" rx="18" fill="#e7c0b5"/>
    <text x="42" y="252" fill="#7a3f35" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">protect from room air</text>
    <text x="42" y="272" fill="#7a3f35" font-family="Inter, Arial, sans-serif" font-size="14">Hygroscopic fruit can drift during handling.</text>
  </g>

  <g transform="translate(454 214)">
    <rect width="292" height="306" rx="26" fill="#f7f3ea" stroke="#d8d2c3"/>
    <text x="24" y="42" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">2. Name the method</text>
    <rect x="24" y="86" width="244" height="78" rx="22" fill="#eef4ef" stroke="#9db5a7" stroke-width="2"/>
    <text x="42" y="120" fill="#27453c" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">AOAC 934.06</text>
    <text x="42" y="144" fill="#27453c" font-family="Inter, Arial, sans-serif" font-size="14">A named reference method is easier to compare than a vague in-house check.</text>
    <line x1="24" y1="196" x2="268" y2="196" stroke="#d8d2c3"/>
    <text x="24" y="228" fill="#4b5a54" font-family="Inter, Arial, sans-serif" font-size="15">Ask whether the supplier uses:</text>
    <text x="24" y="256" fill="#4b5a54" font-family="Inter, Arial, sans-serif" font-size="15">official method</text>
    <text x="24" y="282" fill="#4b5a54" font-family="Inter, Arial, sans-serif" font-size="15">validated internal method</text>
    <text x="24" y="308" fill="#4b5a54" font-family="Inter, Arial, sans-serif" font-size="15">or quick operational screen</text>
  </g>

  <g transform="translate(784 214)">
    <rect width="296" height="306" rx="26" fill="#fffdf8" stroke="#d8d2c3" stroke-width="2"/>
    <text x="24" y="42" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">3. Read the result</text>
    <rect x="24" y="82" width="248" height="54" rx="18" fill="#1f332d"/>
    <text x="44" y="116" fill="#fffdf8" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">2.0% is not the whole story</text>
    <text x="24" y="178" fill="#4b5a54" font-family="Inter, Arial, sans-serif" font-size="15">Check rounding, test basis, and lot identity.</text>
    <text x="24" y="208" fill="#4b5a54" font-family="Inter, Arial, sans-serif" font-size="15">Then pair the result with water activity.</text>
    <rect x="24" y="234" width="248" height="44" rx="16" fill="#dce7f3"/>
    <text x="44" y="261" fill="#34526a" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">Moisture content != water activity</text>
  </g>

  <g transform="translate(112 538)">
    <rect width="976" height="34" rx="17" fill="#1f332d"/>
    <text x="28" y="23" fill="#fffdf8" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">Best practice: compare moisture results only when the sample plan and analytical method travel with the number.</text>
  </g>
</svg>
