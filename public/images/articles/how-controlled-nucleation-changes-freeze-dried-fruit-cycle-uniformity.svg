<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">How controlled nucleation changes freeze-dried fruit cycle uniformity</title>
  <desc id="desc">Technical comparison showing random versus controlled ice nucleation, resulting pore structure, and endpoint spread in freeze-dried fruit.</desc>
  <rect width="1600" height="900" fill="#f4efe5"/>
  <rect x="64" y="56" width="1472" height="788" rx="30" fill="#fcfaf6" stroke="#cfc4b2" stroke-width="2"/>

  <text x="112" y="126" fill="#23413c" font-family="'Source Sans 3', Arial, sans-serif" font-size="24" letter-spacing="5">TECHNOLOGY</text>
  <text x="112" y="188" fill="#122a27" font-family="'DM Serif Display', Georgia, serif" font-size="52">Freezing uniformity changes the rest of the cycle.</text>
  <text x="112" y="228" fill="#61756f" font-family="'Source Serif 4', Georgia, serif" font-size="24">Nucleation timing shapes pore structure, drying resistance, and endpoint spread.</text>

  <rect x="108" y="280" width="646" height="472" rx="26" fill="#f2ece1" stroke="#294643" stroke-width="2"/>
  <rect x="846" y="280" width="646" height="472" rx="26" fill="#17312f"/>

  <text x="144" y="330" fill="#294643" font-family="'Source Sans 3', Arial, sans-serif" font-size="23" letter-spacing="3">RANDOM NUCLEATION</text>
  <text x="882" y="330" fill="#f7f0e4" font-family="'Source Sans 3', Arial, sans-serif" font-size="23" letter-spacing="3">TIGHTER NUCLEATION CONTROL</text>

  <rect x="144" y="368" width="268" height="160" rx="22" fill="#fffdf8" stroke="#d2c6b4"/>
  <rect x="450" y="368" width="252" height="160" rx="22" fill="#fffdf8" stroke="#d2c6b4"/>
  <rect x="882" y="368" width="268" height="160" rx="22" fill="#fcfaf6" stroke="#8ab6aa"/>
  <rect x="1188" y="368" width="252" height="160" rx="22" fill="#fcfaf6" stroke="#8ab6aa"/>

  <text x="176" y="408" fill="#294643" font-family="'Source Sans 3', Arial, sans-serif" font-size="20">freeze start spread</text>
  <circle cx="202" cy="456" r="16" fill="#d78363"/>
  <circle cx="254" cy="432" r="16" fill="#8ab6aa"/>
  <circle cx="308" cy="468" r="16" fill="#d7b36f"/>
  <circle cx="360" cy="442" r="16" fill="#c35653"/>
  <text x="176" y="500" fill="#6d7a76" font-family="'Source Sans 3', Arial, sans-serif" font-size="18">different trays start icing at different points</text>

  <text x="480" y="408" fill="#294643" font-family="'Source Sans 3', Arial, sans-serif" font-size="20">later pore network</text>
  <path d="M492 446 C522 416 548 480 578 446 C604 418 636 482 668 448" fill="none" stroke="#c35653" stroke-width="8" stroke-linecap="round"/>
  <path d="M492 490 C522 466 548 514 578 488 C608 460 636 520 668 490" fill="none" stroke="#8ab6aa" stroke-width="8" stroke-linecap="round"/>
  <text x="480" y="522" fill="#6d7a76" font-family="'Source Sans 3', Arial, sans-serif" font-size="18">mixed vapor paths, wider drying resistance</text>

  <text x="914" y="408" fill="#21403c" font-family="'Source Sans 3', Arial, sans-serif" font-size="20">freeze start spread</text>
  <circle cx="940" cy="448" r="16" fill="#8ab6aa"/>
  <circle cx="992" cy="448" r="16" fill="#8ab6aa"/>
  <circle cx="1044" cy="448" r="16" fill="#8ab6aa"/>
  <circle cx="1096" cy="448" r="16" fill="#8ab6aa"/>
  <text x="914" y="500" fill="#d5e3dd" font-family="'Source Sans 3', Arial, sans-serif" font-size="18">narrower freezing window across the load</text>

  <text x="1218" y="408" fill="#21403c" font-family="'Source Sans 3', Arial, sans-serif" font-size="20">later pore network</text>
  <path d="M1232 446 C1260 424 1288 468 1316 446 C1344 424 1372 468 1400 446" fill="none" stroke="#e8b362" stroke-width="8" stroke-linecap="round"/>
  <path d="M1232 488 C1260 466 1288 510 1316 488 C1344 466 1372 510 1400 488" fill="none" stroke="#8ab6aa" stroke-width="8" stroke-linecap="round"/>
  <text x="1218" y="522" fill="#d5e3dd" font-family="'Source Sans 3', Arial, sans-serif" font-size="18">cleaner vapor paths, tighter process spread</text>

  <rect x="144" y="568" width="558" height="146" rx="22" fill="#fffdf8" stroke="#d2c6b4"/>
  <text x="176" y="608" fill="#294643" font-family="'Source Sans 3', Arial, sans-serif" font-size="22" letter-spacing="2">WHAT SHOWS UP LATER</text>
  <text x="176" y="650" fill="#50635f" font-family="'Source Sans 3', Arial, sans-serif" font-size="20">wider endpoint spread</text>
  <text x="176" y="682" fill="#50635f" font-family="'Source Sans 3', Arial, sans-serif" font-size="20">more tray-to-tray guesswork</text>
  <text x="432" y="650" fill="#50635f" font-family="'Source Sans 3', Arial, sans-serif" font-size="20">harder recipe tuning</text>
  <text x="432" y="682" fill="#50635f" font-family="'Source Sans 3', Arial, sans-serif" font-size="20">bigger slow-zone penalty</text>

  <rect x="882" y="568" width="558" height="146" rx="22" fill="#fcfaf6" stroke="#8ab6aa"/>
  <text x="914" y="608" fill="#f7f0e4" font-family="'Source Sans 3', Arial, sans-serif" font-size="22" letter-spacing="2">PRACTICAL PAYOFF</text>
  <text x="914" y="650" fill="#dbe7e2" font-family="'Source Sans 3', Arial, sans-serif" font-size="20">tighter drying spread</text>
  <text x="914" y="682" fill="#dbe7e2" font-family="'Source Sans 3', Arial, sans-serif" font-size="20">cleaner endpoint interpretation</text>
  <text x="1188" y="650" fill="#dbe7e2" font-family="'Source Sans 3', Arial, sans-serif" font-size="20">more repeatable texture</text>
  <text x="1188" y="682" fill="#dbe7e2" font-family="'Source Sans 3', Arial, sans-serif" font-size="20">less hidden freezing noise</text>

  <rect x="108" y="784" width="1384" height="38" rx="14" fill="#203836"/>
  <text x="144" y="809" fill="#fffdf8" font-family="'Source Sans 3', Arial, sans-serif" font-size="19" font-weight="700">Useful rule: a smoother freezing stage often makes the drying stage easier to believe.</text>
</svg>
