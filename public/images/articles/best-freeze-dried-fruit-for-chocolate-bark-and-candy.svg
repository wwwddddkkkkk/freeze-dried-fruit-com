<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">Best freeze-dried fruit for chocolate bark and candy</title>
  <desc id="desc">Application matrix comparing freeze-dried strawberry, raspberry, blueberry, and cherry for dark, milk, and white chocolate bark and candy.</desc>
  <rect width="1200" height="680" fill="#f6f4ee"/>
  <rect x="74" y="72" width="1052" height="536" rx="34" fill="#fffdf8" stroke="#d8d2c3" stroke-width="2"/>
  <text x="112" y="128" fill="#1f332d" font-family="'Source Sans 3', Arial, sans-serif" font-size="33" font-weight="700">Chocolate bark needs fruit with contrast and crunch</text>
  <text x="112" y="166" fill="#68736c" font-family="'Source Sans 3', Arial, sans-serif" font-size="17">The best fruits stand up to sweetness without bringing the moisture problems fresh fruit would.</text>

  <g transform="translate(112 214)">
    <rect width="976" height="302" rx="26" fill="#f7f3ea" stroke="#d8d2c3"/>
    <line x1="188" y1="0" x2="188" y2="302" stroke="#d8d2c3"/>
    <line x1="404" y1="0" x2="404" y2="302" stroke="#d8d2c3"/>
    <line x1="610" y1="0" x2="610" y2="302" stroke="#d8d2c3"/>
    <line x1="808" y1="0" x2="808" y2="302" stroke="#d8d2c3"/>
    <line x1="0" y1="76" x2="976" y2="76" stroke="#d8d2c3"/>
    <line x1="0" y1="150" x2="976" y2="150" stroke="#d8d2c3"/>
    <line x1="0" y1="226" x2="976" y2="226" stroke="#d8d2c3"/>

    <text x="28" y="46" fill="#1f332d" font-family="'Source Sans 3', Arial, sans-serif" font-size="19" font-weight="700">Fruit</text>
    <text x="214" y="46" fill="#1f332d" font-family="'Source Sans 3', Arial, sans-serif" font-size="19" font-weight="700">Best chocolate</text>
    <text x="430" y="46" fill="#1f332d" font-family="'Source Sans 3', Arial, sans-serif" font-size="19" font-weight="700">Why it works</text>
    <text x="636" y="46" fill="#1f332d" font-family="'Source Sans 3', Arial, sans-serif" font-size="19" font-weight="700">Format tip</text>
    <text x="834" y="46" fill="#1f332d" font-family="'Source Sans 3', Arial, sans-serif" font-size="19" font-weight="700">Role</text>

    <text x="28" y="118" fill="#4a5953" font-family="'Source Sans 3', Arial, sans-serif" font-size="16" font-weight="700">Strawberry</text>
    <text x="214" y="118" fill="#4a5953" font-family="'Source Sans 3', Arial, sans-serif" font-size="15">dark, milk, white</text>
    <text x="430" y="118" fill="#4a5953" font-family="'Source Sans 3', Arial, sans-serif" font-size="15">bright, familiar, visible</text>
    <text x="636" y="118" fill="#4a5953" font-family="'Source Sans 3', Arial, sans-serif" font-size="15">medium broken pieces</text>
    <rect x="834" y="94" width="110" height="28" rx="14" fill="#cadccf"/>
    <text x="856" y="113" fill="#1f332d" font-family="'Source Sans 3', Arial, sans-serif" font-size="13">headline</text>

    <text x="28" y="192" fill="#4a5953" font-family="'Source Sans 3', Arial, sans-serif" font-size="16" font-weight="700">Raspberry</text>
    <text x="214" y="192" fill="#4a5953" font-family="'Source Sans 3', Arial, sans-serif" font-size="15">white, milk, dark</text>
    <text x="430" y="192" fill="#4a5953" font-family="'Source Sans 3', Arial, sans-serif" font-size="15">sharp tart contrast</text>
    <text x="636" y="192" fill="#4a5953" font-family="'Source Sans 3', Arial, sans-serif" font-size="15">use crumble, not giant pieces</text>
    <rect x="834" y="168" width="110" height="28" rx="14" fill="#cadccf"/>
    <text x="864" y="187" fill="#1f332d" font-family="'Source Sans 3', Arial, sans-serif" font-size="13">accent</text>

    <text x="28" y="268" fill="#4a5953" font-family="'Source Sans 3', Arial, sans-serif" font-size="16" font-weight="700">Blueberry</text>
    <text x="214" y="268" fill="#4a5953" font-family="'Source Sans 3', Arial, sans-serif" font-size="15">dark chocolate</text>
    <text x="430" y="268" fill="#4a5953" font-family="'Source Sans 3', Arial, sans-serif" font-size="15">deeper fruit note</text>
    <text x="636" y="268" fill="#4a5953" font-family="'Source Sans 3', Arial, sans-serif" font-size="15">smaller pieces distribute well</text>
    <rect x="834" y="244" width="110" height="28" rx="14" fill="#cadccf"/>
    <text x="858" y="263" fill="#1f332d" font-family="'Source Sans 3', Arial, sans-serif" font-size="13">support</text>
  </g>

  <g transform="translate(112 536)">
    <rect width="976" height="34" rx="17" fill="#1f332d"/>
    <text x="28" y="23" fill="#fffdf8" font-family="'Source Sans 3', Arial, sans-serif" font-size="14" font-weight="700">No suitable unused local photo was available, so this Applications cover is a custom editorial SVG.</text>
  </g>
</svg>
