<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">How to structure a freeze-dried fruit RFQ for comparable supplier quotes</title>
  <desc id="desc">Three divergent supplier quotes pass through a standardized RFQ specification and emerge on one comparable landed-cost basis.</desc>
  <rect width="1200" height="680" fill="#f6f4ee"/>
  <rect x="70" y="70" width="1060" height="540" rx="34" fill="#fffdf8" stroke="#d8d2c3" stroke-width="2"/>

  <text x="110" y="126" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="33" font-weight="700">One spec turns scattered quotes into a fair comparison</text>
  <text x="110" y="162" fill="#68736c" font-family="Inter, Arial, sans-serif" font-size="17">A tight RFQ removes the variables that make prices diverge.</text>

  <!-- left: divergent quotes -->
  <g transform="translate(112 222)" font-family="Inter, Arial, sans-serif">
    <text x="0" y="0" fill="#5f6a63" font-size="14">Loose request →</text>
    <g>
      <rect x="0" y="20" width="150" height="48" rx="10" fill="#f4f0e5" stroke="#d8d2c3"/>
      <text x="16" y="42" fill="#1f332d" font-size="14" font-weight="700">Supplier A</text>
      <text x="16" y="60" fill="#b45f42" font-size="13">whole, tight aw</text>
    </g>
    <g>
      <rect x="0" y="88" width="150" height="48" rx="10" fill="#f4f0e5" stroke="#d8d2c3"/>
      <text x="16" y="110" fill="#1f332d" font-size="14" font-weight="700">Supplier B</text>
      <text x="16" y="128" fill="#b45f42" font-size="13">broken, bulk</text>
    </g>
    <g>
      <rect x="0" y="156" width="150" height="48" rx="10" fill="#f4f0e5" stroke="#d8d2c3"/>
      <text x="16" y="178" fill="#1f332d" font-size="14" font-weight="700">Supplier C</text>
      <text x="16" y="196" fill="#b45f42" font-size="13">EXW, FX terms</text>
    </g>
  </g>

  <!-- arrows into spec -->
  <g stroke="#7b867f" stroke-width="2.5" fill="none">
    <path d="M374 266 L470 322" />
    <path d="M374 334 L470 350" />
    <path d="M374 402 L470 378"/>
  </g>

  <!-- center: RFQ spec funnel -->
  <g transform="translate(470 232)">
    <rect width="250" height="220" rx="20" fill="#1f332d"/>
    <text x="125" y="36" text-anchor="middle" fill="#f6f4ee" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Standardized RFQ</text>
    <g font-family="Inter, Arial, sans-serif" font-size="14" fill="#dfe7e0">
      <text x="22" y="72">• Fruit, form, cut</text>
      <text x="22" y="100">• Moisture / aw limits</text>
      <text x="22" y="128">• Defect tolerances</text>
      <text x="22" y="156">• Qty, pack, Incoterm</text>
      <text x="22" y="184">• Currency, terms, certs</text>
    </g>
  </g>

  <!-- arrow out -->
  <path d="M724 342 L812 342" stroke="#5a7d56" stroke-width="3" fill="none" marker-end="url(#ah)"/>
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#5a7d56"/>
    </marker>
  </defs>

  <!-- right: comparable basis -->
  <g transform="translate(828 232)" font-family="Inter, Arial, sans-serif">
    <rect width="200" height="220" rx="20" fill="#f4f0e5" stroke="#5a7d56" stroke-width="2"/>
    <text x="100" y="34" text-anchor="middle" fill="#1f332d" font-size="17" font-weight="700">One basis</text>
    <text x="100" y="56" text-anchor="middle" fill="#5f6a63" font-size="13">landed cost / unit</text>
    <g>
      <rect x="28" y="78" width="40" height="110" rx="6" fill="#5a7d56"/>
      <rect x="84" y="104" width="40" height="84" rx="6" fill="#5a7d56"/>
      <rect x="140" y="92" width="40" height="96" rx="6" fill="#5a7d56"/>
      <text x="48" y="204" text-anchor="middle" fill="#5f6a63" font-size="12">A</text>
      <text x="104" y="204" text-anchor="middle" fill="#5f6a63" font-size="12">B</text>
      <text x="160" y="204" text-anchor="middle" fill="#5f6a63" font-size="12">C</text>
    </g>
  </g>

  <text x="112" y="556" fill="#68736c" font-family="Inter, Arial, sans-serif" font-size="15">Big gaps between quotes usually trace back to the request — not the suppliers.</text>
</svg>
