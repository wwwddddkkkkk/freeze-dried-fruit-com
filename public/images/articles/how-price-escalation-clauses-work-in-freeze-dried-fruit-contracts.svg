<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">How price escalation clauses work in freeze-dried fruit contracts</title>
  <desc id="desc">A field-guide diagram showing a contract price stepping up and down within a capped band as it tracks an input index, with the clause components listed.</desc>
  <rect width="1200" height="680" fill="#f7f2e8"/>
  <rect x="76" y="72" width="1048" height="536" rx="34" fill="#fffdf8" stroke="#d8d0bf" stroke-width="2"/>
  <text x="116" y="128" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="33" font-weight="700">Price moves with a named index — inside caps</text>
  <text x="116" y="166" fill="#69736d" font-family="Inter, Arial, sans-serif" font-size="17">Escalation adjusts price by rule, not renegotiation — and it should cut both ways.</text>

  <!-- Chart -->
  <g transform="translate(122 206)">
    <rect width="600" height="360" rx="26" fill="#f7f3ea" stroke="#d8d0bf"/>
    <text x="28" y="42" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">Contract price over review periods</text>
    <!-- cap and floor band -->
    <rect x="60" y="96" width="500" height="200" fill="#3f6f5c" opacity="0.08"/>
    <line x1="60" y1="96" x2="560" y2="96" stroke="#3f6f5c" stroke-width="2" stroke-dasharray="6 6"/>
    <text x="466" y="90" fill="#3f6f5c" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700">cap</text>
    <line x1="60" y1="296" x2="560" y2="296" stroke="#3f6f5c" stroke-width="2" stroke-dasharray="6 6"/>
    <text x="462" y="316" fill="#3f6f5c" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700">floor</text>
    <!-- index (light) -->
    <polyline points="60,240 160,180 260,150 360,210 460,120 560,170" fill="none" stroke="#b9b19f" stroke-width="3" stroke-dasharray="4 6"/>
    <!-- price steps (accent) -->
    <polyline points="60,250 160,250 160,205 260,205 260,180 360,180 360,215 460,215 460,160 560,160" fill="none" stroke="#cf6f5d" stroke-width="4"/>
    <circle cx="160" cy="205" r="5" fill="#cf6f5d"/>
    <circle cx="260" cy="180" r="5" fill="#cf6f5d"/>
    <circle cx="360" cy="215" r="5" fill="#cf6f5d"/>
    <circle cx="460" cy="160" r="5" fill="#cf6f5d"/>
    <text x="80" y="345" fill="#cf6f5d" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700">— price (stepped)</text>
    <text x="300" y="345" fill="#8a8474" font-family="Inter, Arial, sans-serif" font-size="13">--- input index</text>
  </g>

  <!-- Clause components -->
  <g transform="translate(756 206)">
    <rect width="322" height="360" rx="26" fill="#f7f3ea" stroke="#d8d0bf"/>
    <text x="28" y="46" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">Clause components</text>
    <g font-family="Inter, Arial, sans-serif" font-size="16" fill="#33433c">
      <circle cx="40" cy="92" r="6" fill="#cf6f5d"/><text x="60" y="98">Reference / index</text>
      <circle cx="40" cy="140" r="6" fill="#cf6f5d"/><text x="60" y="146">Trigger threshold</text>
      <circle cx="40" cy="188" r="6" fill="#cf6f5d"/><text x="60" y="194">Cap &amp; floor</text>
      <circle cx="40" cy="236" r="6" fill="#cf6f5d"/><text x="60" y="242">Adjustment cadence</text>
      <circle cx="40" cy="284" r="6" fill="#3f6f5c"/><text x="60" y="290">Symmetry (up &amp; down)</text>
    </g>
    <text x="28" y="332" fill="#69736d" font-family="Inter, Arial, sans-serif" font-size="13">Escalate only the fruit portion, not the</text>
    <text x="28" y="350" fill="#69736d" font-family="Inter, Arial, sans-serif" font-size="13">whole delivered price.</text>
  </g>
</svg>
