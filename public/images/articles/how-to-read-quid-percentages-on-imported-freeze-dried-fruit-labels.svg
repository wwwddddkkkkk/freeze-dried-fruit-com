<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">How to read QUID percentages on imported freeze-dried fruit labels</title>
  <desc id="desc">A mock blend label showing each fruit with a QUID percentage, a proportional bar of the recipe, and a note that the percentage is measured at the point of use.</desc>
  <rect width="1200" height="680" fill="#f6f4ee"/>
  <rect x="72" y="72" width="1056" height="536" rx="34" fill="#fffdf8" stroke="#d8d2c3" stroke-width="2"/>
  <text x="110" y="126" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="700">The percentage is a recipe share, not a quality grade</text>
  <text x="110" y="164" fill="#68736c" font-family="Inter, Arial, sans-serif" font-size="17">QUID shows how much of an emphasized ingredient went into the blend, measured when it was added.</text>

  <!-- Label card -->
  <g transform="translate(110 210)">
    <rect width="470" height="330" rx="20" fill="#fffaf0" stroke="#e5dcc6" stroke-width="2"/>
    <text x="28" y="52" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">Tropical Mix &#8212; Ingredients</text>
    <line x1="28" y1="68" x2="442" y2="68" stroke="#e5dcc6"/>
    <g font-family="Inter, Arial, sans-serif" font-size="17" fill="#2c3a34">
      <text x="28" y="104">Mango <tspan font-weight="700" fill="#b5732a">(60%)</tspan>,</text>
      <text x="28" y="140">Pineapple <tspan font-weight="700" fill="#b5732a">(25%)</tspan>,</text>
      <text x="28" y="176">Coconut <tspan font-weight="700" fill="#b5732a">(15%)</tspan></text>
    </g>
    <line x1="28" y1="200" x2="442" y2="200" stroke="#eee5d0"/>
    <!-- proportional bar -->
    <text x="28" y="230" fill="#68736c" font-family="Inter, Arial, sans-serif" font-size="13">Share of the formula</text>
    <g transform="translate(28 244)">
      <rect x="0" y="0" width="248" height="30" rx="6" fill="#e6a441"/>
      <rect x="248" y="0" width="103" height="30" fill="#e7cf6f"/>
      <rect x="351" y="0" width="63" height="30" rx="6" fill="#cfd8c4"/>
      <text x="14" y="20" fill="#5c3d12" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700">Mango 60%</text>
      <text x="262" y="20" fill="#5c4f18" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700">Pine 25%</text>
    </g>
    <text x="28" y="316" fill="#8a7a58" font-family="Inter, Arial, sans-serif" font-size="12">Every visible piece is fruit &#8212; the % is each fruit&#8217;s share of the mix.</text>
  </g>

  <!-- Right column: what it does / doesn't -->
  <g transform="translate(632 210)">
    <rect width="456" height="330" rx="20" fill="#eef6ef" stroke="#c7ddc9" stroke-width="2"/>
    <text x="28" y="50" fill="#2f5d3a" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">QUID tells you</text>
    <g font-family="Inter, Arial, sans-serif" font-size="15" fill="#33473c">
      <text x="28" y="82">&#10003;  which fruit leads the blend</text>
      <text x="28" y="110">&#10003;  when a cheaper carrier is the base</text>
      <text x="28" y="138">&#10003;  a fair way to compare two mixes</text>
    </g>
    <line x1="28" y1="160" x2="428" y2="160" stroke="#c7ddc9"/>
    <text x="28" y="192" fill="#a34a45" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">QUID does not tell you</text>
    <g font-family="Inter, Arial, sans-serif" font-size="15" fill="#7a4a46">
      <text x="28" y="224">&#10007;  quality or grade of the fruit</text>
      <text x="28" y="252">&#10007;  added sugar or coatings</text>
      <text x="28" y="280">&#10007;  origin or variety</text>
      <text x="28" y="308">&#10007;  the ratio after rehydrating</text>
    </g>
  </g>
</svg>
