<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">How to read a freeze-dried fruit spec sheet</title>
  <desc id="desc">An annotated freeze-dried fruit specification sheet highlighting product identity, ingredients, moisture, breakage, origin, and packaging lines.</desc>
  <rect width="1200" height="680" fill="#f6f4ee"/>
  <rect x="74" y="72" width="1052" height="536" rx="34" fill="#fffdf8" stroke="#d8d2c3" stroke-width="2"/>
  <text x="112" y="128" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="33" font-weight="700">A useful spec sheet predicts the bag</text>
  <text x="112" y="166" fill="#68736c" font-family="Inter, Arial, sans-serif" font-size="17">Read identity, ingredients, moisture, size, origin, and packaging as one system.</text>

  <g transform="translate(144 214)">
    <rect width="640" height="300" rx="24" fill="#fffdf8" stroke="#d8d2c3" stroke-width="2"/>
    <line x1="0" y1="64" x2="640" y2="64" stroke="#d8d2c3"/>
    <line x1="212" y1="64" x2="212" y2="300" stroke="#d8d2c3"/>
    <line x1="0" y1="116" x2="640" y2="116" stroke="#ece5d6"/>
    <line x1="0" y1="168" x2="640" y2="168" stroke="#ece5d6"/>
    <line x1="0" y1="220" x2="640" y2="220" stroke="#ece5d6"/>
    <line x1="0" y1="272" x2="640" y2="272" stroke="#ece5d6"/>
    <text x="28" y="40" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">Spec sheet lines</text>
    <text x="30" y="96" fill="#495852" font-family="Inter, Arial, sans-serif" font-size="15">Product identity</text>
    <text x="30" y="148" fill="#495852" font-family="Inter, Arial, sans-serif" font-size="15">Ingredients</text>
    <text x="30" y="200" fill="#495852" font-family="Inter, Arial, sans-serif" font-size="15">Moisture / aw</text>
    <text x="30" y="252" fill="#495852" font-family="Inter, Arial, sans-serif" font-size="15">Size / breakage</text>
    <text x="30" y="304" fill="#495852" font-family="Inter, Arial, sans-serif" font-size="15">Origin / input</text>

    <rect x="236" y="78" width="240" height="28" rx="14" fill="#cadccf"/>
    <rect x="236" y="130" width="198" height="28" rx="14" fill="#ead8b7"/>
    <rect x="236" y="182" width="168" height="28" rx="14" fill="#cfe1ee"/>
    <rect x="236" y="234" width="214" height="28" rx="14" fill="#e7c0b5"/>
    <rect x="236" y="286" width="182" height="28" rx="14" fill="#ddd3c3"/>
  </g>

  <g transform="translate(830 228)">
    <rect width="230" height="260" rx="24" fill="#edf6f1" stroke="#c6d8ce"/>
    <text x="24" y="42" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="700">Read for meaning</text>
    <text x="24" y="82" fill="#425650" font-family="Inter, Arial, sans-serif" font-size="14">1. What product is this?</text>
    <text x="24" y="116" fill="#425650" font-family="Inter, Arial, sans-serif" font-size="14">2. What changed the formula?</text>
    <text x="24" y="150" fill="#425650" font-family="Inter, Arial, sans-serif" font-size="14">3. What supports texture?</text>
    <text x="24" y="184" fill="#425650" font-family="Inter, Arial, sans-serif" font-size="14">4. What will the pouch look like?</text>
    <text x="24" y="218" fill="#425650" font-family="Inter, Arial, sans-serif" font-size="14">5. What supply logic sits behind it?</text>
  </g>

  <g transform="translate(112 536)">
    <rect width="976" height="34" rx="17" fill="#1f332d"/>
    <text x="28" y="23" fill="#fffdf8" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">Warning sign: phrases like "premium quality" or "minimal breakage" need numeric or visual definitions.</text>
  </g>
</svg>
