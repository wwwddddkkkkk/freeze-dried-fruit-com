<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Why edge and corner tray positions dry differently in freeze-dried fruit</title>
  <desc id="desc">Technical chamber map comparing center, edge, and corner tray positions with different radiation and endpoint risk in freeze-dried fruit drying.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f6efe3"/>
      <stop offset="100%" stop-color="#e8dcc5"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect x="72" y="70" width="1456" height="760" rx="30" fill="#fcfaf6" stroke="#203836" stroke-width="2.5"/>
  <text x="112" y="146" fill="#203836" font-family="'Source Sans 3', Arial, sans-serif" font-size="26" letter-spacing="5">TECHNOLOGY</text>
  <text x="112" y="198" fill="#152d2a" font-family="'DM Serif Display', Georgia, serif" font-size="50">Outer Tray Positions Rarely Live in the Same Chamber</text>
  <text x="112" y="238" fill="#5b6d69" font-family="'Source Serif 4', Georgia, serif" font-size="24">Edge and corner rows can see a different heat job than the center, which changes fragility and endpoint risk.</text>

  <rect x="108" y="286" width="746" height="454" rx="24" fill="#f1ebdf" stroke="#294643" stroke-width="2"/>
  <text x="144" y="336" fill="#294643" font-family="'Source Sans 3', Arial, sans-serif" font-size="24" letter-spacing="4">CHAMBER POSITION MAP</text>

  <rect x="184" y="390" width="594" height="276" rx="28" fill="#17312f"/>
  <rect x="244" y="446" width="154" height="84" rx="18" fill="#f0c86a"/>
  <rect x="426" y="446" width="154" height="84" rx="18" fill="#dce9e3"/>
  <rect x="608" y="446" width="110" height="84" rx="18" fill="#f0c86a"/>

  <rect x="244" y="548" width="154" height="76" rx="18" fill="#f0c86a"/>
  <rect x="426" y="548" width="154" height="76" rx="18" fill="#88b8aa"/>
  <rect x="608" y="548" width="110" height="76" rx="18" fill="#f0c86a"/>

  <circle cx="244" cy="446" r="18" fill="#c86d58"/>
  <circle cx="718" cy="446" r="18" fill="#c86d58"/>
  <circle cx="244" cy="624" r="18" fill="#c86d58"/>
  <circle cx="718" cy="624" r="18" fill="#c86d58"/>

  <text x="286" y="494" fill="#17312f" font-family="'Source Sans 3', Arial, sans-serif" font-size="22">EDGE</text>
  <text x="462" y="494" fill="#23433d" font-family="'Source Sans 3', Arial, sans-serif" font-size="22">CENTER</text>
  <text x="628" y="494" fill="#17312f" font-family="'Source Sans 3', Arial, sans-serif" font-size="20">EDGE</text>
  <text x="286" y="592" fill="#17312f" font-family="'Source Sans 3', Arial, sans-serif" font-size="22">EDGE</text>
  <text x="468" y="592" fill="#ffffff" font-family="'Source Sans 3', Arial, sans-serif" font-size="22">CENTER CORE</text>
  <text x="628" y="592" fill="#17312f" font-family="'Source Sans 3', Arial, sans-serif" font-size="20">EDGE</text>

  <text x="202" y="420" fill="#f7f0e4" font-family="'Source Sans 3', Arial, sans-serif" font-size="18">corner risk</text>
  <text x="660" y="420" fill="#f7f0e4" font-family="'Source Sans 3', Arial, sans-serif" font-size="18">corner risk</text>

  <path d="M174 418 C148 470, 146 560, 174 632" fill="none" stroke="#c86d58" stroke-width="6" stroke-linecap="round"/>
  <path d="M782 418 C808 470, 810 560, 782 632" fill="none" stroke="#c86d58" stroke-width="6" stroke-linecap="round"/>
  <text x="154" y="690" fill="#5c6f6a" font-family="'Source Sans 3', Arial, sans-serif" font-size="20">outer rows can see more chamber-wall influence</text>

  <rect x="904" y="286" width="588" height="454" rx="24" fill="#17312f"/>
  <text x="942" y="336" fill="#f7f0e4" font-family="'Source Sans 3', Arial, sans-serif" font-size="24" letter-spacing="4">WHAT CHANGES OUTSIDE</text>
  <text x="942" y="388" fill="#ffffff" font-family="'DM Serif Display', Georgia, serif" font-size="36">Boundary positions carry extra variability</text>

  <rect x="944" y="430" width="228" height="214" rx="22" fill="#fcfaf6"/>
  <text x="976" y="474" fill="#17312f" font-family="'Source Sans 3', Arial, sans-serif" font-size="21" letter-spacing="3">OUTER ZONE INPUTS</text>
  <text x="976" y="514" fill="#4f625f" font-family="'Source Sans 3', Arial, sans-serif" font-size="19">chamber-wall radiation</text>
  <text x="976" y="546" fill="#4f625f" font-family="'Source Sans 3', Arial, sans-serif" font-size="19">less shielding</text>
  <text x="976" y="578" fill="#4f625f" font-family="'Source Sans 3', Arial, sans-serif" font-size="19">different vapor path</text>
  <text x="976" y="610" fill="#4f625f" font-family="'Source Sans 3', Arial, sans-serif" font-size="19">contact and spacing effects</text>

  <rect x="1204" y="430" width="238" height="214" rx="22" fill="#efe1c7"/>
  <text x="1236" y="474" fill="#17312f" font-family="'Source Sans 3', Arial, sans-serif" font-size="21" letter-spacing="3">COMMON OUTPUTS</text>
  <text x="1236" y="514" fill="#5e503f" font-family="'Source Sans 3', Arial, sans-serif" font-size="19">fragile edges</text>
  <text x="1236" y="546" fill="#5e503f" font-family="'Source Sans 3', Arial, sans-serif" font-size="19">mixed endpoint timing</text>
  <text x="1236" y="578" fill="#5e503f" font-family="'Source Sans 3', Arial, sans-serif" font-size="19">outer-row over-dry risk</text>
  <text x="1236" y="610" fill="#5e503f" font-family="'Source Sans 3', Arial, sans-serif" font-size="19">hidden lot inconsistency</text>

  <rect x="944" y="668" width="498" height="56" rx="16" fill="#88b8aa"/>
  <text x="972" y="704" fill="#17312f" font-family="'Source Sans 3', Arial, sans-serif" font-size="21" font-weight="700">Useful rule: validate center, edge, and corner positions separately instead of trusting one average tray read.</text>
</svg>
