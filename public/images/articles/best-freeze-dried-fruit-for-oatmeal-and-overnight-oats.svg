<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">Best freeze-dried fruit for oatmeal and overnight oats</title>
  <desc id="desc">An application matrix comparing visible pieces, blended flavor, and timing choices for freeze-dried fruit in oatmeal.</desc>
  <rect width="1200" height="680" fill="#f5f1e8"/>
  <rect x="74" y="72" width="1052" height="536" rx="34" fill="#fffdf8" stroke="#d8d0bf" stroke-width="2"/>
  <text x="112" y="128" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="700">Oat bowls need different fruit timing than yogurt bowls</text>
  <text x="112" y="166" fill="#69736d" font-family="Inter, Arial, sans-serif" font-size="17">Some fruits stay visible on top. Others work better when they dissolve flavor through the bowl.</text>

  <g transform="translate(112 212)">
    <rect width="458" height="310" rx="24" fill="#f7f3ea" stroke="#d8d0bf"/>
    <text x="28" y="46" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Hot oatmeal</text>
    <text x="28" y="76" fill="#69736d" font-family="Inter, Arial, sans-serif" font-size="14">More control. Add early for flavor or late for contrast.</text>
    <circle cx="130" cy="190" r="80" fill="#ecd8b4"/>
    <circle cx="130" cy="190" r="58" fill="#f8f0de"/>
    <circle cx="104" cy="162" r="12" fill="#d86f67"/>
    <circle cx="154" cy="152" r="10" fill="#c45a8f"/>
    <circle cx="172" cy="204" r="14" fill="#f2b05b"/>
    <circle cx="108" cy="220" r="11" fill="#c58d54"/>
    <text x="254" y="148" fill="#4a5953" font-family="Inter, Arial, sans-serif" font-size="15">Best for visible pieces:</text>
    <text x="254" y="174" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700">strawberry, apple</text>
    <text x="254" y="222" fill="#4a5953" font-family="Inter, Arial, sans-serif" font-size="15">Best for full-bowl flavor:</text>
    <text x="254" y="248" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700">blueberry, raspberry, powder</text>
  </g>

  <g transform="translate(630 212)">
    <rect width="458" height="310" rx="24" fill="#edf5ef" stroke="#c8d7cb"/>
    <text x="28" y="46" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Overnight oats</text>
    <text x="28" y="76" fill="#69736d" font-family="Inter, Arial, sans-serif" font-size="14">Long soak time softens pieces much more aggressively.</text>
    <rect x="42" y="122" width="104" height="138" rx="18" fill="#fffdf8" stroke="#c8d7cb"/>
    <rect x="52" y="152" width="84" height="94" rx="14" fill="#e7d9b8"/>
    <circle cx="76" cy="176" r="8" fill="#d86f67"/>
    <circle cx="110" cy="192" r="10" fill="#c45a8f"/>
    <circle cx="92" cy="216" r="9" fill="#f2b05b"/>
    <path d="M174 170h198" stroke="#7e9e90" stroke-width="3" stroke-dasharray="6 8"/>
    <text x="200" y="156" fill="#4a5953" font-family="Inter, Arial, sans-serif" font-size="15">Best strategy:</text>
    <text x="200" y="182" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700">use powder in the base</text>
    <text x="200" y="214" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700">save pieces for the top</text>
    <text x="200" y="258" fill="#4a5953" font-family="Inter, Arial, sans-serif" font-size="15">Late-add fruits:</text>
    <text x="200" y="284" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700">banana, mango</text>
  </g>

  <g transform="translate(112 538)">
    <rect width="976" height="34" rx="17" fill="#1f332d"/>
    <text x="28" y="23" fill="#fffdf8" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">Consumer note: if texture matters, add some fruit right before eating instead of soaking everything overnight.</text>
  </g>
</svg>
