<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" fill="none">
  <rect width="1600" height="900" fill="#F4F1EA"/>
  <rect x="68" y="68" width="1464" height="764" rx="30" fill="#FFFDFC" stroke="#CDC4B6" stroke-width="4"/>
  <text x="118" y="148" fill="#1B262C" font-family="Georgia, 'Times New Roman', serif" font-size="50">Read the Scope, Not Just the Logo</text>
  <text x="118" y="190" fill="#5F6C70" font-family="Arial, Helvetica, sans-serif" font-size="24">Freeze-dried fruit certificates may cover manufacturing, warehousing, or broker activity.</text>

  <rect x="118" y="242" width="1364" height="496" rx="24" fill="#FBF8F2" stroke="#D8D0C2" stroke-width="3"/>

  <rect x="148" y="272" width="360" height="92" rx="18" fill="#F2E6D5"/>
  <rect x="536" y="272" width="428" height="92" rx="18" fill="#F2E6D5"/>
  <rect x="992" y="272" width="460" height="92" rx="18" fill="#F2E6D5"/>
  <text x="176" y="325" fill="#5C5247" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700">Scope on certificate</text>
  <text x="564" y="325" fill="#5C5247" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700">What it usually means</text>
  <text x="1020" y="325" fill="#5C5247" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700">Buyer question it answers</text>

  <rect x="148" y="390" width="360" height="110" rx="20" fill="#E8F6F4" stroke="#7FB7B2" stroke-width="3"/>
  <rect x="536" y="390" width="428" height="110" rx="20" fill="#F8FBF7" stroke="#B8CFB4" stroke-width="3"/>
  <rect x="992" y="390" width="460" height="110" rx="20" fill="#F8FBF7" stroke="#B8CFB4" stroke-width="3"/>
  <text x="176" y="436" fill="#1F5954" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Processing / manufacturing</text>
  <text x="176" y="468" fill="#1F5954" font-family="Arial, Helvetica, sans-serif" font-size="22">Plant is making the food.</text>
  <text x="564" y="436" fill="#35533A" font-family="Arial, Helvetica, sans-serif" font-size="24">Drying, packing, product release,</text>
  <text x="564" y="468" fill="#35533A" font-family="Arial, Helvetica, sans-serif" font-size="24">site-level food-safety controls</text>
  <text x="1020" y="436" fill="#35533A" font-family="Arial, Helvetica, sans-serif" font-size="24">Is this the site that actually</text>
  <text x="1020" y="468" fill="#35533A" font-family="Arial, Helvetica, sans-serif" font-size="24">freeze-dries the fruit?</text>

  <rect x="148" y="530" width="360" height="110" rx="20" fill="#FFF3E8" stroke="#E0B78F" stroke-width="3"/>
  <rect x="536" y="530" width="428" height="110" rx="20" fill="#FFFDFC" stroke="#DCC9B2" stroke-width="3"/>
  <rect x="992" y="530" width="460" height="110" rx="20" fill="#FFFDFC" stroke="#DCC9B2" stroke-width="3"/>
  <text x="176" y="576" fill="#8A5727" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Storage / distribution</text>
  <text x="176" y="608" fill="#8A5727" font-family="Arial, Helvetica, sans-serif" font-size="22">Warehouse or logistics role.</text>
  <text x="564" y="576" fill="#6F5A40" font-family="Arial, Helvetica, sans-serif" font-size="24">Transport, warehousing,</text>
  <text x="564" y="608" fill="#6F5A40" font-family="Arial, Helvetica, sans-serif" font-size="24">possibly relabel or repack support</text>
  <text x="1020" y="576" fill="#6F5A40" font-family="Arial, Helvetica, sans-serif" font-size="24">Who protects the product after</text>
  <text x="1020" y="608" fill="#6F5A40" font-family="Arial, Helvetica, sans-serif" font-size="24">manufacturing and before delivery?</text>

  <rect x="148" y="670" width="360" height="110" rx="20" fill="#F1EDF8" stroke="#B5A8D3" stroke-width="3"/>
  <rect x="536" y="670" width="428" height="110" rx="20" fill="#FFFDFC" stroke="#DCC9B2" stroke-width="3"/>
  <rect x="992" y="670" width="460" height="110" rx="20" fill="#FFFDFC" stroke="#DCC9B2" stroke-width="3"/>
  <text x="176" y="716" fill="#5A4A82" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Agent / broker</text>
  <text x="176" y="748" fill="#5A4A82" font-family="Arial, Helvetica, sans-serif" font-size="22">Trading and chain-of-custody role.</text>
  <text x="564" y="716" fill="#6F5A40" font-family="Arial, Helvetica, sans-serif" font-size="24">Sources product, manages documents,</text>
  <text x="564" y="748" fill="#6F5A40" font-family="Arial, Helvetica, sans-serif" font-size="24">does not have to be the producer</text>
  <text x="1020" y="716" fill="#6F5A40" font-family="Arial, Helvetica, sans-serif" font-size="24">Who owns the relationship, and</text>
  <text x="1020" y="748" fill="#6F5A40" font-family="Arial, Helvetica, sans-serif" font-size="24">which site really made the fruit?</text>

  <rect x="118" y="764" width="540" height="42" rx="14" fill="#1F5954"/>
  <text x="146" y="792" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="22">Same recognition framework, different commercial meanings.</text>
</svg>
