<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">How Minimum Remaining Shelf-Life Clauses Protect Freeze-Dried Fruit Buyers</title>
  <desc id="desc">A shelf-life timeline bar split into elapsed time before receipt and remaining life, with a minimum-remaining threshold line that a compliant lot clears and a short lot fails.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7f2e8"/>
      <stop offset="100%" stop-color="#efe7d7"/>
    </linearGradient>
    <style>
      .panel{fill:#fffaf1;stroke:#17313b;stroke-width:2.5}
      .ink{fill:#17313b}
      .muted{fill:#58707a}
      .small{font:500 23px 'Source Sans 3',Arial,sans-serif}
      .label{font:600 28px 'Source Sans 3',Arial,sans-serif;letter-spacing:.08em;text-transform:uppercase}
      .title{font:700 52px 'Source Serif 4',Georgia,serif}
      .tag{font:600 25px 'Source Sans 3',Arial,sans-serif}
      .mono{font:600 22px 'JetBrains Mono',monospace}
      .line{stroke:#17313b;stroke-width:3;fill:none;stroke-linecap:round}
      .thresh{stroke:#cf5d3d;stroke-width:3.5;stroke-dasharray:10 8;fill:none}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect x="56" y="48" width="1488" height="804" rx="28" fill="none" stroke="#17313b" stroke-width="2.5"/>

  <text x="96" y="118" class="label ink">Industry Insights</text>
  <text x="96" y="186" class="title ink">In date is not the same as usable</text>
  <text x="96" y="228" class="small muted">The clause sets how much life must remain on receipt — not just that the lot is unexpired.</text>

  <!-- threshold marker -->
  <text x="96" y="320" class="tag ink">Minimum remaining threshold: 75% of total shelf life</text>

  <!-- COMPLIANT lot -->
  <text x="96" y="408" class="tag ink">Compliant lot</text>
  <rect x="96" y="430" width="1080" height="70" rx="10" class="panel"/>
  <rect x="96" y="430" width="270" height="70" rx="10" fill="#cfe0e6" stroke="#17313b" stroke-width="2.5"/>
  <rect x="366" y="430" width="810" height="70" rx="0" fill="#7bb37a" opacity="0.85"/>
  <rect x="366" y="430" width="810" height="70" fill="none" stroke="#17313b" stroke-width="2.5"/>
  <text x="150" y="473" class="mono ink">elapsed 25%</text>
  <text x="640" y="473" class="mono ink">remaining 75% — clears threshold</text>
  <!-- threshold line at 25% from start = x=366 -->
  <line x1="366" y1="400" x2="366" y2="520" class="thresh"/>

  <!-- SHORT lot -->
  <text x="96" y="600" class="tag ink">Short lot — rejected at receiving</text>
  <rect x="96" y="622" width="1080" height="70" rx="10" class="panel"/>
  <rect x="96" y="622" width="660" height="70" rx="10" fill="#cfe0e6" stroke="#17313b" stroke-width="2.5"/>
  <rect x="756" y="622" width="420" height="70" fill="#e08a6f" opacity="0.85"/>
  <rect x="756" y="622" width="420" height="70" fill="none" stroke="#17313b" stroke-width="2.5"/>
  <text x="150" y="665" class="mono ink">elapsed 61%</text>
  <text x="820" y="665" class="mono ink">remaining 39% — short</text>
  <line x1="366" y1="592" x2="366" y2="712" class="thresh"/>

  <!-- axis labels -->
  <text x="92" y="744" class="small muted">ship / production</text>
  <text x="1090" y="744" class="small muted">best-by date</text>
  <text x="300" y="360" class="small" fill="#cf5d3d">75% line</text>

  <text x="96" y="800" class="small muted">Define the basis (percent vs months), the receipt point, and the remedy — or the clause is unenforceable.</text>
</svg>
