<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">What may contain means on freeze-dried fruit labels</title>
  <desc id="desc">An annotated freeze-dried fruit label comparing required Contains statements with voluntary May Contain allergen advisory wording.</desc>
  <rect width="1200" height="680" fill="#f6f4ee"/>
  <rect x="74" y="72" width="1052" height="536" rx="34" fill="#fffdf8" stroke="#d8d2c3" stroke-width="2"/>
  <text x="112" y="128" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="33" font-weight="700">“May contain” is a cross-contact warning, not an ingredient line</text>
  <text x="112" y="166" fill="#68736c" font-family="Inter, Arial, sans-serif" font-size="17">The wording matters, but FDA does not treat it as one standardized risk scale across every product.</text>

  <g transform="translate(132 214)">
    <rect width="434" height="308" rx="26" fill="#fffdf8" stroke="#d8d2c3" stroke-width="2"/>
    <text x="28" y="42" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Required if intentional</text>
    <rect x="28" y="78" width="300" height="48" rx="16" fill="#cadccf"/>
    <text x="48" y="108" fill="#27453c" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700">Contains: milk, soy</text>
    <text x="28" y="162" fill="#4b5a54" font-family="Inter, Arial, sans-serif" font-size="15">Used for major allergens intentionally present as ingredients.</text>
    <text x="28" y="192" fill="#4b5a54" font-family="Inter, Arial, sans-serif" font-size="15">This is not the same job as a precautionary advisory.</text>
    <rect x="28" y="226" width="336" height="42" rx="16" fill="#dce7f3"/>
    <text x="48" y="252" fill="#34526a" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">Do not mix this with unrelated warnings.</text>
  </g>

  <g transform="translate(632 214)">
    <rect width="424" height="308" rx="26" fill="#f7f3ea" stroke="#d8d2c3"/>
    <text x="26" y="42" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Voluntary if cross-contact risk remains</text>
    <rect x="26" y="78" width="238" height="48" rx="16" fill="#ead8b7"/>
    <text x="46" y="108" fill="#6e5a2f" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700">May contain milk</text>
    <text x="26" y="162" fill="#4b5a54" font-family="Inter, Arial, sans-serif" font-size="15">Signals possible unintended allergen presence.</text>
    <text x="26" y="192" fill="#4b5a54" font-family="Inter, Arial, sans-serif" font-size="15">FDA says the wording is voluntary and not a substitute for GMPs.</text>
    <rect x="26" y="226" width="364" height="42" rx="16" fill="#e7c0b5"/>
    <text x="46" y="252" fill="#7a3f35" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">Do not assume phrase changes = clean risk ranking.</text>
  </g>

  <g transform="translate(112 538)">
    <rect width="976" height="34" rx="17" fill="#1f332d"/>
    <text x="28" y="23" fill="#fffdf8" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">Reading rule: ingredient disclosure and cross-contact warning are different label lanes. Treat both seriously, but do not confuse them.</text>
  </g>
</svg>
