<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">How to read microbiological limits on a freeze-dried fruit spec sheet</title>
  <desc id="desc">An annotated spec sheet grouping microbiological lines into indicator organisms and pathogen safety gates, with each line showing organism, limit, unit, and sample size.</desc>
  <rect width="1600" height="900" fill="#f4efe6"/>
  <rect x="64" y="64" width="1472" height="772" rx="30" fill="#fcfaf5" stroke="#d4c7b1" stroke-width="2"/>
  <text x="112" y="138" fill="#24433d" font-family="'Source Sans 3', Arial, sans-serif" font-size="26" letter-spacing="5">LABELS &amp; QUALITY</text>
  <text x="112" y="194" fill="#172f2b" font-family="'DM Serif Display', Georgia, serif" font-size="50">Two Families Hide in the Micro Spec</text>
  <text x="112" y="236" fill="#5f716d" font-family="'Source Serif 4', Georgia, serif" font-size="24">Indicators tell you about hygiene. Pathogens are pass-or-fail safety gates.</text>

  <!-- Indicators panel -->
  <rect x="104" y="290" width="690" height="468" rx="24" fill="#f1ebdf" stroke="#294643" stroke-width="2"/>
  <text x="140" y="338" fill="#294643" font-family="'Source Sans 3', Arial, sans-serif" font-size="24" letter-spacing="3">INDICATORS &#8212; HYGIENE</text>
  <text x="140" y="370" fill="#5f716d" font-family="'Source Serif 4', Georgia, serif" font-size="19">counts within a limit = a pass; high = a question</text>

  <rect x="140" y="392" width="618" height="74" rx="12" fill="#fcfaf6" stroke="#c7bda8"/>
  <text x="160" y="424" fill="#17312f" font-family="'Source Sans 3', Arial, sans-serif" font-size="22" font-weight="700">Aerobic plate count</text>
  <text x="160" y="452" fill="#5f716d" font-family="'Source Sans 3', Arial, sans-serif" font-size="19">&#8804; limit &#160;|&#160; CFU/g &#160;|&#160; overall cleanliness</text>

  <rect x="140" y="478" width="618" height="74" rx="12" fill="#fcfaf6" stroke="#c7bda8"/>
  <text x="160" y="510" fill="#17312f" font-family="'Source Sans 3', Arial, sans-serif" font-size="22" font-weight="700">Yeast &amp; mold</text>
  <text x="160" y="538" fill="#5f716d" font-family="'Source Sans 3', Arial, sans-serif" font-size="19">&#8804; limit &#160;|&#160; CFU/g &#160;|&#160; ripeness, moisture, damage</text>

  <rect x="140" y="564" width="300" height="74" rx="12" fill="#fcfaf6" stroke="#c7bda8"/>
  <text x="160" y="596" fill="#17312f" font-family="'Source Sans 3', Arial, sans-serif" font-size="22" font-weight="700">Coliforms</text>
  <text x="160" y="624" fill="#5f716d" font-family="'Source Sans 3', Arial, sans-serif" font-size="19">sanitation signal</text>

  <rect x="458" y="564" width="300" height="74" rx="12" fill="#fcfaf6" stroke="#c7bda8"/>
  <text x="478" y="596" fill="#17312f" font-family="'Source Sans 3', Arial, sans-serif" font-size="22" font-weight="700">E. coli (generic)</text>
  <text x="478" y="624" fill="#5f716d" font-family="'Source Sans 3', Arial, sans-serif" font-size="19">fecal-contam indicator</text>

  <rect x="140" y="664" width="618" height="64" rx="12" fill="#203836"/>
  <text x="160" y="703" fill="#fffdf8" font-family="'Source Sans 3', Arial, sans-serif" font-size="19">Response: ask the supplier, check the lot &#8212; not auto-reject</text>

  <!-- Pathogens panel -->
  <rect x="818" y="290" width="630" height="468" rx="24" fill="#17312f"/>
  <text x="854" y="338" fill="#f7f0e4" font-family="'Source Sans 3', Arial, sans-serif" font-size="24" letter-spacing="3">PATHOGENS &#8212; SAFETY GATE</text>
  <text x="854" y="370" fill="#9fc4ba" font-family="'Source Serif 4', Georgia, serif" font-size="19">read as detected / not detected in a sample mass</text>

  <rect x="854" y="392" width="558" height="78" rx="12" fill="#0f2422" stroke="#3f5d59"/>
  <text x="874" y="426" fill="#ffffff" font-family="'Source Sans 3', Arial, sans-serif" font-size="22" font-weight="700">Salmonella</text>
  <text x="874" y="454" fill="#9fc4ba" font-family="'Source Sans 3', Arial, sans-serif" font-size="19">not detected in 25 g</text>
  <text x="1300" y="438" fill="#7fd0a8" font-family="'Source Sans 3', Arial, sans-serif" font-size="30" text-anchor="middle" font-weight="700">PASS/FAIL</text>

  <rect x="854" y="482" width="558" height="78" rx="12" fill="#0f2422" stroke="#3f5d59"/>
  <text x="874" y="516" fill="#ffffff" font-family="'Source Sans 3', Arial, sans-serif" font-size="22" font-weight="700">E. coli O157:H7 / STEC</text>
  <text x="874" y="544" fill="#9fc4ba" font-family="'Source Sans 3', Arial, sans-serif" font-size="19">not detected in stated sample</text>

  <rect x="854" y="572" width="558" height="78" rx="12" fill="#0f2422" stroke="#3f5d59"/>
  <text x="874" y="606" fill="#ffffff" font-family="'Source Sans 3', Arial, sans-serif" font-size="22" font-weight="700">Listeria (if specified)</text>
  <text x="874" y="634" fill="#9fc4ba" font-family="'Source Sans 3', Arial, sans-serif" font-size="19">risk-based, by intended use</text>

  <rect x="854" y="664" width="558" height="64" rx="12" fill="#9a3b2f"/>
  <text x="874" y="703" fill="#fff3ef" font-family="'Source Sans 3', Arial, sans-serif" font-size="19" font-weight="700">"Detected" &#8594; the lot does not ship. No negotiating.</text>

  <rect x="104" y="772" width="1344" height="42" rx="16" fill="#203836"/>
  <text x="142" y="800" fill="#fffdf8" font-family="'Source Sans 3', Arial, sans-serif" font-size="20" font-weight="700">Read the whole line: organism + limit + unit + sample size + method. Freeze-drying preserves, it does not sterilize.</text>
</svg>
