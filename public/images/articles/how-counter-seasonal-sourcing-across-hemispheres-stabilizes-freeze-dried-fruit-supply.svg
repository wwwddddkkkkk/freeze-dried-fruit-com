<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">How counter-seasonal sourcing stabilizes freeze-dried fruit supply</title>
  <desc id="desc">A year calendar showing a northern-hemisphere harvest window and a southern-hemisphere harvest window falling at opposite times, combining into more continuous coverage across the year.</desc>
  <rect width="1200" height="680" fill="#f6f4ee"/>
  <rect x="74" y="72" width="1052" height="536" rx="34" fill="#fffdf8" stroke="#d8d2c3" stroke-width="2"/>
  <text x="112" y="128" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="33" font-weight="700">Two hemispheres, two harvests, more of the year covered</text>
  <text x="112" y="166" fill="#68736c" font-family="Inter, Arial, sans-serif" font-size="17">Opposite seasons let one origin cover the gap while the other is between crops.</text>

  <g transform="translate(112 210)" font-family="Inter, Arial, sans-serif">
    <!-- month axis -->
    <text x="0" y="20" fill="#495852" font-size="13">J</text>
    <text x="82" y="20" fill="#495852" font-size="13">F</text>
    <text x="164" y="20" fill="#495852" font-size="13">M</text>
    <text x="246" y="20" fill="#495852" font-size="13">A</text>
    <text x="328" y="20" fill="#495852" font-size="13">M</text>
    <text x="410" y="20" fill="#495852" font-size="13">J</text>
    <text x="492" y="20" fill="#495852" font-size="13">J</text>
    <text x="574" y="20" fill="#495852" font-size="13">A</text>
    <text x="656" y="20" fill="#495852" font-size="13">S</text>
    <text x="738" y="20" fill="#495852" font-size="13">O</text>
    <text x="820" y="20" fill="#495852" font-size="13">N</text>
    <text x="902" y="20" fill="#495852" font-size="13">D</text>

    <!-- Northern row -->
    <text x="0" y="66" fill="#1f332d" font-size="16" font-weight="700">Northern origin</text>
    <rect x="0" y="76" width="976" height="40" rx="12" fill="#f7f3ea" stroke="#d8d2c3"/>
    <rect x="410" y="76" width="330" height="40" rx="12" fill="#5d79c8"/>
    <text x="500" y="102" fill="#fffdf8" font-size="14" font-weight="700">fresh-crop harvest</text>

    <!-- Southern row -->
    <text x="0" y="152" fill="#1f332d" font-size="16" font-weight="700">Southern origin</text>
    <rect x="0" y="162" width="976" height="40" rx="12" fill="#f7f3ea" stroke="#d8d2c3"/>
    <rect x="0" y="162" width="246" height="40" rx="12" fill="#4c8a63"/>
    <rect x="820" y="162" width="156" height="40" rx="12" fill="#4c8a63"/>
    <text x="40" y="188" fill="#fffdf8" font-size="14" font-weight="700">harvest</text>
    <text x="836" y="188" fill="#fffdf8" font-size="14" font-weight="700">harvest</text>

    <!-- Combined coverage -->
    <text x="0" y="238" fill="#1f332d" font-size="16" font-weight="700">Combined coverage</text>
    <rect x="0" y="248" width="976" height="40" rx="12" fill="#f7f3ea" stroke="#d8d2c3"/>
    <rect x="0" y="248" width="246" height="40" rx="12" fill="#cadccf"/>
    <rect x="410" y="248" width="330" height="40" rx="12" fill="#cadccf"/>
    <rect x="820" y="248" width="156" height="40" rx="12" fill="#cadccf"/>
    <text x="300" y="274" fill="#7a5a2f" font-size="13">gap to bridge with stock</text>
  </g>

  <g transform="translate(112 522)">
    <rect width="976" height="48" rx="24" fill="#1f332d"/>
    <text x="28" y="30" fill="#fffdf8" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">Trade-off: more continuous supply and leverage, in exchange for qualifying two origins to one shared spec.</text>
  </g>
</svg>
