<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Why puncture resistance matters in freeze-dried fruit pouches</title>
  <desc id="desc">A technical cover showing a flexible pouch, puncture-test probes, sharp fruit edges, and risk notes for compression and transport.</desc>
  <rect width="1600" height="900" fill="#f3efe6"/>
