<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">What the statement of identity tells you on a freeze-dried fruit package</title>
  <desc id="desc">Two package front panels compared: one named Freeze-Dried Strawberries with a single-ingredient list, and one named Strawberry Fruit Crisps with a four-item ingredient list including sugar and starch.</desc>
  <rect width="1600" height="900" fill="#f4efe6"/>
  <rect x="64" y="64" width="1472" height="772" rx="30" fill="#fcfaf5" stroke="#d4c7b1" stroke-width="2"/>
  <text x="112" y="138" fill="#24433d" font-family="'Source Sans 3', Arial, sans-serif" font-size="26" letter-spacing="5">LABELS &amp; QUALITY</text>
  <text x="112" y="192" fill="#172f2b" font-family="'DM Serif Display', Georgia, serif" font-size="46">The Name Is the Specification</text>
  <text x="112" y="232" fill="#5f716d" font-family="'Source Serif 4', Georgia, serif" font-size="23">The front-panel name is regulated. The photography is not.</text>

  <!-- Left pouch: plain fruit -->
  <rect x="132" y="290" width="600" height="430" rx="22" fill="#f1ebdf" stroke="#294643" stroke-width="2"/>
  <rect x="188" y="330" width="342" height="230" rx="14" fill="#fffdf8" stroke="#294643" stroke-width="2"/>
  <text x="212" y="378" fill="#8a9a95" font-family="'Source Sans 3', Arial, sans-serif" font-size="17" letter-spacing="3">BRAND MARK</text>
  <text x="212" y="432" fill="#172f2b" font-family="'DM Serif Display', Georgia, serif" font-size="34">Freeze-Dried</text>
  <text x="212" y="474" fill="#172f2b" font-family="'DM Serif Display', Georgia, serif" font-size="34">Strawberries</text>
  <rect x="212" y="500" width="180" height="4" fill="#2f6b57"/>
  <text x="212" y="536" fill="#2f6b57" font-family="'Source Sans 3', Arial, sans-serif" font-size="18" font-weight="700">Statement of identity</text>

  <text x="566" y="356" fill="#465b57" font-family="'Source Sans 3', Arial, sans-serif" font-size="18" letter-spacing="2">INGREDIENTS</text>
  <text x="566" y="392" fill="#172f2b" font-family="'Source Sans 3', Arial, sans-serif" font-size="20">Strawberries.</text>
  <circle cx="700" cy="386" r="20" fill="#2f6b57"/>
  <path d="M691 386 L698 394 L710 379" fill="none" stroke="#fffdf8" stroke-width="4"/>

  <text x="188" y="614" fill="#465b57" font-family="'Source Sans 3', Arial, sans-serif" font-size="19">Name and list agree · single-ingredient product</text>
  <text x="188" y="656" fill="#2f6b57" font-family="'Source Sans 3', Arial, sans-serif" font-size="21" font-weight="700">Compare on price per gram of fruit</text>
  <text x="188" y="692" fill="#5f716d" font-family="'Source Sans 3', Arial, sans-serif" font-size="18">Plain fruit name · process stated</text>

  <!-- Right pouch: formulated -->
  <rect x="868" y="290" width="600" height="430" rx="22" fill="#17312f"/>
  <rect x="924" y="330" width="342" height="230" rx="14" fill="#24433d" stroke="#7fa89c" stroke-width="2"/>
  <text x="948" y="378" fill="#7fa89c" font-family="'Source Sans 3', Arial, sans-serif" font-size="17" letter-spacing="3">BRAND MARK</text>
  <text x="948" y="432" fill="#fffdf8" font-family="'DM Serif Display', Georgia, serif" font-size="34">Strawberry</text>
  <text x="948" y="474" fill="#fffdf8" font-family="'DM Serif Display', Georgia, serif" font-size="34">Fruit Crisps</text>
  <rect x="948" y="500" width="180" height="4" fill="#e08a70"/>
  <text x="948" y="536" fill="#e08a70" font-family="'Source Sans 3', Arial, sans-serif" font-size="18" font-weight="700">Descriptive name · formulated food</text>

  <text x="1302" y="356" fill="#a7c7bd" font-family="'Source Sans 3', Arial, sans-serif" font-size="18" letter-spacing="2">INGREDIENTS</text>
  <text x="1302" y="392" fill="#fffdf8" font-family="'Source Sans 3', Arial, sans-serif" font-size="19">Strawberries,</text>
  <text x="1302" y="420" fill="#e08a70" font-family="'Source Sans 3', Arial, sans-serif" font-size="19">cane sugar,</text>
  <text x="1302" y="448" fill="#e08a70" font-family="'Source Sans 3', Arial, sans-serif" font-size="19">rice flour,</text>
  <text x="1302" y="476" fill="#e08a70" font-family="'Source Sans 3', Arial, sans-serif" font-size="19">sunflower oil.</text>

  <text x="924" y="614" fill="#cfe0d8" font-family="'Source Sans 3', Arial, sans-serif" font-size="19">Name signals a snack, not a single fruit</text>
  <text x="924" y="656" fill="#e08a70" font-family="'Source Sans 3', Arial, sans-serif" font-size="21" font-weight="700">Work out the fruit fraction first</text>
  <text x="924" y="692" fill="#a7c7bd" font-family="'Source Sans 3', Arial, sans-serif" font-size="18">Crisps · bites · snacks · flavored · blend</text>

  <rect x="132" y="756" width="1336" height="48" rx="18" fill="#203836"/>
  <text x="168" y="787" fill="#fffdf8" font-family="'Source Sans 3', Arial, sans-serif" font-size="20" font-weight="700">Read the front-panel name against the ingredient list. Mismatches show up in ten seconds.</text>
</svg>
