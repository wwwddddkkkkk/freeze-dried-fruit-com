<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">How combustible dust risk is managed in freeze-dried fruit powder handling</title>
  <desc id="desc">Diagram showing the five elements of a dust explosion — fuel, oxygen, ignition, dispersion, confinement — and the freeze-dried fruit process steps where each appears.</desc>
  <rect width="1600" height="900" fill="#f4efe6"/>
  <rect x="64" y="64" width="1472" height="772" rx="30" fill="#fcfaf5" stroke="#d4c7b1" stroke-width="2"/>
  <text x="112" y="138" fill="#24433d" font-family="'Source Sans 3', Arial, sans-serif" font-size="26" letter-spacing="5">TECHNOLOGY</text>
  <text x="112" y="194" fill="#172f2b" font-family="'DM Serif Display', Georgia, serif" font-size="48">Five Things Have to Line Up for Powder to Explode</text>
  <text x="112" y="236" fill="#5f716d" font-family="'Source Serif 4', Georgia, serif" font-size="24">Break any one link — and the enclosed equipment is where all five meet.</text>

  <!-- Pentagon -->
  <g transform="translate(400,560)">
    <polygon points="0,-190 181,-59 112,155 -112,155 -181,-59" fill="#f1ebdf" stroke="#294643" stroke-width="2.5"/>
    <text x="0" y="-150" text-anchor="middle" fill="#17312f" font-family="'Source Sans 3', Arial, sans-serif" font-size="24" font-weight="700">FUEL</text>
    <text x="0" y="-124" text-anchor="middle" fill="#5f716d" font-family="'Source Sans 3', Arial, sans-serif" font-size="16">fruit powder</text>
    <text x="150" y="-46" text-anchor="middle" fill="#17312f" font-family="'Source Sans 3', Arial, sans-serif" font-size="24" font-weight="700">OXYGEN</text>
    <text x="150" y="-20" text-anchor="middle" fill="#5f716d" font-family="'Source Sans 3', Arial, sans-serif" font-size="16">ambient air</text>
    <text x="86" y="130" text-anchor="middle" fill="#8d5c18" font-family="'Source Sans 3', Arial, sans-serif" font-size="24" font-weight="700">IGNITION</text>
    <text x="86" y="156" text-anchor="middle" fill="#5f716d" font-family="'Source Sans 3', Arial, sans-serif" font-size="16">spark · static · heat</text>
    <text x="-86" y="130" text-anchor="middle" fill="#8d5c18" font-family="'Source Sans 3', Arial, sans-serif" font-size="24" font-weight="700">DISPERSION</text>
    <text x="-86" y="156" text-anchor="middle" fill="#5f716d" font-family="'Source Sans 3', Arial, sans-serif" font-size="16">airborne cloud</text>
    <text x="-150" y="-46" text-anchor="middle" fill="#8d5c18" font-family="'Source Sans 3', Arial, sans-serif" font-size="24" font-weight="700">CONFINE-</text>
    <text x="-150" y="-22" text-anchor="middle" fill="#8d5c18" font-family="'Source Sans 3', Arial, sans-serif" font-size="24" font-weight="700">MENT</text>
    <text x="-150" y="4" text-anchor="middle" fill="#5f716d" font-family="'Source Sans 3', Arial, sans-serif" font-size="16">sealed vessel</text>
    <circle cx="0" cy="0" r="30" fill="#b6412f"/>
    <text x="0" y="8" text-anchor="middle" fill="#fff" font-family="'Source Sans 3', Arial, sans-serif" font-size="18" font-weight="700">BOOM</text>
  </g>

  <!-- Process map / controls -->
  <rect x="770" y="300" width="726" height="470" rx="24" fill="#17312f"/>
  <text x="806" y="352" fill="#f7f0e4" font-family="'Source Sans 3', Arial, sans-serif" font-size="22" letter-spacing="3">WHERE IT APPEARS &amp; HOW IT IS CONTROLLED</text>

  <text x="806" y="410" fill="#ffd9a0" font-family="'Source Sans 3', Arial, sans-serif" font-size="21" font-weight="700">Mill &amp; sieve</text>
  <text x="806" y="438" fill="#e7ece8" font-family="'Source Sans 3', Arial, sans-serif" font-size="18">Fine particles + friction + tramp metal →</text>
  <text x="806" y="462" fill="#e7ece8" font-family="'Source Sans 3', Arial, sans-serif" font-size="18">magnets, bonding, spark control.</text>

  <text x="806" y="512" fill="#ffd9a0" font-family="'Source Sans 3', Arial, sans-serif" font-size="21" font-weight="700">Pneumatic transfer</text>
  <text x="806" y="540" fill="#e7ece8" font-family="'Source Sans 3', Arial, sans-serif" font-size="18">Dry powder builds static →</text>
  <text x="806" y="564" fill="#e7ece8" font-family="'Source Sans 3', Arial, sans-serif" font-size="18">grounded, conductive lines.</text>

  <text x="806" y="614" fill="#ffd9a0" font-family="'Source Sans 3', Arial, sans-serif" font-size="21" font-weight="700">Dust collector</text>
  <text x="806" y="642" fill="#e7ece8" font-family="'Source Sans 3', Arial, sans-serif" font-size="18">Cloud + confinement by design →</text>
  <text x="806" y="666" fill="#e7ece8" font-family="'Source Sans 3', Arial, sans-serif" font-size="18">explosion venting + isolation.</text>

  <text x="806" y="716" fill="#ffd9a0" font-family="'Source Sans 3', Arial, sans-serif" font-size="21" font-weight="700">Open room</text>
  <text x="806" y="744" fill="#e7ece8" font-family="'Source Sans 3', Arial, sans-serif" font-size="18">Housekeeping stops settled-dust →</text>
  <text x="1240" y="744" fill="#e7ece8" font-family="'Source Sans 3', Arial, sans-serif" font-size="18">secondary events.</text>

  <rect x="104" y="792" width="1392" height="12" rx="6" fill="#203836"/>
</svg>
