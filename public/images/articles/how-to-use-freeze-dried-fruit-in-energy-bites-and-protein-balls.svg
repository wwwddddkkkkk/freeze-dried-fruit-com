<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">How to use freeze-dried fruit in energy bites and protein balls</title>
  <desc id="desc">Application diagram showing a snack-ball base, fruit powder and fruit pieces, mixing order, and the resulting energy-bite textures.</desc>
  <rect width="1600" height="900" fill="#f4efe6"/>
  <rect x="64" y="64" width="1472" height="772" rx="30" fill="#fcfaf5" stroke="#d4c7b1" stroke-width="2"/>
  <text x="112" y="138" fill="#24433d" font-family="'Source Sans 3', Arial, sans-serif" font-size="26" letter-spacing="5">APPLICATIONS</text>
  <text x="112" y="194" fill="#172f2b" font-family="'DM Serif Display', Georgia, serif" font-size="52">Let the Base Carry the Structure and the Fruit Carry the Brightness</text>
  <text x="112" y="236" fill="#5f716d" font-family="'Source Serif 4', Georgia, serif" font-size="24">Energy bites work best when the binder comes together first and the fruit still stays visible in the final bite.</text>

  <rect x="106" y="286" width="656" height="458" rx="24" fill="#f1ebdf" stroke="#294643" stroke-width="2"/>
  <text x="144" y="334" fill="#294643" font-family="'Source Sans 3', Arial, sans-serif" font-size="24" letter-spacing="4">MIXING ORDER</text>

  <circle cx="252" cy="514" r="82" fill="#d6b27a"/>
  <circle cx="420" cy="514" r="82" fill="#d6b27a"/>
  <circle cx="588" cy="514" r="82" fill="#d6b27a"/>
  <text x="204" y="522" fill="#17312f" font-family="'Source Sans 3', Arial, sans-serif" font-size="22">base</text>
  <text x="382" y="522" fill="#17312f" font-family="'Source Sans 3', Arial, sans-serif" font-size="22">powder</text>
  <text x="554" y="522" fill="#17312f" font-family="'Source Sans 3', Arial, sans-serif" font-size="22">pieces</text>

  <line x1="314" y1="514" x2="356" y2="514" stroke="#17312f" stroke-width="8" stroke-linecap="round"/>
  <line x1="482" y1="514" x2="524" y2="514" stroke="#17312f" stroke-width="8" stroke-linecap="round"/>
  <polygon points="352,496 382,514 352,532" fill="#17312f"/>
  <polygon points="520,496 550,514 520,532" fill="#17312f"/>

  <text x="170" y="642" fill="#465b57" font-family="'Source Sans 3', Arial, sans-serif" font-size="20">1. Build the sticky oat-and-nut base first</text>
  <text x="170" y="674" fill="#465b57" font-family="'Source Sans 3', Arial, sans-serif" font-size="20">2. Add powder for all-over flavor and color</text>
  <text x="170" y="706" fill="#465b57" font-family="'Source Sans 3', Arial, sans-serif" font-size="20">3. Fold in small fruit pieces at the end</text>

  <rect x="808" y="286" width="684" height="458" rx="24" fill="#17312f"/>
  <text x="844" y="334" fill="#f7f0e4" font-family="'Source Sans 3', Arial, sans-serif" font-size="24" letter-spacing="4">FORMAT ROLES</text>
  <text x="844" y="386" fill="#ffffff" font-family="'DM Serif Display', Georgia, serif" font-size="34">Powder spreads. Pieces announce themselves.</text>

  <rect x="846" y="430" width="290" height="228" rx="20" fill="#fcfaf6"/>
  <rect x="1164" y="430" width="290" height="228" rx="20" fill="#fcfaf6"/>
  <text x="936" y="464" fill="#4f625f" font-family="'Source Sans 3', Arial, sans-serif" font-size="20">fruit powder</text>
  <text x="1254" y="464" fill="#4f625f" font-family="'Source Sans 3', Arial, sans-serif" font-size="20">fruit pieces</text>

  <circle cx="990" cy="548" r="72" fill="#d7746a"/>
  <circle cx="990" cy="548" r="42" fill="#cb6258" opacity="0.55"/>
  <text x="888" y="628" fill="#102725" font-family="'Source Sans 3', Arial, sans-serif" font-size="19">all-over berry note</text>
  <text x="888" y="654" fill="#102725" font-family="'Source Sans 3', Arial, sans-serif" font-size="19">even color and flavor</text>

  <circle cx="1308" cy="548" r="72" fill="#d6b27a"/>
  <circle cx="1278" cy="528" r="14" fill="#d7746a"/>
  <circle cx="1334" cy="520" r="12" fill="#7b4f8e"/>
  <circle cx="1318" cy="572" r="13" fill="#e0b05f"/>
  <circle cx="1274" cy="578" r="11" fill="#d7746a"/>
  <text x="1206" y="628" fill="#102725" font-family="'Source Sans 3', Arial, sans-serif" font-size="19">visible pops in the bite</text>
  <text x="1206" y="654" fill="#102725" font-family="'Source Sans 3', Arial, sans-serif" font-size="19">better identity and contrast</text>

  <rect x="106" y="770" width="1388" height="42" rx="16" fill="#203836"/>
  <text x="152" y="798" fill="#fffdf8" font-family="'Source Sans 3', Arial, sans-serif" font-size="20" font-weight="700">Useful rule: if the binder is wet enough to erase the fruit, the batch is wetter than it needs to be.</text>
</svg>
