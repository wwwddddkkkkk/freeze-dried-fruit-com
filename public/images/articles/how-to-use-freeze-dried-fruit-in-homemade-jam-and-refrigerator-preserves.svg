<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">How to use freeze-dried fruit in homemade jam and refrigerator preserves</title>
  <desc id="desc">A four-step diagram: crush freeze-dried fruit to powder, hydrate with warm liquid into a paste, set with pectin or chia, and store as a chilled refrigerator jam with a short shelf life.</desc>
  <rect width="1200" height="680" fill="#f6f4ee"/>
  <rect x="74" y="72" width="1052" height="536" rx="34" fill="#fffdf8" stroke="#d8d2c3" stroke-width="2"/>
  <text x="112" y="128" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="33" font-weight="700">Jam without the boil-down</text>
  <text x="112" y="166" fill="#68736c" font-family="Inter, Arial, sans-serif" font-size="17">The water is already gone, so you rebuild the fruit instead of reducing it.</text>

  <!-- step 1 -->
  <g transform="translate(112 220)" font-family="Inter, Arial, sans-serif">
    <rect width="216" height="200" rx="20" fill="#f7f3ea" stroke="#d8d2c3"/>
    <text x="20" y="34" fill="#8a8578" font-size="13" font-weight="700" letter-spacing="1.5">STEP 1</text>
    <text x="20" y="60" fill="#1f332d" font-size="18" font-weight="700">Crush to powder</text>
    <circle cx="60" cy="120" r="26" fill="#d9534f" stroke="#a83b38" stroke-width="2"/>
    <path d="M104 120 h30 M134 120 l-9 -6 v12 z" fill="#bdb4a1" stroke="#bdb4a1" stroke-width="2"/>
    <rect x="146" y="104" width="48" height="32" rx="6" fill="#e79c99"/>
    <circle cx="158" cy="120" r="3" fill="#a83b38"/>
    <circle cx="172" cy="114" r="3" fill="#a83b38"/>
    <circle cx="184" cy="124" r="3" fill="#a83b38"/>
    <text x="20" y="176" fill="#68736c" font-size="13">Fine powder = smooth jam</text>
  </g>

  <!-- step 2 -->
  <g transform="translate(348 220)" font-family="Inter, Arial, sans-serif">
    <rect width="216" height="200" rx="20" fill="#f7f3ea" stroke="#d8d2c3"/>
    <text x="20" y="34" fill="#8a8578" font-size="13" font-weight="700" letter-spacing="1.5">STEP 2</text>
    <text x="20" y="60" fill="#1f332d" font-size="18" font-weight="700">Hydrate slowly</text>
    <path d="M96 92 q-14 26 0 34 q14 -8 0 -34z" fill="#9bb0e0"/>
    <rect x="60" y="126" width="96" height="34" rx="8" fill="#c8534f"/>
    <path d="M108 100 q-16 30 0 40 q16 -10 0 -40z" fill="#9bb0e0"/>
    <text x="20" y="176" fill="#68736c" font-size="13">Warm liquid, a bit at a time</text>
  </g>

  <!-- step 3 -->
  <g transform="translate(584 220)" font-family="Inter, Arial, sans-serif">
    <rect width="216" height="200" rx="20" fill="#f7f3ea" stroke="#d8d2c3"/>
    <text x="20" y="34" fill="#8a8578" font-size="13" font-weight="700" letter-spacing="1.5">STEP 3</text>
    <text x="20" y="60" fill="#1f332d" font-size="18" font-weight="700">Set the texture</text>
    <text x="20" y="98" fill="#37477e" font-size="14" font-weight="600">&#8226; pectin &rarr; classic gel</text>
    <text x="20" y="124" fill="#2f6b53" font-size="14" font-weight="600">&#8226; chia &rarr; rustic set</text>
    <text x="20" y="150" fill="#8a6a3a" font-size="14" font-weight="600">&#8226; none &rarr; fruit butter</text>
  </g>

  <!-- step 4 -->
  <g transform="translate(820 220)" font-family="Inter, Arial, sans-serif">
    <rect width="216" height="200" rx="20" fill="#eef2fb" stroke="#9bb0e0" stroke-width="2"/>
    <text x="20" y="34" fill="#37477e" font-size="13" font-weight="700" letter-spacing="1.5">STEP 4</text>
    <text x="20" y="60" fill="#1f332d" font-size="18" font-weight="700">Chill &#38; use</text>
    <rect x="66" y="82" width="84" height="76" rx="10" fill="#fffdf8" stroke="#9bb0e0" stroke-width="2"/>
    <rect x="66" y="104" width="84" height="54" rx="0" fill="#d9534f"/>
    <rect x="78" y="72" width="60" height="16" rx="4" fill="#9bb0e0"/>
    <text x="20" y="182" fill="#37477e" font-size="13">Refrigerator jam &#183; days, not months</text>
  </g>

  <!-- safety strip -->
  <g transform="translate(112 452)">
    <rect width="924" height="120" rx="22" fill="#faf1ea" stroke="#e0b48f"/>
    <text x="28" y="44" fill="#a05a2c" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Adding water back changes the rules</text>
    <text x="28" y="76" fill="#8a6a3a" font-family="Inter, Arial, sans-serif" font-size="15">Rehydrated jam spoils like fresh food. Keep it chilled; it is not shelf-stable</text>
    <text x="28" y="100" fill="#8a6a3a" font-family="Inter, Arial, sans-serif" font-size="15">unless you follow a tested canning and acidification process.</text>
  </g>
</svg>
