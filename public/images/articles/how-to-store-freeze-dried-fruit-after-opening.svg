<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">How to store freeze-dried fruit after opening</title>
  <desc id="desc">An editorial storage diagram showing a resealed pouch, airtight jar, and humidity warning.</desc>
  <rect width="1200" height="680" fill="#f7f2e8"/>
  <rect x="76" y="70" width="1048" height="540" rx="36" fill="#fffdf8" stroke="#d8d0bf" stroke-width="2"/>
  <text x="116" y="128" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700">After opening, protect the crunch</text>
  <text x="116" y="166" fill="#69736d" font-family="Inter, Arial, sans-serif" font-size="17">Humidity is the main storage problem for freeze-dried fruit.</text>

  <g transform="translate(120 232)">
    <rect x="0" y="0" width="280" height="286" rx="28" fill="#eef7f2" stroke="#bdd4c8"/>
    <path d="M80 50h120l34 196H46L80 50Z" fill="#fffdf8" stroke="#1f332d" stroke-width="3" stroke-linejoin="round"/>
    <path d="M80 50h120l-18 52H98L80 50Z" fill="#d8eee3" stroke="#1f332d" stroke-width="3" stroke-linejoin="round"/>
    <path d="M82 124h116" stroke="#83aa97" stroke-width="5" stroke-linecap="round"/>
    <circle cx="104" cy="178" r="17" fill="#cf6f5d"/>
    <circle cx="148" cy="200" r="15" fill="#e5a65d"/>
    <circle cx="186" cy="170" r="18" fill="#c9a15e"/>
    <text x="58" y="264" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700">Reseal quickly</text>
  </g>

  <g transform="translate(460 232)">
    <rect x="0" y="0" width="280" height="286" rx="28" fill="#f4efe5" stroke="#d8d0bf"/>
    <rect x="78" y="58" width="124" height="166" rx="18" fill="#fffdf8" stroke="#1f332d" stroke-width="3"/>
    <rect x="90" y="38" width="100" height="34" rx="10" fill="#d9c7a9" stroke="#1f332d" stroke-width="3"/>
    <circle cx="118" cy="138" r="15" fill="#d06f5d"/>
    <circle cx="154" cy="170" r="18" fill="#e5a65d"/>
    <circle cx="172" cy="122" r="14" fill="#c9a15e"/>
    <text x="54" y="264" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700">Use airtight storage</text>
  </g>

  <g transform="translate(800 232)">
    <rect x="0" y="0" width="280" height="286" rx="28" fill="#fff7ea" stroke="#dfcdae"/>
    <path d="M140 62c42 58 64 100 64 126 0 36-28 62-64 62s-64-26-64-62c0-26 22-68 64-126Z" fill="#f3d8ad" stroke="#b98b5b" stroke-width="3"/>
    <path d="M102 116l76 76" stroke="#9b4f46" stroke-width="8" stroke-linecap="round"/>
    <path d="M178 116l-76 76" stroke="#9b4f46" stroke-width="8" stroke-linecap="round"/>
    <text x="54" y="264" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700">Avoid humid air</text>
  </g>

  <g transform="translate(174 548)">
    <rect width="852" height="36" rx="18" fill="#1f332d"/>
    <text x="28" y="24" fill="#fffdf8" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">Best habit: open, portion, reseal, and keep away from steam, sun, and damp cabinets.</text>
  </g>
</svg>
