<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">How to compare freeze-dried fruit by price per gram of actual fruit</title>
  <desc id="desc">Two bags at the same shelf price break down by net weight and non-fruit content into different price per gram of actual fruit.</desc>
  <rect width="1200" height="680" fill="#f6f4ee"/>
  <rect x="70" y="70" width="1060" height="540" rx="34" fill="#fffdf8" stroke="#d8d2c3" stroke-width="2"/>

  <text x="110" y="126" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="33" font-weight="700">Same shelf price, different price per gram of fruit</text>
  <text x="110" y="162" fill="#68736c" font-family="Inter, Arial, sans-serif" font-size="17">Net weight minus sugar and filler is the number that matters.</text>

  <!-- Bag A -->
  <g transform="translate(150 210)" font-family="Inter, Arial, sans-serif">
    <rect width="380" height="330" rx="22" fill="#f4f0e5" stroke="#d8d2c3"/>
    <text x="24" y="44" fill="#1f332d" font-size="20" font-weight="700">Bag A — $10.00</text>
    <text x="24" y="72" fill="#5f6a63" font-size="15">Net weight 40 g · 100% fruit</text>

    <!-- composition bar -->
    <text x="24" y="116" fill="#5f6a63" font-size="13">what you pay for</text>
    <rect x="24" y="128" width="332" height="40" rx="8" fill="#5a7d56"/>
    <text x="190" y="154" text-anchor="middle" fill="#f6f4ee" font-size="15" font-weight="700">fruit 40 g</text>

    <line x1="24" y1="210" x2="356" y2="210" stroke="#d8d2c3"/>
    <text x="24" y="246" fill="#1f332d" font-size="15">grams of fruit</text>
    <text x="356" y="246" text-anchor="end" fill="#1f332d" font-size="15" font-weight="700">40 g</text>
    <text x="24" y="282" fill="#1f332d" font-size="18" font-weight="700">price / g of fruit</text>
    <rect x="232" y="262" width="124" height="34" rx="8" fill="#1f332d"/>
    <text x="294" y="285" text-anchor="middle" fill="#f6f4ee" font-size="16" font-weight="700">$0.25</text>
  </g>

  <!-- Bag B -->
  <g transform="translate(660 210)" font-family="Inter, Arial, sans-serif">
    <rect width="380" height="330" rx="22" fill="#f4f0e5" stroke="#d8d2c3"/>
    <text x="24" y="44" fill="#1f332d" font-size="20" font-weight="700">Bag B — $10.00</text>
    <text x="24" y="72" fill="#5f6a63" font-size="15">Net weight 50 g · 30% added sugar</text>

    <text x="24" y="116" fill="#5f6a63" font-size="13">what you pay for</text>
    <rect x="24" y="128" width="332" height="40" rx="8" fill="#b45f42"/>
    <rect x="24" y="128" width="232" height="40" rx="8" fill="#5a7d56"/>
    <text x="140" y="154" text-anchor="middle" fill="#f6f4ee" font-size="15" font-weight="700">fruit 35 g</text>
    <text x="306" y="154" text-anchor="middle" fill="#f6f4ee" font-size="13" font-weight="700">sugar 15</text>

    <line x1="24" y1="210" x2="356" y2="210" stroke="#d8d2c3"/>
    <text x="24" y="246" fill="#1f332d" font-size="15">grams of fruit</text>
    <text x="356" y="246" text-anchor="end" fill="#1f332d" font-size="15" font-weight="700">35 g</text>
    <text x="24" y="282" fill="#1f332d" font-size="18" font-weight="700">price / g of fruit</text>
    <rect x="232" y="262" width="124" height="34" rx="8" fill="#b45f42"/>
    <text x="294" y="285" text-anchor="middle" fill="#f6f4ee" font-size="16" font-weight="700">$0.29</text>
  </g>

  <text x="150" y="582" fill="#68736c" font-family="Inter, Arial, sans-serif" font-size="15">The bigger, heavier bag is not the better fruit value once sugar is subtracted.</text>
</svg>
