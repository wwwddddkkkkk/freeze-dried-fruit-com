<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">When nitrogen flushing helps freeze-dried fruit and when it doesn't</title>
  <desc id="desc">Technical packaging diagram showing nitrogen replacing oxygen in pouch headspace while moisture, seals, and barrier film still control texture stability.</desc>
  <rect width="1200" height="680" fill="#f6f4ee"/>
  <rect x="74" y="72" width="1052" height="536" rx="34" fill="#fffdf8" stroke="#d8d2c3" stroke-width="2"/>
  <text x="112" y="128" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="33" font-weight="700">Nitrogen helps the headspace, not the whole system</text>
  <text x="112" y="166" fill="#68736c" font-family="Inter, Arial, sans-serif" font-size="17">Useful for oxygen control, limited against weak film, soft endpoint, or humid reuse.</text>

  <g transform="translate(118 214)">
    <rect width="408" height="300" rx="28" fill="#edf4f7" stroke="#c8d8de"/>
    <text x="26" y="42" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Inside the pouch</text>
    <path d="M112 92 h184 a34 34 0 0 1 34 34 v118 a34 34 0 0 1 -34 34 h-184 a34 34 0 0 1 -34 -34 v-118 a34 34 0 0 1 34 -34 z" fill="#fffdf8" stroke="#9fb3bf" stroke-width="3"/>
    <rect x="104" y="154" width="200" height="84" rx="24" fill="#f6d8b9" stroke="#d9b186"/>
    <circle cx="140" cy="132" r="16" fill="#d3e7f1"/>
    <circle cx="190" cy="126" r="14" fill="#d3e7f1"/>
    <circle cx="244" cy="130" r="18" fill="#d3e7f1"/>
    <circle cx="294" cy="128" r="12" fill="#d3e7f1"/>
    <text x="142" y="204" fill="#7b5838" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">freeze-dried fruit</text>
    <path d="M28 130 h58" stroke="#5d79c8" stroke-width="5" stroke-linecap="round"/>
    <polygon points="86,130 72,122 72,138" fill="#5d79c8"/>
    <text x="26" y="114" fill="#5d79c8" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">N2 flush</text>
    <text x="26" y="284" fill="#4d5d58" font-family="Inter, Arial, sans-serif" font-size="14">Reduces oxygen in headspace</text>
  </g>

  <g transform="translate(558 214)">
    <rect width="242" height="300" rx="28" fill="#eef3ea" stroke="#cbdac9"/>
    <text x="24" y="42" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">What it helps</text>
    <rect x="24" y="74" width="194" height="42" rx="18" fill="#cadccf"/>
    <text x="44" y="100" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="15">color retention support</text>
    <rect x="24" y="132" width="194" height="42" rx="18" fill="#d7e5d7"/>
    <text x="44" y="158" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="15">aroma fade reduction</text>
    <rect x="24" y="190" width="194" height="42" rx="18" fill="#e4eddc"/>
    <text x="44" y="216" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="15">premium pack presentation</text>
  </g>

  <g transform="translate(824 214)">
    <rect width="264" height="300" rx="28" fill="#f5eee9" stroke="#dbcdbf"/>
    <text x="24" y="42" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">What it cannot fix</text>
    <text x="24" y="92" fill="#6a5744" font-family="Inter, Arial, sans-serif" font-size="15">weak moisture barrier</text>
    <line x1="24" y1="106" x2="216" y2="106" stroke="#d7c3ae"/>
    <text x="24" y="144" fill="#6a5744" font-family="Inter, Arial, sans-serif" font-size="15">soft drying endpoint</text>
    <line x1="24" y1="158" x2="216" y2="158" stroke="#d7c3ae"/>
    <text x="24" y="196" fill="#6a5744" font-family="Inter, Arial, sans-serif" font-size="15">poor seal or zipper</text>
    <line x1="24" y1="210" x2="216" y2="210" stroke="#d7c3ae"/>
    <text x="24" y="248" fill="#6a5744" font-family="Inter, Arial, sans-serif" font-size="15">humid air after opening</text>
  </g>

  <g transform="translate(112 538)">
    <rect width="976" height="34" rx="17" fill="#1f332d"/>
    <text x="28" y="23" fill="#fffdf8" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">Packaging rule: use nitrogen after the drying endpoint, barrier film, and seal logic already make sense.</text>
  </g>
</svg>
