<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">How to use freeze-dried fruit in kombucha, water kefir, and fermented sodas</title>
  <desc id="desc">A field-guide diagram of the fermentation flow: first ferment builds the base, freeze-dried fruit is added at the second ferment for flavor and carbonation, then bottles are refrigerated.</desc>
  <rect width="1200" height="680" fill="#f7f2e8"/>
  <rect x="76" y="72" width="1048" height="536" rx="34" fill="#fffdf8" stroke="#d8d0bf" stroke-width="2"/>
  <text x="116" y="128" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="33" font-weight="700">Add freeze-dried fruit at the second ferment</text>
  <text x="116" y="166" fill="#69736d" font-family="Inter, Arial, sans-serif" font-size="17">Concentrated flavor and fermentable sugar — with no extra water to dilute the brew.</text>

  <!-- Stage 1 -->
  <g transform="translate(122 234)">
    <rect width="270" height="320" rx="24" fill="#f7f3ea" stroke="#d8d0bf"/>
    <text x="24" y="44" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">1 · First ferment</text>
    <text x="24" y="70" fill="#65736c" font-family="Inter, Arial, sans-serif" font-size="13">no fruit — culture builds the base</text>
    <!-- jar -->
    <rect x="86" y="110" width="98" height="150" rx="12" fill="#e7e0d0" stroke="#b9b19f"/>
    <rect x="86" y="170" width="98" height="90" rx="0" fill="#d9c68f" opacity="0.7"/>
    <ellipse cx="135" cy="130" rx="34" ry="10" fill="#c8b98a"/>
    <text x="60" y="292" fill="#65736c" font-family="Inter, Arial, sans-serif" font-size="13">sugar → light, sour base</text>
  </g>

  <!-- arrow -->
  <g transform="translate(410 394)"><line x1="0" y1="0" x2="52" y2="0" stroke="#b9b19f" stroke-width="3"/><path d="M52 0 l-13 -7 v14 z" fill="#b9b19f"/></g>

  <!-- Stage 2 -->
  <g transform="translate(478 234)">
    <rect width="270" height="320" rx="24" fill="#f7f3ea" stroke="#cf6f5d" stroke-width="2"/>
    <text x="24" y="44" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">2 · Second ferment</text>
    <text x="24" y="70" fill="#b25640" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700">+ freeze-dried fruit here</text>
    <!-- bottle -->
    <rect x="104" y="118" width="60" height="130" rx="12" fill="#e7e0d0" stroke="#b9b19f"/>
    <rect x="120" y="96" width="28" height="30" rx="6" fill="#c8b98a"/>
    <circle cx="120" cy="180" r="7" fill="#cf6f5d"/>
    <circle cx="146" cy="205" r="6" fill="#cf6f5d"/>
    <circle cx="128" cy="222" r="5" fill="#cf6f5d"/>
    <!-- fizz bubbles -->
    <circle cx="134" cy="150" r="3" fill="#fffdf8"/>
    <circle cx="144" cy="165" r="2.5" fill="#fffdf8"/>
    <circle cx="126" cy="140" r="2" fill="#fffdf8"/>
    <text x="40" y="292" fill="#65736c" font-family="Inter, Arial, sans-serif" font-size="13">flavor + carbonation build</text>
  </g>

  <!-- arrow -->
  <g transform="translate(766 394)"><line x1="0" y1="0" x2="52" y2="0" stroke="#b9b19f" stroke-width="3"/><path d="M52 0 l-13 -7 v14 z" fill="#b9b19f"/></g>

  <!-- Stage 3 -->
  <g transform="translate(834 234)">
    <rect width="244" height="320" rx="24" fill="#f7f3ea" stroke="#d8d0bf"/>
    <text x="24" y="44" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">3 · Chill</text>
    <text x="24" y="70" fill="#65736c" font-family="Inter, Arial, sans-serif" font-size="13">set the fizz, slow fermentation</text>
    <!-- gauge -->
    <path d="M62 210 A72 72 0 0 1 182 210" fill="none" stroke="#d8d0bf" stroke-width="12"/>
    <path d="M62 210 A72 72 0 0 1 128 146" fill="none" stroke="#3f6f5c" stroke-width="12"/>
    <line x1="122" y1="210" x2="150" y2="164" stroke="#1f332d" stroke-width="4" stroke-linecap="round"/>
    <circle cx="122" cy="210" r="7" fill="#1f332d"/>
    <text x="46" y="262" fill="#65736c" font-family="Inter, Arial, sans-serif" font-size="13">watch pressure — sugar</text>
    <text x="46" y="280" fill="#65736c" font-family="Inter, Arial, sans-serif" font-size="13">releases fast</text>
  </g>
</svg>
