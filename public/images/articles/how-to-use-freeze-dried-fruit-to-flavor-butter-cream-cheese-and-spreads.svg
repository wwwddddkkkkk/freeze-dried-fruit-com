<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Using freeze-dried fruit to flavor butter, cream cheese, and spreads</title>
  <desc id="desc">A four-step diagram showing freeze-dried fruit crushed to powder, folded into a soft base, rested to hydrate, then spread, with a side panel matching tart and sweet fruits to spread types.</desc>
  <rect width="1600" height="900" fill="#f4efe6"/>
  <rect x="64" y="64" width="1472" height="772" rx="28" fill="#fffaf2" stroke="#ccbda1" stroke-width="2"/>
  <text x="112" y="136" fill="#3c3226" font-family="Georgia, 'Times New Roman', serif" font-size="34">Fruit Spreads Without the Water</text>
  <text x="112" y="176" fill="#786956" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20">Dry fruit into a soft base: bright flavor and color, no puddle, no syrupy jam feel</text>

  <!-- step boxes -->
  <g font-family="'Helvetica Neue', Arial, sans-serif">
    <!-- step 1 -->
    <rect x="110" y="232" width="316" height="300" rx="20" fill="#fcf6ea" stroke="#d3c4a6"/>
    <circle cx="150" cy="272" r="20" fill="#c2354a"/>
    <text x="150" y="279" fill="#fff" font-size="20" text-anchor="middle">1</text>
    <text x="184" y="279" fill="#3c3226" font-family="Georgia, serif" font-size="23">Crush to powder</text>
    <rect x="150" y="312" width="236" height="120" rx="12" fill="#f7ead8" stroke="#d9c4a0"/>
    <circle cx="200" cy="360" r="14" fill="#c2354a"/>
    <circle cx="236" cy="372" r="12" fill="#cb5a63"/>
    <circle cx="270" cy="356" r="13" fill="#bb3f6f"/>
    <path d="M180 400 L356 400" stroke="#b08a5a" stroke-width="2" stroke-dasharray="5 6"/>
    <circle cx="320" cy="392" r="3" fill="#9a3a48"/><circle cx="334" cy="404" r="3" fill="#9a3a48"/><circle cx="348" cy="396" r="3" fill="#9a3a48"/>
    <text x="168" y="468" fill="#6c5d49" font-size="16">Fine = smooth + even color</text>
    <text x="168" y="492" fill="#6c5d49" font-size="16">Pieces = texture + bursts</text>
  </g>

  <!-- step 2 -->
  <rect x="446" y="232" width="316" height="300" rx="20" fill="#fcf6ea" stroke="#d3c4a6"/>
  <circle cx="486" cy="272" r="20" fill="#c2354a"/>
  <text x="486" y="279" fill="#fff" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20" text-anchor="middle">2</text>
  <text x="520" y="279" fill="#3c3226" font-family="Georgia, serif" font-size="23">Fold into soft base</text>
  <rect x="486" y="312" width="236" height="120" rx="12" fill="#f6efdc" stroke="#d9c4a0"/>
  <ellipse cx="604" cy="372" rx="86" ry="44" fill="#f3e6c4"/>
  <path d="M540 372 q64 -34 128 0" fill="none" stroke="#c98a8a" stroke-width="6"/>
  <text x="486" y="468" fill="#6c5d49" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16">Butter or cream cheese,</text>
  <text x="486" y="492" fill="#6c5d49" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16">at room temperature</text>

  <!-- step 3 -->
  <rect x="782" y="232" width="316" height="300" rx="20" fill="#fcf6ea" stroke="#d3c4a6"/>
  <circle cx="822" cy="272" r="20" fill="#c2354a"/>
  <text x="822" y="279" fill="#fff" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20" text-anchor="middle">3</text>
  <text x="856" y="279" fill="#3c3226" font-family="Georgia, serif" font-size="23">Rest, then taste</text>
  <circle cx="940" cy="378" r="58" fill="none" stroke="#b0935f" stroke-width="6"/>
  <line x1="940" y1="378" x2="940" y2="338" stroke="#b0935f" stroke-width="6" stroke-linecap="round"/>
  <line x1="940" y1="378" x2="968" y2="392" stroke="#b0935f" stroke-width="6" stroke-linecap="round"/>
  <text x="810" y="468" fill="#6c5d49" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16">Powder hydrates, color</text>
  <text x="810" y="492" fill="#6c5d49" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16">deepens, flavor rounds out</text>

  <!-- step 4 -->
  <rect x="1118" y="232" width="366" height="300" rx="20" fill="#fcf6ea" stroke="#d3c4a6"/>
  <circle cx="1158" cy="272" r="20" fill="#c2354a"/>
  <text x="1158" y="279" fill="#fff" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20" text-anchor="middle">4</text>
  <text x="1192" y="279" fill="#3c3226" font-family="Georgia, serif" font-size="23">Adjust + spread</text>
  <rect x="1150" y="330" width="300" height="40" rx="6" fill="#e7c98a"/>
  <path d="M1150 330 q150 -22 300 0" fill="#d98a8a" opacity="0.85"/>
  <text x="1150" y="430" fill="#6c5d49" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16">Add more only if needed.</text>
  <text x="1150" y="456" fill="#6c5d49" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16">Too much at once = dry,</text>
  <text x="1150" y="480" fill="#6c5d49" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16">grainy texture.</text>

  <!-- arrows between steps -->
  <g stroke="#c2a875" stroke-width="4" fill="none">
    <path d="M428 382 L444 382" marker-end="url(#ar)"/>
    <path d="M764 382 L780 382" marker-end="url(#ar)"/>
    <path d="M1100 382 L1116 382" marker-end="url(#ar)"/>
  </g>
  <defs><marker id="ar" markerWidth="10" markerHeight="10" refX="6" refY="5" orient="auto"><path d="M0 0 L8 5 L0 10 z" fill="#c2a875"/></marker></defs>

  <!-- match panel -->
  <rect x="110" y="560" width="1374" height="216" rx="20" fill="#f8efe0" stroke="#d3c4a6"/>
  <text x="140" y="604" fill="#3c3226" font-family="Georgia, 'Times New Roman', serif" font-size="26">Match the fruit to the spread</text>

  <rect x="140" y="624" width="430" height="124" rx="14" fill="#f7e2e2" stroke="#d8a6a6"/>
  <text x="162" y="660" fill="#9a3a48" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20">Tart — raspberry, strawberry, cherry</text>
  <text x="162" y="692" fill="#7a4048" font-family="'Helvetica Neue', Arial, sans-serif" font-size="17">Cut through rich butter + cream cheese</text>
  <text x="162" y="720" fill="#7a4048" font-family="'Helvetica Neue', Arial, sans-serif" font-size="17">Toast, dessert, savory bagel spreads</text>

  <rect x="586" y="624" width="430" height="124" rx="14" fill="#f7eccf" stroke="#d9c07a"/>
  <text x="608" y="660" fill="#8a6a1f" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20">Sweet — mango, banana, pineapple</text>
  <text x="608" y="692" fill="#7a6330" font-family="'Helvetica Neue', Arial, sans-serif" font-size="17">Soft, tropical, indulgent</text>
  <text x="608" y="720" fill="#7a6330" font-family="'Helvetica Neue', Arial, sans-serif" font-size="17">Dessert spreads, pancakes, fruit boards</text>

  <rect x="1032" y="624" width="430" height="124" rx="14" fill="#eef4ef" stroke="#bcd2c4"/>
  <text x="1054" y="660" fill="#235041" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20">Why dry fruit wins</text>
  <text x="1054" y="692" fill="#4e6a5d" font-family="'Helvetica Neue', Arial, sans-serif" font-size="17">No added water to thin or weep</text>
  <text x="1054" y="720" fill="#4e6a5d" font-family="'Helvetica Neue', Arial, sans-serif" font-size="17">Fresh taste, not cooked like jam</text>
</svg>
