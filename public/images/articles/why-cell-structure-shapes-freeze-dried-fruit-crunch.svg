<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Why Cell Structure Shapes Freeze-Dried Fruit Crunch</title>
  <desc id="desc">Technical board showing three freeze-dried fruit structure states, from open pore network to moisture-softened collapse, with callouts for cell walls, pore size, and crunch behavior.</desc>
  <rect width="1600" height="900" fill="#f4efe6"/>
  <rect x="64" y="64" width="1472" height="772" rx="30" fill="#fcfaf5" stroke="#d4c7b1" stroke-width="2"/>

  <text x="112" y="138" fill="#24433d" font-family="'Source Sans 3', Arial, sans-serif" font-size="26" letter-spacing="5">TECHNOLOGY</text>
  <text x="112" y="194" fill="#172f2b" font-family="'DM Serif Display', Georgia, serif" font-size="54">Crunch Starts with the Dried Structure</text>
  <text x="112" y="236" fill="#5f716d" font-family="'Source Serif 4', Georgia, serif" font-size="24">Cell walls and pore geometry decide whether the bite snaps, powders, or softens.</text>

  <rect x="104" y="286" width="890" height="456" rx="24" fill="#f3ece0" stroke="#294643" stroke-width="2"/>
  <text x="140" y="336" fill="#294643" font-family="'Source Sans 3', Arial, sans-serif" font-size="24" letter-spacing="4">STRUCTURE STATES</text>

  <g transform="translate(142 382)">
    <rect width="238" height="276" rx="18" fill="#fcfaf6" stroke="#c7bda8"/>
    <text x="28" y="40" fill="#294643" font-family="'Source Sans 3', Arial, sans-serif" font-size="20" letter-spacing="3">OPEN PORE</text>
    <circle cx="120" cy="144" r="78" fill="#efe1c6" stroke="#294643" stroke-width="3"/>
    <circle cx="82" cy="116" r="20" fill="#fcfaf6" stroke="#88b8aa" stroke-width="4"/>
    <circle cx="152" cy="120" r="24" fill="#fcfaf6" stroke="#88b8aa" stroke-width="4"/>
    <circle cx="100" cy="172" r="18" fill="#fcfaf6" stroke="#88b8aa" stroke-width="4"/>
    <circle cx="156" cy="178" r="16" fill="#fcfaf6" stroke="#88b8aa" stroke-width="4"/>
    <path d="M58 144c22-30 48-44 70-44 32 0 58 24 70 44" fill="none" stroke="#294643" stroke-width="3"/>
    <text x="28" y="236" fill="#465b57" font-family="'Source Sans 3', Arial, sans-serif" font-size="18">clean fracture</text>
    <text x="28" y="262" fill="#465b57" font-family="'Source Sans 3', Arial, sans-serif" font-size="18">airy bite</text>
  </g>

  <g transform="translate(430 382)">
    <rect width="238" height="276" rx="18" fill="#fcfaf6" stroke="#c7bda8"/>
    <text x="26" y="40" fill="#294643" font-family="'Source Sans 3', Arial, sans-serif" font-size="20" letter-spacing="3">FRAGILE PORE</text>
    <circle cx="120" cy="144" r="78" fill="#efd2a5" stroke="#294643" stroke-width="3"/>
    <ellipse cx="82" cy="118" rx="22" ry="16" fill="#fcfaf6" stroke="#e0b05f" stroke-width="4"/>
    <ellipse cx="154" cy="122" rx="28" ry="18" fill="#fcfaf6" stroke="#e0b05f" stroke-width="4"/>
    <ellipse cx="110" cy="174" rx="18" ry="14" fill="#fcfaf6" stroke="#e0b05f" stroke-width="4"/>
    <path d="M46 182l46-18 32 24 34-14 32 20" fill="none" stroke="#c77b62" stroke-width="4" stroke-linecap="round"/>
    <text x="26" y="236" fill="#465b57" font-family="'Source Sans 3', Arial, sans-serif" font-size="18">dusty break</text>
    <text x="26" y="262" fill="#465b57" font-family="'Source Sans 3', Arial, sans-serif" font-size="18">shipment-sensitive</text>
  </g>

  <g transform="translate(718 382)">
    <rect width="238" height="276" rx="18" fill="#fcfaf6" stroke="#c7bda8"/>
    <text x="24" y="40" fill="#294643" font-family="'Source Sans 3', Arial, sans-serif" font-size="20" letter-spacing="3">MOISTURE-SOFT</text>
    <circle cx="120" cy="144" r="78" fill="#e7bf91" stroke="#294643" stroke-width="3"/>
    <ellipse cx="86" cy="124" rx="18" ry="14" fill="#f3ece0" stroke="#c77b62" stroke-width="4"/>
    <ellipse cx="152" cy="128" rx="20" ry="15" fill="#f3ece0" stroke="#c77b62" stroke-width="4"/>
    <ellipse cx="118" cy="176" rx="28" ry="18" fill="#f3ece0" stroke="#c77b62" stroke-width="4"/>
    <path d="M54 114c20 46 50 76 98 102" fill="none" stroke="#88b8aa" stroke-width="5" stroke-linecap="round"/>
    <circle cx="60" cy="98" r="10" fill="#88b8aa"/>
    <circle cx="82" cy="88" r="8" fill="#88b8aa"/>
    <circle cx="102" cy="82" r="6" fill="#88b8aa"/>
    <text x="24" y="236" fill="#465b57" font-family="'Source Sans 3', Arial, sans-serif" font-size="18">leathery bite</text>
    <text x="24" y="262" fill="#465b57" font-family="'Source Sans 3', Arial, sans-serif" font-size="18">fast crunch loss</text>
  </g>

  <rect x="1036" y="286" width="456" height="456" rx="24" fill="#17312f"/>
  <text x="1074" y="336" fill="#f7f0e4" font-family="'Source Sans 3', Arial, sans-serif" font-size="24" letter-spacing="4">FIELD GUIDE</text>
  <text x="1074" y="392" fill="#ffffff" font-family="'DM Serif Display', Georgia, serif" font-size="34">What decides the bite</text>

  <rect x="1074" y="432" width="380" height="224" rx="20" fill="#fcfaf6"/>
  <text x="1104" y="476" fill="#4f625f" font-family="'Source Sans 3', Arial, sans-serif" font-size="20">1. freezing pattern</text>
  <text x="1104" y="516" fill="#4f625f" font-family="'Source Sans 3', Arial, sans-serif" font-size="20">2. fruit sugars and fiber</text>
  <text x="1104" y="556" fill="#4f625f" font-family="'Source Sans 3', Arial, sans-serif" font-size="20">3. piece geometry</text>
  <text x="1104" y="596" fill="#4f625f" font-family="'Source Sans 3', Arial, sans-serif" font-size="20">4. moisture pickup after drying</text>
  <text x="1104" y="636" fill="#4f625f" font-family="'Source Sans 3', Arial, sans-serif" font-size="20">5. pack and transit protection</text>

  <rect x="1074" y="682" width="380" height="28" rx="14" fill="#88b8aa"/>

  <rect x="104" y="768" width="1388" height="44" rx="16" fill="#203836"/>
  <text x="146" y="797" fill="#fffdf8" font-family="'Source Sans 3', Arial, sans-serif" font-size="20" font-weight="700">Useful rule: if the dried structure cannot hold a clean fracture, packaging can only protect a weak crunch promise.</text>
</svg>
