<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">How to pack freeze-dried fruit for travel without crushing it</title>
  <desc id="desc">Travel packing diagram showing portion cups, a rigid container, and a backpack layout that protects freeze-dried fruit from crushing and moisture.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f4eee2"/>
      <stop offset="100%" stop-color="#e6dcc8"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect x="72" y="70" width="1456" height="760" rx="30" fill="#fcfaf6" stroke="#1f3936" stroke-width="2.5"/>
  <text x="112" y="144" fill="#1f3936" font-family="'Source Sans 3', Arial, sans-serif" font-size="26" letter-spacing="5">APPLICATIONS</text>
  <text x="112" y="196" fill="#112a27" font-family="'DM Serif Display', Georgia, serif" font-size="54">How to Pack Freeze-Dried Fruit for Travel</text>
  <text x="112" y="236" fill="#526360" font-family="'Source Serif 4', Georgia, serif" font-size="24">Portion small. Keep dry. Pack high. Protect from pressure.</text>

  <rect x="112" y="300" width="580" height="420" rx="24" fill="#f3ece0" stroke="#254441" stroke-width="2"/>
  <text x="146" y="348" fill="#254441" font-family="'Source Sans 3', Arial, sans-serif" font-size="24" letter-spacing="4">BETTER PACKING SETUP</text>
  <rect x="160" y="390" width="118" height="118" rx="22" fill="#ffffff" stroke="#7fa39b" stroke-width="3"/>
  <circle cx="198" cy="444" r="14" fill="#d0565d"/>
  <circle cx="232" cy="432" r="14" fill="#f0b44a"/>
  <circle cx="240" cy="466" r="14" fill="#71489e"/>
  <rect x="302" y="390" width="154" height="118" rx="22" fill="#ffffff" stroke="#254441" stroke-width="3"/>
  <rect x="322" y="410" width="114" height="78" rx="16" fill="#cad7d2"/>
  <rect x="490" y="390" width="148" height="118" rx="22" fill="#ffffff" stroke="#7fa39b" stroke-width="3"/>
  <text x="188" y="540" fill="#4f625f" font-family="'Source Sans 3', Arial, sans-serif" font-size="22">Portion cups</text>
  <text x="324" y="540" fill="#4f625f" font-family="'Source Sans 3', Arial, sans-serif" font-size="22">Rigid tub</text>
  <text x="510" y="540" fill="#4f625f" font-family="'Source Sans 3', Arial, sans-serif" font-size="22">Backup serving</text>
  <text x="146" y="612" fill="#4f625f" font-family="'Source Sans 3', Arial, sans-serif" font-size="24">One occasion per container means less crushing and less repeated humidity exposure.</text>

  <rect x="760" y="300" width="660" height="420" rx="24" fill="#18312f"/>
  <text x="798" y="348" fill="#f7efe4" font-family="'Source Sans 3', Arial, sans-serif" font-size="24" letter-spacing="4">BACKPACK LAYOUT</text>
  <rect x="828" y="388" width="318" height="260" rx="28" fill="#fcfaf6"/>
  <rect x="852" y="412" width="270" height="70" rx="16" fill="#88b8aa"/>
  <text x="902" y="456" fill="#13302d" font-family="'Source Sans 3', Arial, sans-serif" font-size="27">Pack fruit high</text>
  <rect x="852" y="506" width="110" height="118" rx="18" fill="#c9d6d1"/>
  <text x="875" y="573" fill="#13302d" font-family="'Source Sans 3', Arial, sans-serif" font-size="23">Dry</text>
  <text x="866" y="600" fill="#13302d" font-family="'Source Sans 3', Arial, sans-serif" font-size="23">snack</text>
  <rect x="984" y="506" width="138" height="118" rx="18" fill="#e0b05f"/>
  <text x="1017" y="565" fill="#13302d" font-family="'Source Sans 3', Arial, sans-serif" font-size="23">Do not</text>
  <text x="1012" y="594" fill="#13302d" font-family="'Source Sans 3', Arial, sans-serif" font-size="23">stack here</text>
  <path d="M1200 416 l64 0 l0 40 l-64 0 z" fill="#c77b62"/>
  <text x="1216" y="444" fill="#ffffff" font-family="'Source Sans 3', Arial, sans-serif" font-size="21">Wet item</text>
  <path d="M1200 524 l82 0 l0 82 l-82 0 z" fill="#596a91"/>
  <text x="1211" y="566" fill="#ffffff" font-family="'Source Sans 3', Arial, sans-serif" font-size="22">Heavy</text>
  <text x="1209" y="594" fill="#ffffff" font-family="'Source Sans 3', Arial, sans-serif" font-size="22">gear</text>
  <line x1="1148" y1="448" x2="1190" y2="438" stroke="#f7efe4" stroke-width="3"/>
  <line x1="1122" y1="594" x2="1190" y2="568" stroke="#f7efe4" stroke-width="3"/>

  <text x="798" y="676" fill="#e7dfd2" font-family="'Source Sans 3', Arial, sans-serif" font-size="24">Avoid ice packs, damp foods, and bottom-of-bag compression.</text>
</svg>
