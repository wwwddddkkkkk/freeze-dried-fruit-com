<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">What unsweetened means on freeze-dried fruit labels</title>
  <desc id="desc">Annotated freeze-dried fruit label showing an unsweetened claim with separate checks for ingredient list, added sweeteners, acidity, and other formulation aids.</desc>
  <rect width="1600" height="900" fill="#f4f1e8"/>
  <rect x="72" y="72" width="1456" height="756" rx="28" fill="#fffaf1" stroke="#cabda2" stroke-width="2"/>
  <text x="116" y="138" fill="#3f3526" font-family="'Source Sans 3', Arial, sans-serif" font-size="24" letter-spacing="5">LABELS &amp; QUALITY</text>
  <text x="116" y="194" fill="#2f261b" font-family="'DM Serif Display', Georgia, serif" font-size="48">Unsweetened Answers One Question. The Bag Still Has Others.</text>
  <text x="116" y="234" fill="#7b6a56" font-family="'Source Serif 4', Georgia, serif" font-size="24">It tells you how the product is positioned on sweetening, not everything about quality or formulation.</text>

  <rect x="126" y="286" width="596" height="448" rx="28" fill="#fcf6ea" stroke="#d5c7a8"/>
  <text x="166" y="336" fill="#3f3526" font-family="'Source Sans 3', Arial, sans-serif" font-size="24" letter-spacing="4">FRONT OF PACK</text>
  <rect x="166" y="380" width="516" height="286" rx="24" fill="#fffdf8" stroke="#d5c7a8"/>
  <rect x="204" y="428" width="228" height="72" rx="18" fill="#17312f"/>
  <text x="248" y="474" fill="#f7f0e4" font-family="'DM Serif Display', Georgia, serif" font-size="34">UNSWEETENED</text>
  <text x="204" y="546" fill="#5c5040" font-family="'Source Sans 3', Arial, sans-serif" font-size="22">Helpful signal:</text>
  <text x="360" y="546" fill="#17312f" font-family="'Source Sans 3', Arial, sans-serif" font-size="22">not sold as a sweetened fruit snack</text>
  <text x="204" y="594" fill="#5c5040" font-family="'Source Sans 3', Arial, sans-serif" font-size="22">Not enough by itself:</text>
  <text x="432" y="594" fill="#17312f" font-family="'Source Sans 3', Arial, sans-serif" font-size="22">still read the ingredients</text>

  <rect x="792" y="286" width="626" height="448" rx="28" fill="#edf4ef" stroke="#c6d8ce"/>
  <text x="830" y="336" fill="#23433a" font-family="'Source Sans 3', Arial, sans-serif" font-size="24" letter-spacing="4">NEXT CHECKS</text>
  <circle cx="852" cy="402" r="16" fill="#88b8aa"/>
  <text x="884" y="410" fill="#23433a" font-family="'Source Sans 3', Arial, sans-serif" font-size="22">ingredient list still rules</text>
  <circle cx="852" cy="472" r="16" fill="#88b8aa"/>
  <text x="884" y="480" fill="#23433a" font-family="'Source Sans 3', Arial, sans-serif" font-size="22">tart fruit can still taste intense</text>
  <circle cx="852" cy="542" r="16" fill="#88b8aa"/>
  <text x="884" y="550" fill="#23433a" font-family="'Source Sans 3', Arial, sans-serif" font-size="22">acids and aids can still be present</text>
  <circle cx="852" cy="612" r="16" fill="#88b8aa"/>
  <text x="884" y="620" fill="#23433a" font-family="'Source Sans 3', Arial, sans-serif" font-size="22">unsweetened is not the same as premium</text>

  <rect x="830" y="654" width="548" height="46" rx="14" fill="#17312f"/>
  <text x="858" y="684" fill="#fffdf8" font-family="'Source Sans 3', Arial, sans-serif" font-size="20" font-weight="700">Read sequence: claim first, ingredient list second, fruit type third.</text>

  <rect x="126" y="766" width="1292" height="36" rx="12" fill="#efe5d2"/>
  <text x="160" y="790" fill="#5c5040" font-family="'Source Sans 3', Arial, sans-serif" font-size="20" font-weight="700">Best interpretation: unsweetened narrows the category, but it does not finish the quality read.</text>
</svg>
