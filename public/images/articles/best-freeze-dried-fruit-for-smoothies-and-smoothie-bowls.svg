<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">Best freeze-dried fruit for smoothies and smoothie bowls</title>
  <desc id="desc">A field-guide style comparison between freeze-dried fruit choices for drinkable smoothies and topped smoothie bowls.</desc>
  <rect width="1200" height="680" fill="#f7f2e8"/>
  <rect x="76" y="72" width="1048" height="536" rx="34" fill="#fffdf8" stroke="#d8d0bf" stroke-width="2"/>
  <text x="116" y="128" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="33" font-weight="700">Blend for coverage, top for contrast</text>
  <text x="116" y="166" fill="#69736d" font-family="Inter, Arial, sans-serif" font-size="17">Smoothies and smoothie bowls use many of the same fruits, but the winning formats are not always the same.</text>

  <g transform="translate(136 220)">
    <rect width="404" height="292" rx="26" fill="#f7f3ea" stroke="#d8d2c3"/>
    <text x="26" y="42" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="700">Drinkable smoothie</text>
    <path d="M170 74h68l22 34-18 134h-76l-18-134z" fill="#ead8b7" stroke="#c9b083" stroke-width="2"/>
    <rect x="186" y="92" width="36" height="118" rx="16" fill="#cf6f5d"/>
    <rect x="62" y="86" width="90" height="30" rx="15" fill="#cadccf"/>
    <text x="80" y="106" fill="#27453c" font-family="Inter, Arial, sans-serif" font-size="14">powder</text>
    <rect x="262" y="86" width="118" height="30" rx="15" fill="#dce7f3"/>
    <text x="284" y="106" fill="#34526a" font-family="Inter, Arial, sans-serif" font-size="14">small pieces</text>
    <text x="26" y="258" fill="#495852" font-family="Inter, Arial, sans-serif" font-size="14">Best when the fruit disappears evenly across the drink.</text>
  </g>

  <g transform="translate(660 220)">
    <rect width="404" height="292" rx="26" fill="#fffdf8" stroke="#d8d2c3" stroke-width="2"/>
    <text x="26" y="42" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="700">Smoothie bowl</text>
    <ellipse cx="204" cy="184" rx="138" ry="44" fill="#e6d8c5"/>
    <ellipse cx="204" cy="172" rx="138" ry="44" fill="#d36e87"/>
    <circle cx="152" cy="154" r="16" fill="#7b8db6"/>
    <circle cx="194" cy="190" r="18" fill="#cf6f5d"/>
    <circle cx="238" cy="154" r="16" fill="#e1a55c"/>
    <circle cx="274" cy="186" r="14" fill="#c45f7f"/>
    <text x="42" y="86" fill="#27453c" font-family="Inter, Arial, sans-serif" font-size="14">base fruit</text>
    <text x="288" y="86" fill="#7a3f35" font-family="Inter, Arial, sans-serif" font-size="14">top fruit</text>
    <path d="M120 94l26 44" stroke="#27453c" stroke-width="2" stroke-linecap="round"/>
    <path d="M320 94l-38 74" stroke="#7a3f35" stroke-width="2" stroke-linecap="round"/>
    <text x="26" y="258" fill="#495852" font-family="Inter, Arial, sans-serif" font-size="14">Best when blending and topping are treated as separate jobs.</text>
  </g>

  <g transform="translate(116 538)">
    <rect width="968" height="34" rx="17" fill="#1f332d"/>
    <text x="28" y="23" fill="#fffdf8" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">Practical rule: use powder or smaller fragments for the blender, then save the more visible pieces for the bowl surface.</text>
  </g>
</svg>
