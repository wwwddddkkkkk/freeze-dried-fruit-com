<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">What distributed by, manufactured for, and packed by mean on a freeze-dried fruit label</title>
  <desc id="desc">An annotated back panel of a freeze-dried fruit pouch highlights the firm-name statement, with three callouts explaining that manufactured by points to the maker, manufactured for or distributed by signals a brand owner, and packed by indicates a packer.</desc>
  <rect width="1600" height="900" fill="#f4efe6"/>
  <rect x="66" y="66" width="1468" height="768" rx="30" fill="#fcfaf5" stroke="#d4c7b1" stroke-width="2"/>
  <text x="112" y="140" fill="#24433d" font-family="'Source Sans 3', Arial, sans-serif" font-size="26" letter-spacing="5">LABELS &amp; QUALITY</text>
  <text x="112" y="194" fill="#172f2b" font-family="'DM Serif Display', Georgia, serif" font-size="46">Who Actually Made This Bag?</text>
  <text x="112" y="236" fill="#5f716d" font-family="'Source Serif 4', Georgia, serif" font-size="24">One regulated phrase on the firm line separates the maker from the marketer.</text>

  <!-- label back panel -->
  <rect x="120" y="300" width="520" height="470" rx="14" fill="#fffdf8" stroke="#17312f" stroke-width="2.5"/>
  <text x="150" y="346" fill="#17312f" font-family="'DM Serif Display', Georgia, serif" font-size="26">Nutrition Facts</text>
  <line x1="150" y1="358" x2="610" y2="358" stroke="#17312f" stroke-width="4"/>
  <g fill="#5f716d" font-family="'Source Sans 3', Arial, sans-serif" font-size="16">
    <text x="150" y="388">Serving size 1 bag (28g)</text>
    <text x="150" y="412">Calories 100</text>
  </g>
  <line x1="150" y1="426" x2="610" y2="426" stroke="#d4c7b1" stroke-width="1.5"/>
  <text x="150" y="456" fill="#5f716d" font-family="'Source Sans 3', Arial, sans-serif" font-size="15">INGREDIENTS: Freeze-dried strawberries.</text>

  <!-- highlighted firm statement -->
  <rect x="146" y="486" width="468" height="96" rx="8" fill="#f3e2c6" opacity="0.75" stroke="#e0b05f" stroke-width="2"/>
  <text x="166" y="520" fill="#172f2b" font-family="'JetBrains Mono', monospace" font-size="20" font-weight="700">Distributed by:</text>
  <text x="166" y="548" fill="#17312f" font-family="'Source Sans 3', Arial, sans-serif" font-size="18">Sunny Brands LLC</text>
  <text x="166" y="572" fill="#5f716d" font-family="'Source Sans 3', Arial, sans-serif" font-size="16">Portland, OR 97201</text>

  <text x="150" y="618" fill="#9c3f3b" font-family="'JetBrains Mono', monospace" font-size="15">LOT 26F12 · BEST BY 2028-06</text>
  <text x="150" y="700" fill="#5c5040" font-family="'Source Serif 4', Georgia, serif" font-size="16">The firm line is required —</text>
  <text x="150" y="724" fill="#5c5040" font-family="'Source Serif 4', Georgia, serif" font-size="16">but it need not name the actual maker.</text>

  <!-- connector -->
  <line x1="614" y1="534" x2="720" y2="534" stroke="#e0b05f" stroke-width="3" stroke-dasharray="6 5"/>

  <!-- callouts -->
  <rect x="720" y="316" width="740" height="138" rx="14" fill="#cfe0d8" opacity="0.55" stroke="#294643" stroke-width="2"/>
  <text x="748" y="356" fill="#1d4038" font-family="'DM Serif Display', Georgia, serif" font-size="28">"Manufactured by"</text>
  <text x="748" y="392" fill="#33514c" font-family="'Source Sans 3', Arial, sans-serif" font-size="20">No qualifier, or this phrase → the named firm</text>
  <text x="748" y="420" fill="#33514c" font-family="'Source Sans 3', Arial, sans-serif" font-size="20">actually made the product. Points to the maker.</text>

  <rect x="720" y="466" width="740" height="138" rx="14" fill="#f3e2c6" opacity="0.7" stroke="#b98f33" stroke-width="2"/>
  <text x="748" y="506" fill="#8a6a1f" font-family="'DM Serif Display', Georgia, serif" font-size="28">"Manufactured for" / "Distributed by"</text>
  <text x="748" y="542" fill="#7a5e23" font-family="'Source Sans 3', Arial, sans-serif" font-size="20">A brand owner that outsourced production to a</text>
  <text x="748" y="570" fill="#7a5e23" font-family="'Source Sans 3', Arial, sans-serif" font-size="20">co-manufacturer. Sells it; did not make it.</text>

  <rect x="720" y="616" width="740" height="138" rx="14" fill="#f0d3cf" opacity="0.6" stroke="#9c3f3b" stroke-width="2"/>
  <text x="748" y="656" fill="#9c3f3b" font-family="'DM Serif Display', Georgia, serif" font-size="28">"Packed by" / "Packed for"</text>
  <text x="748" y="692" fill="#7e3a37" font-family="'Source Sans 3', Arial, sans-serif" font-size="20">Handled packing — often a separate site from</text>
  <text x="748" y="720" fill="#7e3a37" font-family="'Source Sans 3', Arial, sans-serif" font-size="20">where the fruit was dried. Sits in between.</text>
</svg>
