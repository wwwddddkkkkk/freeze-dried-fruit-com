<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Why retained samples matter in freeze-dried fruit complaint investigations</title>
  <desc id="desc">Investigation diagram showing a retained sample connected to lot code, COA, pack record, and complaint sample for side-by-side freeze-dried fruit review.</desc>
  <rect width="1600" height="900" fill="#f5efe4"/>
  <rect x="72" y="70" width="1456" height="760" rx="30" fill="#fcfaf6" stroke="#203836" stroke-width="2.5"/>
  <text x="112" y="146" fill="#203836" font-family="'Source Sans 3', Arial, sans-serif" font-size="26" letter-spacing="5">INDUSTRY INSIGHTS</text>
  <text x="112" y="198" fill="#122826" font-family="'DM Serif Display', Georgia, serif" font-size="50">A Sealed Reference Makes Complaint Review Faster</text>
  <text x="112" y="238" fill="#516360" font-family="'Source Serif 4', Georgia, serif" font-size="24">Retained sample + lot code + release file is stronger than memory alone.</text>

  <rect x="108" y="286" width="480" height="456" rx="24" fill="#17312f"/>
  <text x="144" y="334" fill="#f7f0e4" font-family="'Source Sans 3', Arial, sans-serif" font-size="24" letter-spacing="4">RETAINED SAMPLE</text>
  <rect x="180" y="382" width="230" height="258" rx="26" fill="#fcfaf6"/>
  <rect x="210" y="418" width="170" height="148" rx="18" fill="#efe4d0" stroke="#d4c7b1"/>
  <text x="236" y="502" fill="#5c5040" font-family="'Source Sans 3', Arial, sans-serif" font-size="22">sealed pouch</text>
  <text x="214" y="610" fill="#d7e4df" font-family="'Source Sans 3', Arial, sans-serif" font-size="22">lot-matched, unopened, controlled</text>

  <rect x="436" y="406" width="112" height="62" rx="14" fill="#88b8aa"/>
  <text x="454" y="446" fill="#17312f" font-family="'Source Sans 3', Arial, sans-serif" font-size="20" font-weight="700">LOT CODE</text>
  <rect x="436" y="490" width="112" height="62" rx="14" fill="#e0b05f"/>
  <text x="466" y="530" fill="#17312f" font-family="'Source Sans 3', Arial, sans-serif" font-size="20" font-weight="700">COA</text>
  <rect x="436" y="574" width="112" height="62" rx="14" fill="#dce9e4"/>
  <text x="454" y="614" fill="#17312f" font-family="'Source Sans 3', Arial, sans-serif" font-size="20" font-weight="700">PACK FILE</text>

  <rect x="630" y="286" width="862" height="456" rx="24" fill="#f3ece0" stroke="#294643" stroke-width="2"/>
  <text x="668" y="334" fill="#294643" font-family="'Source Sans 3', Arial, sans-serif" font-size="24" letter-spacing="4">INVESTIGATION FLOW</text>

  <rect x="684" y="390" width="228" height="132" rx="22" fill="#ffffff" stroke="#d4c7b1"/>
  <text x="718" y="438" fill="#17312f" font-family="'DM Serif Display', Georgia, serif" font-size="30">Customer sample</text>
  <text x="718" y="476" fill="#5f716d" font-family="'Source Sans 3', Arial, sans-serif" font-size="20">soft? dusty? faded?</text>

  <rect x="954" y="390" width="228" height="132" rx="22" fill="#ffffff" stroke="#d4c7b1"/>
  <text x="990" y="438" fill="#17312f" font-family="'DM Serif Display', Georgia, serif" font-size="30">Retained sample</text>
  <text x="990" y="476" fill="#5f716d" font-family="'Source Sans 3', Arial, sans-serif" font-size="20">how did the lot start?</text>

  <rect x="1224" y="390" width="228" height="132" rx="22" fill="#17312f"/>
  <text x="1260" y="438" fill="#f7f0e4" font-family="'DM Serif Display', Georgia, serif" font-size="30">Decision</text>
  <text x="1260" y="476" fill="#d7e4df" font-family="'Source Sans 3', Arial, sans-serif" font-size="20">origin issue or later damage?</text>

  <line x1="912" y1="456" x2="954" y2="456" stroke="#294643" stroke-width="4"/>
  <polygon points="954,456 938,446 938,466" fill="#294643"/>
  <line x1="1182" y1="456" x2="1224" y2="456" stroke="#294643" stroke-width="4"/>
  <polygon points="1224,456 1208,446 1208,466" fill="#294643"/>

  <rect x="684" y="570" width="768" height="112" rx="22" fill="#fcfaf6"/>
  <text x="720" y="614" fill="#17312f" font-family="'Source Sans 3', Arial, sans-serif" font-size="24" letter-spacing="3">BEST PRACTICE</text>
  <text x="720" y="650" fill="#5f716d" font-family="'Source Sans 3', Arial, sans-serif" font-size="22">Keep the retained sample sealed, link it to the lot code and release file, and treat it as evidence alongside records and packaging review.</text>

  <rect x="108" y="766" width="1384" height="34" rx="14" fill="#88b8aa"/>
  <text x="138" y="789" fill="#17312f" font-family="'Source Sans 3', Arial, sans-serif" font-size="20">A retained sample does not replace traceability. It makes traceability much more concrete when a complaint lands.</text>
</svg>
