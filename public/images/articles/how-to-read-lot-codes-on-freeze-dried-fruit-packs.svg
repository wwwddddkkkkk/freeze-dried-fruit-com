<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">How to read lot codes and traceability marks on freeze-dried fruit packs</title>
  <desc id="desc">An annotated pouch diagram showing lot code, best-by date, origin statement, and traceability notes for freeze-dried fruit packaging.</desc>
  <rect width="1200" height="680" fill="#f6f4ee"/>
  <rect x="74" y="72" width="1052" height="536" rx="34" fill="#fffdf8" stroke="#d8d2c3" stroke-width="2"/>
  <text x="112" y="128" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="33" font-weight="700">A small code can reveal a larger system</text>
  <text x="112" y="166" fill="#68736c" font-family="Inter, Arial, sans-serif" font-size="17">Lot codes matter because they tie the bag back to records, not because they act like a simple freshness score.</text>

  <g transform="translate(150 214)">
    <rect width="364" height="308" rx="30" fill="#fffdf8" stroke="#d8d2c3" stroke-width="2"/>
    <path d="M72 48h220l28 28v178c0 24-20 44-44 44H88c-24 0-44-20-44-44V92c0-24 20-44 44-44z" fill="#f7f3ea" stroke="#d8d2c3" stroke-width="2"/>
    <text x="74" y="118" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">Freeze-Dried Mango</text>
    <text x="74" y="152" fill="#4b5a54" font-family="Inter, Arial, sans-serif" font-size="15">Origin: Peru</text>
    <text x="74" y="186" fill="#4b5a54" font-family="Inter, Arial, sans-serif" font-size="15">Best by: 2027-03-12</text>
    <rect x="74" y="214" width="158" height="30" rx="15" fill="#cfe1ee"/>
    <text x="92" y="234" fill="#34526a" font-family="Inter, Arial, sans-serif" font-size="15">Lot L240518-B</text>
  </g>

  <g transform="translate(590 214)">
    <rect width="464" height="308" rx="26" fill="#f7f3ea" stroke="#d8d2c3"/>
    <text x="26" y="42" fill="#1f332d" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="700">What each mark is good for</text>
    <text x="26" y="88" fill="#34526a" font-family="Inter, Arial, sans-serif" font-size="15">Lot code</text>
    <text x="132" y="88" fill="#495852" font-family="Inter, Arial, sans-serif" font-size="15">batch traceability and investigation</text>
    <text x="26" y="126" fill="#6e5a2f" font-family="Inter, Arial, sans-serif" font-size="15">Best-by</text>
    <text x="132" y="126" fill="#495852" font-family="Inter, Arial, sans-serif" font-size="15">stated timing window for the product</text>
    <text x="26" y="164" fill="#27453c" font-family="Inter, Arial, sans-serif" font-size="15">Origin line</text>
    <text x="132" y="164" fill="#495852" font-family="Inter, Arial, sans-serif" font-size="15">what sourcing story the pack is making</text>
    <text x="26" y="202" fill="#7a3f35" font-family="Inter, Arial, sans-serif" font-size="15">Condition of the fruit</text>
    <text x="132" y="202" fill="#495852" font-family="Inter, Arial, sans-serif" font-size="15">the real quality signal: color, breakage, aroma</text>

    <rect x="26" y="242" width="404" height="40" rx="20" fill="#1f332d"/>
    <text x="46" y="267" fill="#fffdf8" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">Read the code with the pack, not instead of the pack.</text>
  </g>

  <g transform="translate(112 536)">
    <rect width="976" height="34" rx="17" fill="#1f332d"/>
    <text x="28" y="23" fill="#fffdf8" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">Traceability rule: a code is only useful if the supplier can map it back to production and shipment records quickly.</text>
  </g>
</svg>
