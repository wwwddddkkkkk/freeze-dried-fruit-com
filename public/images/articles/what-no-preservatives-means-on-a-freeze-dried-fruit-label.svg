<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">What no preservatives means on a freeze-dried fruit label</title>
  <desc id="desc">Annotated freeze-dried fruit label diagram highlighting a no-preservatives claim, ingredient list, and the difference between front-of-pack claims and ingredient function.</desc>
  <rect width="1600" height="900" fill="#f5efe4"/>
  <rect x="68" y="68" width="1464" height="764" rx="30" fill="#fcfaf6" stroke="#d1c4ad" stroke-width="2"/>
  <text x="112" y="138" fill="#294643" font-family="'Source Sans 3', Arial, sans-serif" font-size="26" letter-spacing="5">LABELS &amp; QUALITY</text>
  <text x="112" y="192" fill="#122826" font-family="'DM Serif Display', Georgia, serif" font-size="52">A Narrow Claim Can Sound Bigger Than It Is</text>
  <text x="112" y="232" fill="#5f716d" font-family="'Source Serif 4', Georgia, serif" font-size="24">"No preservatives" answers one formula question, not the whole quality story.</text>

  <rect x="108" y="286" width="640" height="458" rx="24" fill="#f3ece0" stroke="#294643" stroke-width="2"/>
  <text x="144" y="334" fill="#294643" font-family="'Source Sans 3', Arial, sans-serif" font-size="24" letter-spacing="4">PACKAGE READ</text>

  <rect x="160" y="378" width="270" height="310" rx="26" fill="#17312f"/>
  <text x="214" y="430" fill="#f7f0e4" font-family="'Source Sans 3', Arial, sans-serif" font-size="21">FREEZE-DRIED FRUIT</text>
  <rect x="202" y="470" width="186" height="70" rx="18" fill="#88b8aa"/>
  <text x="226" y="514" fill="#17312f" font-family="'Source Sans 3', Arial, sans-serif" font-size="24">NO PRESERVATIVES</text>
  <rect x="202" y="572" width="186" height="76" rx="18" fill="#fcfaf6"/>
  <text x="228" y="608" fill="#5b5143" font-family="'Source Sans 3', Arial, sans-serif" font-size="18">Front panel:</text>
  <text x="228" y="636" fill="#5b5143" font-family="'Source Sans 3', Arial, sans-serif" font-size="18">one narrow message</text>

  <rect x="472" y="378" width="230" height="310" rx="22" fill="#fcfaf6" stroke="#c7bda8"/>
  <text x="500" y="424" fill="#294643" font-family="'Source Sans 3', Arial, sans-serif" font-size="20" letter-spacing="3">INGREDIENT LIST</text>
  <text x="500" y="474" fill="#122826" font-family="'Source Sans 3', Arial, sans-serif" font-size="21">fruit</text>
  <text x="500" y="512" fill="#122826" font-family="'Source Sans 3', Arial, sans-serif" font-size="21">sweetener?</text>
  <text x="500" y="550" fill="#122826" font-family="'Source Sans 3', Arial, sans-serif" font-size="21">flavor?</text>
  <text x="500" y="588" fill="#122826" font-family="'Source Sans 3', Arial, sans-serif" font-size="21">acid?</text>
  <text x="500" y="626" fill="#122826" font-family="'Source Sans 3', Arial, sans-serif" font-size="21">carrier?</text>

  <rect x="814" y="286" width="678" height="458" rx="24" fill="#17312f"/>
  <text x="850" y="334" fill="#f7f0e4" font-family="'Source Sans 3', Arial, sans-serif" font-size="24" letter-spacing="4">WHAT THE CLAIM DOES NOT PROVE</text>

  <rect x="850" y="382" width="610" height="266" rx="22" fill="#fcfaf6"/>
  <text x="884" y="430" fill="#17312f" font-family="'Source Sans 3', Arial, sans-serif" font-size="22">Not the same as:</text>
  <text x="884" y="480" fill="#5b5143" font-family="'Source Sans 3', Arial, sans-serif" font-size="21">- fruit only</text>
  <text x="884" y="522" fill="#5b5143" font-family="'Source Sans 3', Arial, sans-serif" font-size="21">- unsweetened</text>
  <text x="884" y="564" fill="#5b5143" font-family="'Source Sans 3', Arial, sans-serif" font-size="21">- unflavored</text>
  <text x="884" y="606" fill="#5b5143" font-family="'Source Sans 3', Arial, sans-serif" font-size="21">- better texture or packaging</text>

  <rect x="850" y="680" width="610" height="32" rx="14" fill="#88b8aa"/>
  <text x="878" y="702" fill="#17312f" font-family="'Source Sans 3', Arial, sans-serif" font-size="18">Best read: ingredient list first, front-of-pack claim second.</text>

  <rect x="108" y="768" width="1384" height="44" rx="16" fill="#203836"/>
  <text x="146" y="797" fill="#fffdf8" font-family="'Source Sans 3', Arial, sans-serif" font-size="20" font-weight="700">Label function matters more than the reassuring phrase on the front of the bag.</text>
</svg>
